networks:
  nocobase:
    driver: bridge

services:
  app:
    image: ${NOCOBASE_APP_IMAGE:-registry.cn-shanghai.aliyuncs.com/nocobase/nocobase:latest-full}
    restart: always
    networks:
      - nocobase
    depends_on:
      - mariadb
    environment:
      - APP_KEY=${APP_KEY:?APP_KEY is required. Set a random value in .env}
      - DB_DIALECT=mariadb
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=nocobase
      - DB_USER=root
      - DB_PASSWORD=nocobase
      - DB_UNDERSCORED=true
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./storage:/app/nocobase/storage
    ports:
      - '${APP_PORT:-13000}:80'

  mariadb:
    image: ${NOCOBASE_MARIADB_IMAGE:-registry.cn-shanghai.aliyuncs.com/nocobase/mariadb:11}
    restart: always
    environment:
      MYSQL_DATABASE: nocobase
      MYSQL_USER: nocobase
      MYSQL_PASSWORD: nocobase
      MYSQL_ROOT_PASSWORD: nocobase
    volumes:
      - ./storage/db/mariadb:/var/lib/mysql
    networks:
      - nocobase
