networks:
  nocobase:
    driver: bridge

services:
  app:
    image: ${NOCOBASE_APP_IMAGE:-registry.cn-shanghai.aliyuncs.com/nocobase/nocobase:latest-full}
    restart: always
    networks:
      - nocobase
    depends_on:
      - mysql
    environment:
      - APP_KEY=${APP_KEY:?APP_KEY is required. Set a random value in .env}
      - DB_DIALECT=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nocobase
      - DB_USER=root
      - DB_PASSWORD=nocobase
      - DB_UNDERSCORED=${DB_UNDERSCORED:-false}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./storage:/app/nocobase/storage
    ports:
      - '${APP_PORT:-13000}:80'

  mysql:
    image: ${NOCOBASE_MYSQL_IMAGE:-registry.cn-shanghai.aliyuncs.com/nocobase/mysql:8}
    restart: always
    environment:
      MYSQL_DATABASE: nocobase
      MYSQL_USER: nocobase
      MYSQL_PASSWORD: nocobase
      MYSQL_ROOT_PASSWORD: nocobase
    volumes:
      - ./storage/db/mysql:/var/lib/mysql
    networks:
      - nocobase
