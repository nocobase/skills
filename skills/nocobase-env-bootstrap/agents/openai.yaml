interface:
  display_name: "NocoBase Env Bootstrap"
  short_description: "Preflight, install, deploy, mcp-connect, upgrade, and diagnose one NocoBase environment"
  default_prompt: "Use $nocobase-env-bootstrap to run preflight checks, install, deploy, mcp-connect, upgrade, or diagnose this NocoBase environment. In install/deploy flows, treat MCP as the final startup-complete stage and run it by default (`mcp_required=true`) unless user explicitly sets `mcp_required=false`. For MCP activation blockers detected in postcheck, do not force manual plugin activation first; run fixed auto sequence first with auth-mode bundle: api-key(default)=@nocobase/plugin-mcp-server + @nocobase/plugin-api-keys, oauth=@nocobase/plugin-mcp-server + @nocobase/plugin-idp-oauth, none=@nocobase/plugin-mcp-server. Execute via `Use $nocobase-plugin-manage enable <activation_plugin_bundle> -> restart app -> rerun mcp-postcheck`. Do not bypass plugin-manage with ad-hoc container shell commands; plugin-manage may auto-select docker CLI internally for local Docker apps. For API-key mode, token handling is automatic by default in mcp-postcheck: auto-generate token when missing and auto-refresh when token is expired (`401/403`) using CLI `generate-api-key`. Only if auto generation/refresh fails, emit provide_api_token and fallback to manual API keys page."

policy:
  allow_implicit_invocation: true
