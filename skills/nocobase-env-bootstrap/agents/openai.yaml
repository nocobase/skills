interface:
  display_name: "NocoBase Env Bootstrap"
  short_description: "Preflight, install, deploy, upgrade, diagnose one NocoBase environment, then bootstrap local nocobase-ctl env"
  default_prompt: "Use $nocobase-env-bootstrap to run preflight checks, install, deploy, upgrade, or diagnose this NocoBase environment. In install/deploy/upgrade flows, do not proactively ask to connect MCP, and do not run MCP by default. Before CLI runtime refresh, ensure CLI dependency plugins are active: @nocobase/plugin-api-doc and @nocobase/plugin-api-keys (use $nocobase-plugin-manage activation path and restart app if plugin state changed). Run all nocobase-ctl commands through the shared wrapper `node skills/run-ctl.mjs -- <args>` so global/local installation differences are handled automatically. After app startup succeeds, always bootstrap local CLI env via cli-postcheck (Windows: `powershell -File scripts/cli-postcheck.ps1 -Port <port> -EnvName local -TokenEnv NOCOBASE_API_TOKEN -Scope project -BaseDir <target_dir>`; Linux/macOS: `bash scripts/cli-postcheck.sh <port> local NOCOBASE_API_TOKEN project <target_dir>`). cli-postcheck must auto-try API token generation first (local `yarn nocobase generate-api-key`, docker compose fallback) and only ask user for manual token when automatic path fails. Only run MCP flow when user explicitly requests task=mcp-connect."

policy:
  allow_implicit_invocation: true
