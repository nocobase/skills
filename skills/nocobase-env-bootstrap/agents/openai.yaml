interface:
  display_name: "NocoBase Env Bootstrap"
  short_description: "Preflight, install, upgrade, diagnose one NocoBase environment, then bootstrap local nocobase-ctl env"
  default_prompt: >
    Use $nocobase-env-bootstrap to run preflight checks, install, upgrade, diagnose, or app-manage this NocoBase environment.
    Execute local scripts/templates only and do not fetch web install/upgrade command snippets at runtime.
    Install entrypoints (relative paths below assume cwd is the `nocobase-env-bootstrap` skill root):
    Windows `powershell -File scripts/install.ps1 --method <docker|create-nocobase-app|git> --db-mode <bundled|existing> --db-underscored <true|false> ...`;
    Linux/macOS `bash scripts/install.sh --method <docker|create-nocobase-app|git> --db-mode <bundled|existing> --db-underscored <true|false> ...`.
    Upgrade entrypoints (relative paths below assume cwd is the `nocobase-env-bootstrap` skill root):
    Windows `powershell -File scripts/upgrade.ps1 --method <auto|docker|create-nocobase-app|git> --target-dir <dir> --backup-confirmed true --confirm-upgrade true --target-version <version> --restart-mode <manual|dev|start|pm2> --clean-retry <true|false> --allow-dirty <true|false>`;
    Linux/macOS `bash scripts/upgrade.sh --method <auto|docker|create-nocobase-app|git> --target-dir <dir> --backup-confirmed true --confirm-upgrade true --target-version <version> --restart-mode <manual|dev|start|pm2> --clean-retry <true|false> --allow-dirty <true|false>`.
    Upgrade method defaults to `auto` and should be resolved from project marker/files.
    Upgrade safety is strict: `backup_confirmed=true` and `confirm-upgrade=true` are mandatory, downgrade is blocked, and git dirty worktree is blocked unless `--allow-dirty true`.
    Database policy is strict:
    docker defaults to bundled DB, but if DB_* inputs are provided then switch to existing DB mode;
    create-nocobase-app and git always require existing DB (postgres/mysql/mariadb) with DB_HOST/DB_PORT/DB_DATABASE/DB_USER/DB_PASSWORD.
    Docker release-channel clarification is mandatory for install:
    when install method is docker and user did not explicitly provide release channel, ask one short question before execution:
    "Docker default is latest, but current AI build capabilities are more complete in alpha. Install alpha now?"
    Accept only alpha/latest/beta; if user emphasizes stability/production preference, choose latest.
    Track channel source as one of user_explicit/clarified/default_fallback.
    For local DB hosts (`localhost`, `127.0.0.1`, `::1`, `host.docker.internal`), ask DB_UNDERSCORED preference; default is false.
    Run preflight with explicit DB context (`preflight.ps1 -InstallMethod <method> -DbMode <mode> -DbDialect <dialect> -DbDatabaseMode <existing|create> ...` / `preflight.sh <port> <method> <mode> <dialect> <existing|create>` + DB_* env).
    For external DB mode, require db bootstrap decision: `existing` (connect existing DB) or `create` (create DB first, then verify).
    If existing DB is missing/unreachable, stop and provide official install links:
    PostgreSQL https://www.postgresql.org/download/ ;
    MySQL install docs https://dev.mysql.com/doc/en/installing.html ;
    MySQL downloads https://dev.mysql.com/downloads/mysql ;
    MariaDB downloads https://mariadb.org/download/ .
    Before CLI runtime refresh, ensure CLI dependency plugins are active by auth mode:
    oauth(default): @nocobase/plugin-api-doc + @nocobase/plugin-idp-oauth; token: @nocobase/plugin-api-doc + @nocobase/plugin-api-keys
    (use $nocobase-plugin-manage activation path and restart app if plugin state changed).
    For install/upgrade final-stage CLI bootstrap, call `nocobase-ctl` directly (or use `node ./scripts/cli-postcheck.mjs ...`, which now calls `nocobase-ctl` directly).
    OAuth bootstrap order is mandatory and must never be reordered:
    `nocobase-ctl env add --name <env> --base-url <url> -s <scope>` -> `nocobase-ctl env auth -e <env> -s <scope>` -> `nocobase-ctl env update -e <env> -s <scope>` -> `nocobase-ctl env -s <scope>`.
    Never run `env update` as a pre-check before the first successful OAuth authorization for a newly added env. `env update` before `env auth` will fail with unauthenticated/EMPTY_TOKEN and is not a signal to reorder the flow.
    If the browser opens an OAuth error page such as `missing required parameter 'client_id'`, do not treat that as proof that the app metadata is broken. The authorization URL comes from the `nocobase-ctl env auth` OAuth flow itself, not from this skill. If `nocobase-ctl env auth` prints that URL in command output, use that same URL manually; otherwise continue from the browser flow opened by `env auth` and rerun it in an interactive terminal if needed. Treat this as a likely browser-launch or command-line URL handling issue rather than server-side truncation. Windows is only a common trigger, not the only platform where this can happen.
    For app environment management outside final-stage bootstrap, use direct `nocobase-ctl` commands: `env add`, `env auth`, `env update`, `env use`, `env list`.
    App env add defaults to oauth mode. In token mode, token must be auto-generated via `yarn nocobase generate-api-key` or `docker compose exec`; for remote hosts, token must be manually provided by user.
    Env add is only successful when `env update` connectivity verification also succeeds.
    After app startup/upgrade succeeds, bootstrap local CLI env via cli-postcheck
    (`node ./scripts/cli-postcheck.mjs --base-dir <app_dir> --ctl-dir <workspace_root>` for oauth, or `node ./scripts/cli-postcheck.mjs --auth-mode token --token-env NOCOBASE_API_TOKEN --base-dir <app_dir> --ctl-dir <workspace_root>` for token mode).
    In token mode only, cli-postcheck must auto-try API token generation first (local `yarn nocobase generate-api-key`, docker compose fallback)
    and only ask user for manual token when automatic path fails.

policy:
  allow_implicit_invocation: true
