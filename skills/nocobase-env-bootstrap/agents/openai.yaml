interface:
  display_name: "NocoBase Env Bootstrap"
  short_description: "Preflight, install, deploy, mcp-connect, upgrade, and diagnose one NocoBase environment"
  default_prompt: "Use $nocobase-env-bootstrap to run preflight checks, install, deploy, mcp-connect, upgrade, or diagnose this NocoBase environment. For MCP activation blockers detected in preflight or postcheck, do not force manual plugin activation first; run fixed auto sequence first with auth-mode bundle: api-key(default)=@nocobase/plugin-mcp-server + @nocobase/plugin-api-keys, oauth=@nocobase/plugin-mcp-server + @nocobase/plugin-idp-oauth, none=@nocobase/plugin-mcp-server. Execute via `Use $nocobase-plugin-manage enable <activation_plugin_bundle> -> restart app -> rerun mcp-postcheck`. Do not bypass plugin-manage with ad-hoc container shell commands; plugin-manage may auto-select docker CLI internally for local Docker apps. Only after endpoint blocker is resolved may you enter provide_api_token step. For provide_api_token blockers, stop automation and require the user to manually create and submit token; do not auto-create or auto-retrieve token."

policy:
  allow_implicit_invocation: true
