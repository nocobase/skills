interface:
  display_name: "NocoBase Env Bootstrap"
  short_description: "Preflight, install, deploy, upgrade, diagnose one NocoBase environment, then bootstrap local nocobase-ctl env"
  default_prompt: "Use $nocobase-env-bootstrap to run preflight checks, install, deploy, upgrade, diagnose, or app-manage this NocoBase environment. Before CLI runtime refresh, ensure CLI dependency plugins are active: @nocobase/plugin-api-doc and @nocobase/plugin-api-keys (use $nocobase-plugin-manage activation path and restart app if plugin state changed). Run all nocobase-ctl commands through the skill-local wrapper `node ./run-ctl.mjs -- <args>` so global/local installation differences are handled automatically. For app environment management, always use skill-local helper `node ./env-manage.mjs <add|use|current|list> ...`. Local URL token policy is strict: for `localhost`, `127.0.0.1`, `::1`, `*.localhost`, `host.docker.internal`, token is mandatory but auto-acquired by env-manage (never placeholder); for remote hosts, token must be manually provided by user. Env add is only successful when `env update` connectivity verification also succeeds. After app startup succeeds, bootstrap local CLI env via cli-postcheck (Windows: `powershell -File scripts/cli-postcheck.ps1 -Port <port> -EnvName local -TokenEnv NOCOBASE_API_TOKEN -Scope project -BaseDir <target_dir>`; Linux/macOS: `bash scripts/cli-postcheck.sh <port> local NOCOBASE_API_TOKEN project <target_dir>`). cli-postcheck must auto-try API token generation first (local `yarn nocobase generate-api-key`, docker compose fallback) and only ask user for manual token when automatic path fails."

policy:
  allow_implicit_invocation: true
