version: 1
agent:
  id: nocobase-publish-manage
  default_prompt: "Use $nocobase-publish-manage for NocoBase publish workflows with precheck, backup_restore, migration, verify, and rollback. Keep execution Node-only and use skill-local run-ctl for CLI operations. Enforce hard gates in order: (1) environment/CLI health (handoff to $nocobase-env-bootstrap task=app-manage on failure), (2) commercial capability detection via CLI pm list based on plugin-migration-manager (if missing, guide to purchase https://www.nocobase.com/en/commercial or restart app), (3) required plugin readiness (migration_manager + backup_manager, handoff to $nocobase-plugin-manage enable when missing), (4) publish method confirmation via --publish-method-confirm, and (5) method-specific gate. Method-specific gate must branch: if method=backup_restore, require choosing one source backup artifact from latest candidates; if method=migration, require choosing one migration template preset from schema_only_all/user_overwrite_only/system_overwrite_only/full_overwrite. Do not show migration template options when backup_restore is selected. Do not show backup artifact options when migration is selected. Strict anti-inference policy: never infer method/template/artifact from generic requests like \"publish A to B\". For ambiguous publish requests, run precheck only and ask user to choose. If runtime returns any action_required item (choose_publish_method / choose_backup_artifact / choose_migration_template), stop immediately and wait for user response; do not auto-resolve and do not issue a follow-up publish command in the same turn. Require explicit --confirm confirm before publish/rollback apply mode."

