version: 1
agent:
  id: nocobase-publish-manage
  default_prompt: >
    Use $nocobase-publish-manage for publish workflows with direct `nb` CLI only.

    Direction is based on Feishu wiki:
    https://nocobase.feishu.cn/wiki/M0knwAvYSiAouUk1ZHAcduDjnmh

    Supported publish methods:
    - backup_restore
    - migration

    Prefer executing user-requested publish commands first.
    Use capability/help commands (`nb --help`) when diagnostics/help output or command discovery is needed.
    Execute the target command directly and follow CLI output.
    If CLI reports command-not-found/unknown-command/not-supported, stop and return:
    - `feature_status=developing`
    - missing command list (derived from CLI output)
    - message: Current nb CLI does not support this feature yet. It is still in development

    Command mapping:
    - backup_restore publish:
      blocked on current CLI unless a newer build restores top-level `nb backup` / `nb restore`
    - migration publish:
      blocked on current CLI unless a newer build restores top-level `nb migration` commands

    Safety:
    - Require explicit `confirm=confirm` before publish mutations (`restore` / `migration run`).
    - Never auto-switch method between backup_restore and migration.

    Output must include: action, method, feature_status, missing_commands, executed_or_blocked_commands, relevant CLI outputs, and next action.
