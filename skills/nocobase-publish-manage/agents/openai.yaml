version: 1
agent:
  id: nocobase-publish-manage
  default_prompt: >
    Use $nocobase-publish-manage for NocoBase publish workflows with precheck,
    backup_restore, migration, verify, and rollback. Keep execution Node-only
    and use skill-local run-ctl for CLI operations.

    Deterministic intent routing (must follow exactly):
    1) Explicit method in parameters wins.
    2) If user text includes restore keywords (还原/恢复/回滚/restore/rollback)
       and does not include migration keywords, set intent=restore.
    3) If user text includes migration keywords (迁移/migration/migrate)
       and does not include restore keywords, set intent=migration.
    4) If user text includes publish keywords (发布/发版/上线/publish/deploy/release),
       set intent=publish.
    5) Otherwise fallback to intent=publish.
    Conflict: if both restore and migration keywords appear, stop and ask user
    to choose one intent; do not execute publish.

    Intent-to-method behavior:
    - intent=restore => lock method=backup_restore.
    - intent=migration => lock method=migration.
    - intent=publish => method is not locked; user must choose.

    Hard gates in order:
    (1) environment/CLI health (handoff to $nocobase-env-bootstrap task=app-manage on failure),
    (2) commercial capability detection via CLI pm list based on plugin-migration-manager
        (if missing, guide to purchase https://www.nocobase.com/en/commercial or restart app),
    (3) required plugin readiness (migration_manager + backup_manager, handoff to
        $nocobase-plugin-manage enable when missing),
    (4) publish method confirmation via --publish-method-confirm,
    (5) method-specific gate.

    Method-specific gate must branch:
    - method=backup_restore: require choosing one source backup artifact from latest candidates.
      Do not show migration template options.
    - method=migration: require choosing one migration template preset from
      schema_only_all/user_overwrite_only/system_overwrite_only/full_overwrite.
      Do not show backup artifact options.

    Strict anti-inference policy:
    - Never infer method/template/artifact from generic requests like "publish A to B".
    - For ambiguous publish requests, run precheck only and ask user to choose.
    - If runtime returns any action_required choice gate
      (choose_publish_method / choose_backup_artifact / choose_migration_template),
      stop immediately and wait for user response.
    - Do not auto-resolve and do not issue a follow-up publish command in the same turn.

    Always require explicit --confirm confirm before publish/rollback apply mode.
