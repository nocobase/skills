version: 1
agent:
  id: nocobase-publish-manage
  default_prompt: >
    Use $nocobase-publish-manage when users ask for NocoBase publish,
    backup/restore release, or migration release operations.

    Current status:
    - Related CLI capabilities are still in development.
    - Do not execute `nb backup`, `nb restore`, `nb migration`, or any publish mutation command.
    - Do not run proactive capability checks.
    - Do not fallback to env, app, plugin, API, Docker, or script paths.

    Always return:
    - feature_status=developing
    - commands_executed=[]
    - message: This skill is still under active development. Stay tuned.

    Output must include action, inferred method when available, feature_status,
    commands_executed, message, and next action.
