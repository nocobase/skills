popups:
  # Articles page - addNew popup
  - target: $articles.table.actions.addNew
    auto: [edit, detail]
    view_field: title
    coll: nb_cms_articles
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - title
          - slug
          - content
          - excerpt
          - author
          - category
          - status
          - publish_date
          - views
          - featured
        field_layout:
          - '--- Basic Info ---'
          - - title
            - slug
          - - status
            - featured
          - '--- Content ---'
          - - content
          - - excerpt
          - '--- Publishing ---'
          - - author
            - category
          - - publish_date
            - views
        actions: [submit]

  # Authors page - addNew popup
  - target: $authors.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_cms_authors
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - name
          - email
          - bio
        field_layout:
          - '--- Author Info ---'
          - - name
            - email
          - - bio
        actions: [submit]

  # Categories page - addNew popup
  - target: $categories.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_cms_categories
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - name
          - slug
          - description
          - parent
        field_layout:
          - '--- Category Info ---'
          - - name
            - slug
          - - parent
          - - description
        actions: [submit]

  # Tags page - addNew popup
  - target: $tags.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_cms_tags
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - name
          - slug
          - color
        field_layout:
          - '--- Tag Info ---'
          - - name
            - slug
          - - color
        actions: [submit]
