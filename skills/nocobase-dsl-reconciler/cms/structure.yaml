module: CMS
icon: filetextoutlined
group: CMS
collections:
  nb_cms_authors:
    title: Authors
    fields:
      - name: name
        interface: input
        title: Name
      - name: email
        interface: email
        title: Email
      - name: bio
        interface: textarea
        title: Bio
  nb_cms_categories:
    title: Categories
    fields:
      - name: name
        interface: input
        title: Name
      - name: slug
        interface: input
        title: Slug
      - name: description
        interface: textarea
        title: Description
      - name: parent
        interface: m2o
        title: Parent Category
        target: nb_cms_categories
        foreignKey: parent_id
  nb_cms_tags:
    title: Tags
    fields:
      - name: name
        interface: input
        title: Name
      - name: slug
        interface: input
        title: Slug
      - name: color
        interface: color
        title: Color
  nb_cms_articles:
    title: Articles
    fields:
      - name: title
        interface: input
        title: Title
      - name: slug
        interface: input
        title: Slug
      - name: content
        interface: textarea
        title: Content
      - name: excerpt
        interface: textarea
        title: Excerpt
      - name: author
        interface: m2o
        title: Author
        target: nb_cms_authors
        foreignKey: author_id
      - name: category
        interface: m2o
        title: Category
        target: nb_cms_categories
        foreignKey: category_id
      - name: status
        interface: select
        title: Status
        options:
          - draft
          - review
          - published
          - archived
      - name: publish_date
        interface: date
        title: Publish Date
      - name: views
        interface: integer
        title: Views
      - name: featured
        interface: checkbox
        title: Featured

pages:
  - page: Dashboard
    icon: dashboardoutlined
    blocks:
      - key: dashboard_block
        type: jsBlock
        desc: CMS Dashboard Overview
        file: ./js/dashboard.js
    layout:
      - - dashboard_block

  - page: Articles
    coll: nb_cms_articles
    icon: filetextoutlined
    blocks:
      - key: filterForm
        type: filterForm
        coll: nb_cms_articles
        fields:
          - field: title
            label: Search
            filterPaths: [title, slug, content]
          - field: status
          - field: featured
      - key: table
        type: table
        coll: nb_cms_articles
        fields:
          - title
          - slug
          - author
          - category
          - status
          - publish_date
          - views
          - featured
          - createdAt
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - filterForm
      - - table

  - page: Authors
    coll: nb_cms_authors
    icon: useroutlined
    blocks:
      - key: filterForm
        type: filterForm
        coll: nb_cms_authors
        fields:
          - field: name
            label: Search
            filterPaths: [name, email]
      - key: table
        type: table
        coll: nb_cms_authors
        fields:
          - name
          - email
          - bio
          - createdAt
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - filterForm
      - - table

  - page: Categories
    coll: nb_cms_categories
    icon: folderoutlined
    blocks:
      - key: filterForm
        type: filterForm
        coll: nb_cms_categories
        fields:
          - field: name
            label: Search
            filterPaths: [name, slug]
      - key: table
        type: table
        coll: nb_cms_categories
        fields:
          - name
          - slug
          - description
          - parent
          - createdAt
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - filterForm
      - - table

  - page: Tags
    coll: nb_cms_tags
    icon: tagoutlined
    blocks:
      - key: filterForm
        type: filterForm
        coll: nb_cms_tags
        fields:
          - field: name
            label: Search
            filterPaths: [name, slug]
      - key: table
        type: table
        coll: nb_cms_tags
        fields:
          - name
          - slug
          - color
          - createdAt
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - filterForm
      - - table
