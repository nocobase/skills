messages:
  - role: system
    content:
      - type: text
        content: |-
          You are Dex, an AI Data Analyst specialized in B2B lead scoring and qualification.

          Your task is to analyze lead data and provide:
          1. A quality score (0-100) based on firmographic and behavioral data
          2. Grade classification (A/B/C/D)
          3. Key scoring factors with their impact
          4. Actionable recommendations for sales follow-up

          Scoring Guidelines:
          - Company Size: Enterprise (500+ employees) = high value, SMB = medium value
          - Industry Fit: Target industries score higher
          - Title Seniority: C-level/VP = high, Manager = medium, Individual = low
          - Engagement: Email opens, link clicks, form submissions indicate interest
          - Source Quality: Inbound leads typically score higher than cold lists
          - Data Completeness: More complete profiles indicate higher intent

          Be objective and consistent in your scoring. Provide clear reasoning for each factor.
    message: |-
      You are Dex, an AI Data Analyst specialized in B2B lead scoring and qualification.

      Your task is to analyze lead data and provide:
      1. A quality score (0-100) based on firmographic and behavioral data
      2. Grade classification (A/B/C/D)
      3. Key scoring factors with their impact
      4. Actionable recommendations for sales follow-up

      Scoring Guidelines:
      - Company Size: Enterprise (500+ employees) = high value, SMB = medium value
      - Industry Fit: Target industries score higher
      - Title Seniority: C-level/VP = high, Manager = medium, Individual = low
      - Engagement: Email opens, link clicks, form submissions indicate interest
      - Source Quality: Inbound leads typically score higher than cold lists
      - Data Completeness: More complete profiles indicate higher intent

      Be objective and consistent in your scoring. Provide clear reasoning for each factor.
  - role: user
    content:
      - type: text
        content: |-
          Please analyze and score the following lead:

          Lead Information:
          {{$context.data}}

          Respond ONLY in valid JSON format (no markdown, no code blocks).
llmService: v_rhp51xzq23s
builtIn: {}
frequencyPenalty: 0
presencePenalty: 0
temperature: 0.7
topP: 1
responseFormat: text
timeout: 60000
maxRetries: 1
model: models/gemini-2.5-flash
structuredOutput:
  schema:
    type: object
    properties:
      ai_score:
        type: integer
        minimum: 0
        maximum: 100
        description: Overall lead quality score → nb_crm_leads.ai_score
      ai_convert_prob:
        type: number
        minimum: 0
        maximum: 1
        description: Estimated probability of conversion → nb_crm_leads.ai_convert_prob
      ai_tags:
        type: array
        items:
          type: string
        description: Suggested tags → nb_crm_leads.ai_tags
      extra:
        type: object
        description: Additional data → nb_crm_leads.extra
        properties:
          ai_grade:
            type: string
            enum:
              - A
              - B
              - C
              - D
            description: Lead grade based on score range
          ai_confidence:
            type: number
            minimum: 0
            maximum: 1
            description: Confidence level of the scoring (0-1)
          ai_score_factors:
            type: array
            items:
              type: object
              properties:
                name:
                  type: string
                  description: Factor name (e.g., company_size, engagement)
                impact:
                  type: integer
                  description: Score impact, positive or negative
                reason:
                  type: string
                  description: Explanation for this factor's impact
              required:
                - name
                - impact
                - reason
            description: Key factors affecting the score
          ai_recommendations:
            type: array
            items:
              type: string
            minItems: 1
            maxItems: 5
            description: Actionable follow-up recommendations
          ai_ideal_next_action:
            type: string
            description: Single most important next action
        required:
          - ai_grade
          - ai_confidence
          - ai_score_factors
          - ai_recommendations
    required:
      - ai_score
      - ai_convert_prob
      - ai_tags
      - extra
  strict: true
