  ai_score: 85
  ai_convert_prob: 0.78
  ai_tags:
    - enterprise
    - high-intent
    - decision-maker
    - technology
  extra:
    ai_grade: A
    ai_confidence: 0.92
    ai_score_factors:
      - name: company_size
        impact: 15
        reason: Enterprise company with 2000+ employees indicates significant deal potential
      - name: engagement
        impact: 20
        reason: Opened 5 emails and clicked 3 links shows strong interest
      - name: title_seniority
        impact: 12
        reason: VP-level title suggests decision-making authority
      - name: industry_fit
        impact: 10
        reason: Technology industry matches our ICP
      - name: source_quality
        impact: 8
        reason: Inbound from product demo request
    ai_recommendations:
      - Schedule a discovery call within 24 hours - high intent detected
      - Prepare enterprise pricing package before the call
      - Research their tech stack for personalized demo
      - Identify other stakeholders in the organization
    ai_ideal_next_action: Schedule discovery call
