dataSource: main
sql: |
  -- CRM System Date Shift Script
  -- Purpose: Shift all date fields forward so the latest date aligns with today
  -- Usage: Scheduled task to keep demo data current (run daily)
  --
  -- IMPORTANT: ref_cols are used ONLY for calculating max_ts (the reference point).
  -- DO NOT include updatedAt in ref_cols because NocoBase auto-updates it,
  -- which causes delta to become very small and breaks the time shift logic.

  DO $crm_shift$
    DECLARE
      target_ts TIMESTAMPTZ := now();  -- latest value will be snapped to "right now"
      rec RECORD;
      col TEXT;
      col_ts TIMESTAMPTZ;
      max_ts TIMESTAMPTZ;
      delta INTERVAL;
    BEGIN
      -- List the tables and columns to shift
      -- ref_cols: columns used ONLY for calculating max_ts (avoid updatedAt!)
      -- ts_cols: all timestamp columns to shift (TIMESTAMP/TIMESTAMPTZ)
      -- date_cols: date-only columns to shift (DATE)
      FOR rec IN
        SELECT *
        FROM (VALUES
          -- ==================== Core Business Tables ====================

          -- Leads
          ('nb_crm_leads',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','converted_at','ai_scored_at','ai_nba_generated_at'],
            ARRAY[]::text[]),

          -- Customers
          ('nb_crm_customers',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','ai_health_assessed_at','ai_nba_generated_at'],
            ARRAY[]::text[]),

          -- Contacts
          ('nb_crm_contacts',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['birthday']),

          -- Opportunities
          ('nb_crm_opportunities',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','last_activity_at','stage_entered_at','ai_analyzed_at','ai_nba_generated_at'],
            ARRAY['expected_close_date','actual_close_date','ai_predicted_close']),

          -- Activities (calls, meetings, tasks, etc.)
          ('nb_crm_activities',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','activity_date','reminder_at'],
            ARRAY[]::text[]),

          -- ==================== Transaction Tables ====================

          -- Quotations
          ('nb_crm_quotations',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','submitted_at','approved_at','sent_at','customer_response_at','rejected_at','expired_at'],
            ARRAY['valid_until']),

          -- Quotation Items
          ('nb_crm_quotation_items',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['service_date']),

          -- Quotation Approvals
          ('nb_crm_quotation_approvals',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','approved_at'],
            ARRAY[]::text[]),

          -- Orders
          ('nb_crm_orders',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['order_date','delivery_date','actual_delivery_date']),

          -- Order Items
          ('nb_crm_order_items',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Payments
          ('nb_crm_payments',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['payment_date']),

          -- ==================== Supporting Tables ====================

          -- Comments
          ('nb_crm_comments',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Competitors
          ('nb_crm_competitors',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Customer Shares
          ('nb_crm_customer_shares',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','shared_at'],
            ARRAY[]::text[]),

          -- Exchange Rates
          ('nb_crm_exchange_rates',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['effective_date']),

          -- Products
          ('nb_crm_products',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Product Categories
          ('nb_crm_product_categories',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Price Tiers
          ('nb_crm_price_tiers',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY['effective_from','effective_to']),

          -- Tags
          ('nb_crm_tags',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Lead Tags
          ('nb_crm_lead_tags',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Contact Tags
          ('nb_crm_contact_tags',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Opportunity Stages
          ('nb_crm_opportunity_stages',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Opportunity Users
          ('nb_crm_opportunity_users',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- Mail Associations
          ('nb_crm_mail_associations',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt'],
            ARRAY[]::text[]),

          -- ==================== Mail Messages Table ====================

          ('mailMessages',
            ARRAY['createdAt'],  -- ref_cols
            ARRAY['createdAt','updatedAt','date','relatedMessageLatestDate','scheduleSendAt'],
            ARRAY[]::text[])

        ) AS cfg(table_name, ref_cols, ts_cols, date_cols)
      LOOP
        max_ts := NULL;

        -- Find the latest timestamp value using ONLY ref_cols (not all ts_cols)
        -- This avoids the issue where updatedAt is auto-updated by NocoBase
        IF array_length(rec.ref_cols,1) IS NOT NULL THEN
          FOREACH col IN ARRAY rec.ref_cols LOOP
            BEGIN
              EXECUTE format('SELECT max(%I)::timestamptz FROM %I', col, rec.table_name) INTO col_ts;
              IF col_ts IS NOT NULL AND (max_ts IS NULL OR col_ts > max_ts) THEN
                max_ts := col_ts;
              END IF;
            EXCEPTION WHEN undefined_column OR undefined_table THEN
              -- Skip if column or table does not exist
              NULL;
            END;
          END LOOP;
        END IF;

        -- Note: date_cols (like expected_close_date) are NOT included in ref calculation
        -- because future dates should not prevent historical data from being shifted

        -- Skip if the table has no data
        IF max_ts IS NULL THEN
          CONTINUE;
        END IF;

        delta := target_ts - max_ts;  -- the amount we need to shift the timeline

        -- No movement needed
        IF delta = interval '0' THEN
          CONTINUE;
        END IF;

        RAISE NOTICE 'Table % shift delta: %', rec.table_name, delta;

        -- Slide every timestamp column by the same delta
        IF array_length(rec.ts_cols,1) IS NOT NULL THEN
          FOREACH col IN ARRAY rec.ts_cols LOOP
            BEGIN
              EXECUTE format(
                'UPDATE %I SET %I = %I + $1 WHERE %I IS NOT NULL',
                rec.table_name, col, col, col
              )
              USING delta;
            EXCEPTION WHEN undefined_column OR undefined_table THEN
              NULL;
            END;
          END LOOP;
        END IF;

        -- Slide date-only columns and cast back to DATE
        IF array_length(rec.date_cols,1) IS NOT NULL THEN
          FOREACH col IN ARRAY rec.date_cols LOOP
            BEGIN
              EXECUTE format(
                'UPDATE %I SET %I = (%I::timestamptz + $1)::date WHERE %I IS NOT NULL',
                rec.table_name, col, col, col
              )
              USING delta;
            EXCEPTION WHEN undefined_column OR undefined_table THEN
              NULL;
            END;
          END LOOP;
        END IF;
      END LOOP;

      RAISE NOTICE 'CRM system date shift completed at %', now();
    END;
  $crm_shift$;
