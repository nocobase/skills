target: $SELF.currencies.recordActions.edit
coll: ''
blocks:
  - key: editForm
    type: editForm
    coll: ''
    fields:
      - name
      - code
      - current_rate
      - symbol
    field_layout:
      - - name
      - - col:
            - code
            - symbol
          size: 24
      - - current_rate
    actions:
      - submit
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
