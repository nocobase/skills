    type: filterForm
    coll: nb_erp_suppliers
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - contact
    field_layout:
      - - name
  - key: table
    type: table
    coll: nb_erp_suppliers
    fields:
      - field: name
        clickToOpen: true
      - contact
      - phone
      - email
    recordActions:
      - type: edit
        stepParams:
          buttonSettings:
            general:
              title: Edit
              icon: null
              type: link
          popupSettings:
            openView:
              mode: drawer
              size: large
              pageModelClass: ChildPageModel
              dataSourceKey: main
              collectionName: ''
              uid: 9x0dzf4xic6
          displayFieldSettings:
            clickToOpen:
              clickToOpen: true
        props:
          title: Edit
          icon: null
          type: link
        key: edit_edit
    actions:
      - filter
      - refresh
      - addNew
layout:
  - - filterForm
  - - table
