target: $SELF.lead_owner.actions.popup_log_call
mode: drawer
blocks:
  - key: createForm
    type: createForm
    coll: nb_crm_activities
    resource_binding:
      associationName: nb_crm_leads.activities
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
      - subject
      - type
      - activity_date
      - content
      - customer
      - opportunity
      - contact
      - owner
      - lead
    field_layout:
      - - subject
      - - type
        - activity_date
      - - content
      - - col:
            - customer
            - lead
          size: 8
        - col:
            - opportunity
            - owner
          size: 8
        - contact
    actions:
      - submit
