target: $SELF.table.recordActions.edit
coll: ''
blocks:
  - key: editForm
    type: editForm
    coll: ''
    fields:
      - title
      - rating
      - website
      - address
      - industry
      - owner
      - description
      - name
      - company
      - email
      - mobile_phone
      - phone
      - status
      - annual_revenue
      - number_of_employees
    field_layout:
      - '--- Basic Info ---'
      - - name
        - company
        - title
      - - rating
      - - status
      - '--- Contact Info ---'
      - - email
        - phone
        - mobile_phone
      - - website: 8
        - address: 16
      - '--- Company Info ---'
      - - industry
        - annual_revenue
        - number_of_employees
      - '--- Other Info ---'
      - - description
      - - owner
    actions:
      - submit
      - type: ai
        employee: dex
        tasks_file: ./ai/form_add_new_nb_crm_leads_createForm_tasks.yaml
    fieldLinkageRules:
      - key: 2iku5gs0k4o
        title: Linkage rule
        enable: true
        condition:
          logic: $and
          items: []
        actions:
          - key: dqytz7lb1qz
            name: linkageSetFieldProps
            params:
              value:
                fields:
                  - status
                  - owner
                state: hiddenReservedValue
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
