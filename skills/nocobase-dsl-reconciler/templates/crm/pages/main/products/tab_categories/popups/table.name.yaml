target: $SELF.table.fields.name
mode: dialog
blocks:
  - key: editForm
    type: editForm
    coll: nb_crm_product_categories
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
      - name
      - description
      - sort_order
    field_layout:
      - - name
      - - description
      - - sort_order
    actions:
      - submit
