target: $SELF.table.recordActions.edit
coll: ''
blocks:
  - key: editForm
    type: editForm
    coll: ''
    fields:
      - account_number
      - name
      - owner
      - type
      - level
      - status
      - parent
      - phone
      - website
      - address
      - preferred_currency
      - description
      - region
      - number_of_employees
      - industry
      - annual_revenue
    field_layout:
      - '--- Basic Info ---'
      - - name
        - account_number
        - owner
      - - type
        - industry
        - number_of_employees
      - - level
        - status
        - parent
      - '--- Contact Info ---'
      - - phone
        - region
      - - website
        - address
      - '--- Business Info ---'
      - - annual_revenue
        - preferred_currency
      - '--- Other Info ---'
      - - description
    actions:
      - submit
      - type: ai
        employee: dex
        tasks_file: ./ai/form_add_new_nb_crm_customers_createForm_tasks.yaml
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
