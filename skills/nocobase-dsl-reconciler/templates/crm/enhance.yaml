popups:
- page: Leads
  field: name
  mode: embed
  tabs:
  - blocks:
    - key: details_0
      type: details
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
      - company
      - title
      - owner
      - createdAt
      js_items:
      - desc: Lead Key Stats Block
        file: ./js/leads_popup_name_tab0_details_0_lead_key_stats_block.js
      - desc: Lead Badges Row Component
        file: ./js/leads_popup_name_tab0_details_0_lead_badges_row_component.js
      field_layout:
      - - '---'
      - - company
        - title
        - owner
        - createdAt
      - - '[JS:Lead Badges Row Component]'
      - - '[JS:Lead Key Stats Block]'
      actions:
      - edit
      - popup
      - popup
    - key: lead_insights
      type: details
      title: Lead Insights
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      js_items:
      - desc: Lead AI Insights Block
        file: ./js/leads_popup_name_tab0_lead_insights_lead_ai_insights_block.js
      field_layout:
      - - '[JS:Lead AI Insights Block]'
    - key: lead_owner
      type: details
      title: Lead Owner
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      js_items:
      - desc: Lead Profile Header Block
        file: ./js/leads_popup_name_tab0_lead_owner_lead_profile_header_block.js
      field_layout:
      - - '---'
      - - '[JS:Lead Profile Header Block]'
      actions:
      - popup
      - popup
      - popup
    - key: company_information
      type: details
      title: Company Information
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
      - industry
      - annual_revenue
      - number_of_employees
      - company
      field_layout:
      - - company
        - industry
        - annual_revenue
      - - number_of_employees
    - key: contact_information
      type: details
      title: Contact Information
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
      - email
      - phone
      - mobile_phone
      - website
      - address
      field_layout:
      - - email
        - phone
        - mobile_phone
      - - website: 8
        - address: 16
    - key: details_5
      type: details
      coll: nb_crm_leads
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      js_items:
      - desc: Lead Stage Flow Block
        file: ./js/leads_popup_name_tab0_details_5_lead_stage_flow_block.js
    - key: comments_6
      type: comments
      coll: nb_crm_comments
      resource_binding:
        associationName: nb_crm_leads.comments
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    layout:
    - - col:
        - details_0
        - details_5
        - contact_information
        - company_information
        size: 16
      - col:
        - lead_owner
        - lead_insights
        - comments_6
        size: 8
    title: Tab0
  - blocks:
    - key: recordHistory_0
      type: recordHistory
      coll: nb_crm_leads
    title: Tab1
  - blocks: []
    layout:
    - - 3jvn4ysa
    title: Tab2
- page: Customers
  field: name
  mode: embed
  tabs:
  - blocks:
    - key: details_0
      type: details
      coll: nb_crm_customers
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
      - level
      - type
      - scale
      - region
      js_items:
      - desc: Customer Statistics Block
        file: ./js/customers_popup_name_tab0_details_0_customer_statistics_block.js
      - desc: item_profile - Customer Profile Header
        file: ./js/customers_popup_name_tab0_details_0_item_profile_customer_profile_header.js
      field_layout:
      - - '[JS:item_profile - Customer Profile Header]'
      - - level
        - scale
        - region
        - type
      - - '[JS:Customer Statistics Block]'
      actions:
      - edit
    - key: details_1
      type: details
      coll: nb_crm_customers
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      js_items:
      - desc: AI Smart Profile Block
        file: ./js/customers_popup_name_tab0_details_1_ai_smart_profile_block.js
    - key: contacts
      type: list
      title: Contacts
      coll: nb_crm_contacts
      resource_binding:
        associationName: nb_crm_customers.contacts
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_fields:
      - email
      - phone
      item_js:
      - desc: Contact Row Column - Customer 360
        file: ./js/customers_popup_name_tab0_contacts_contact_row_column_customer_360.js
      item_layout:
      - - '[JS:Contact Row Column - Customer 360]'
      - - email
        - phone
      item_actions:
      - edit
      actions:
      - filter
      - refresh
      - addNew
    - key: opportunities
      type: list
      title: Opportunities
      coll: nb_crm_opportunities
      resource_binding:
        associationName: nb_crm_customers.opportunities
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
      item_js:
      - desc: Opportunity Row Column - Customer 360
        file: ./js/customers_popup_name_tab0_opportunities_opportunity_row_column_customer_360.js
    - key: comments_4
      type: comments
      coll: nb_crm_comments
      resource_binding:
        associationName: nb_crm_customers.comments
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    layout:
    - - col:
        - details_0
        - opportunities
        size: 16
      - col:
        - contacts
        - details_1
        - comments_4
        size: 8
    title: Tab0
  - blocks:
    - key: recordHistory_0
      type: recordHistory
      coll: nb_crm_customers
    title: Tab1
- page: Products
  field: name
  blocks:
  - key: editForm_0
    type: editForm
    coll: nb_crm_products
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    actions:
    - submit
  mode: drawer
