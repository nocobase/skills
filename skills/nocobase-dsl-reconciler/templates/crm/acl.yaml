scopes:
  own_nb_crm_activities:
    collection: nb_crm_activities
    title: Own records
    filter:
      createdBy: true
  own_nb_crm_comments:
    collection: nb_crm_comments
    title: Own records
    filter:
      createdBy: true
  owner_contacts:
    collection: nb_crm_contacts
    title: Own contacts
    filter:
      $or:
        - owner_id:
            $eq: '{{$user.id}}'
        - customer:
            owner_id:
              $eq: '{{$user.id}}'
  1pmrrjvql73:
    collection: nb_crm_customers
    title: sales_customer
    filter:
      $and:
        - owner_id:
            $eq: '{{$user.id}}'
  owner_leads:
    collection: nb_crm_leads
    title: Own leads
    filter:
      $and:
        - owner_id:
            $eq: '{{$user.id}}'
  owner_opportunities:
    collection: nb_crm_opportunities
    title: Own opportunities
    filter:
      $and:
        - owner_id:
            $eq: '{{$user.id}}'
  own_nb_crm_quotation_items:
    collection: nb_crm_quotation_items
    title: Own records
    filter:
      createdBy: true
  owner_quotations:
    collection: nb_crm_quotations
    title: Own quotations
    filter:
      $and:
        - owner_id:
            $eq: '{{$user.id}}'
