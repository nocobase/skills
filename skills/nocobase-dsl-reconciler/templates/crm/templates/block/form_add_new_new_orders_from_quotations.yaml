uid: gu87q52q2tg
name: 'Form (Add new): New Orders from Quotations'
type: block
collectionName: nb_crm_orders
dataSourceKey: main
targetUid: c0141648ed2
content:
  key: createForm
  type: createForm
  coll: nb_crm_orders
  fields:
    - quotation
    - currency
    - exchange_rate
    - order_amount
    - owner
  field_layout:
    - - quotation
    - - currency
      - exchange_rate
      - order_amount
    - - owner
  actions:
    - submit
  fieldLinkageRules:
    - key: d3rxlfzox52
      title: Linkage rule
      enable: true
      condition:
        logic: $and
        items: []
      actions:
        - key: r4mhxlsel8c
          name: linkageAssignField
          params:
            value:
              field: currency
              assignValue: '{{ ctx.formValues.quotation.currencyInfo.name }}'
        - key: shxshn7eqy4
          name: linkageAssignField
          params:
            value:
              field: exchange_rate
              assignValue: '{{ ctx.formValues.quotation.exchange_rate }}'
        - key: keo3lxs632y
          name: linkageAssignField
          params:
            value:
              field: order_amount
              assignValue: '{{ ctx.formValues.quotation.total_amount }}'
