uid: sqw522ocqwx
name: Contacts View in Page
type: popup
collectionName: nb_crm_contacts
dataSourceKey: main
targetUid: zxsog8ixwmu
content:
  tabs:
    - title: Tab0
      blocks:
        - key: details
          type: details
          coll: nb_crm_contacts
          resource_binding:
            filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
          actions:
            - edit
    - title: Tab1
      blocks:
        - key: mailMessages
          type: mailMessages
          coll: mailMessages
          dataScope:
            logic: $or
            items:
              - path: from
                operator: contains
                value: '{{ ctx.popup.record.email }}'
              - path: to
                operator: contains
                value: '{{ ctx.popup.record.email }}'
          actions:
            - filter
            - refresh
            - addNew
            - ai:
                employee: ellis
                tasks: ./ai/contacts_view_in_page_tab1_mailMessages_tasks.yaml
      layout:
        - - mailMessages
    - title: Tab2
      blocks:
        - key: recordHistory
          type: recordHistory
          coll: nb_crm_contacts
          actions:
            - filter
            - refresh
