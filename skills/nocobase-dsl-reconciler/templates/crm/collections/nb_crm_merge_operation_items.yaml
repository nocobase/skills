name: nb_crm_merge_operation_items
title: Merge Operation Items
titleField: id
fields:
  - name: merge_operation_id
    interface: integer
  - name: main_sort
    interface: sort
  - name: merge_operation
    interface: m2o
    target: nb_crm_merge_operations
    foreignKey: merge_operation_id
  - name: customer_id
    interface: integer
  - name: status
    interface: select
    options:
      - value: pending
        label: Pending
        color: orange
      - value: merged
        label: Merged
        color: green
      - value: removed
        label: Removed
        color: red
  - name: customer
    interface: m2o
    target: nb_crm_customers
    foreignKey: customer_id
