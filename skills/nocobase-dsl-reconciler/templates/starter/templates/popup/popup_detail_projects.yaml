name: 'Popup (Detail): Projects'
type: popup
collectionName: nb_starter_projects
content:
  blocks:
    - key: details
      type: details
      coll: nb_starter_projects
      resource_binding:
        filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
      fields:
        - name
        - code
        - status
        - priority
        - start_date
        - end_date
        - owner
        - members
        - description
      field_layout:
        - '--- Basic Info ---'
        - - name
          - code
        - - status
          - priority
        - '--- Schedule ---'
        - - start_date
          - end_date
        - '--- Ownership ---'
        - - owner
        - - members
        - '--- Description ---'
        - - description
    - key: tasks
      type: table
      title: Tasks
      coll: nb_starter_tasks
      resource_binding:
        sourceId: '{{ctx.view.inputArgs.filterByTk}}'
        associationName: nb_starter_projects.tasks
      fields:
        - field: title
          clickToOpen: templates/popup/popup_detail_tasks.yaml
        - field: status
          width: 110
        - field: priority
          width: 110
        - field: assignee
          clickToOpen: templates/popup/popup_detail_users.yaml
        - field: due_date
          width: 120
      actions:
        - filter
        - refresh
        - addNew
  layout:
    - - details
    - - tasks
