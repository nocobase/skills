name: 'Form: Projects'
type: block
collectionName: nb_starter_projects
dataSourceKey: main
content:
  key: createForm
  type: createForm
  coll: nb_starter_projects
  fields:
    - name
    - code
    - status
    - priority
    - start_date
    - end_date
    - owner
    - field: members
      mode: picker
    - field: tasks
      type: subTable
      columns:
        - title
        - status
        - priority
        - assignee
        - due_date
    - description
  field_layout:
    - '--- Basic Info ---'
    - - name
      - code
    - - status
      - priority
    - '--- Schedule ---'
    - - start_date
      - end_date
    - '--- Ownership ---'
    - - owner
      - members
    - '--- Tasks ---'
    - - tasks
    - '--- Description ---'
    - - description
  actions:
    - submit
