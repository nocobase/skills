title: Tasks by Priority
chartType: bar
sql: |
  SELECT 
    CASE priority
      WHEN 'low' THEN 'Low'
      WHEN 'medium' THEN 'Medium'
      WHEN 'high' THEN 'High'
      WHEN 'urgent' THEN 'Urgent'
      ELSE priority
    END as label,
    COUNT(*) as value
  FROM nb_pm_tasks
  GROUP BY priority
  ORDER BY 
    CASE priority
      WHEN 'urgent' THEN 1
      WHEN 'high' THEN 2
      WHEN 'medium' THEN 3
      WHEN 'low' THEN 4
      ELSE 5
    END
render_file: ./charts/task_priority_render.js
