# enhance.yaml - AddNew popups with auto-derived edit + detail popups
popups:

# ========== Projects Page ==========
- target: $projects.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_pm_projects
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - name
    - code
    - status
    - priority
    - start_date
    - end_date
    - budget
    - progress_percent
    - description
    field_layout:
    - '--- Basic Info ---'
    - - name
      - code
    - - status
      - priority
    - '--- Timeline & Budget ---'
    - - start_date
      - end_date
    - - budget
      - progress_percent
    - '--- Description ---'
    - - description
    actions: [submit]

