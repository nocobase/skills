module: Customers Copy
icon: fundoutlined
group: Main Copy
pages:
- page: Customers Copy
  coll: nb_crm_customers
  icon: fundoutlined
  tabs:
  - title: Customers
    blocks:
    - key: table
      type: table
      coll: nb_crm_customers
      dataScope:
        logic: $or
        items:
        - logic: $and
          items:
          - path: createdAt
            operator: $dateBetween
            value: '{{ ctx.urlSearchParams.month }}'
            noValue: false
      fields:
      - name
      - type
      - region
      - level
      - status
      - owner
      js_columns:
      - title: Health Score
        desc: Health Score Column
        file: ./js/customers_customers_table_col_health_score.js
      - title: Last Activity
        desc: Last Activity Column - Leads Module
        file: ./js/customers_customers_table_col_last_activity.js
      actions:
      - filter
      - refresh
      - addNew
      - type: workflowTrigger
        stepParams:
          customCollectionTriggerWorkflowsActionSettings:
            setContextType:
              type: 2
            triggerWorkflows:
              group:
              - __DO_NOT_USE_THIS_PROPERTY_index__: 0
                workflowKey: ykqda4g2xie
          buttonSettings:
            general:
              title: Customer Merge
              icon: branchesoutlined
      - type: ai
        employee: viz
        tasks_file: ./ai/98eb45ca_tasks.yaml
    - key: filterForm
      type: filterForm
      fields:
      - field: name
        label: Search
      js_items:
      - desc: Customer Stats Filter Block
        file: ./js/customers_customers_filterForm_customer_stats_filter_block.js
    layout:
    - - filterForm
    - - table
  - title: Merge
    blocks:
    - key: jsBlock
      type: jsBlock
      file: ./js/customers_merge_jsBlock.js
    layout: []
