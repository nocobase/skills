target: $customers_copy.table.fields.name
field: name
field_uid: 95effc54287
mode: embed
tabs:
- blocks:
  - key: details
    type: details
    coll: nb_crm_customers
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - level
    - type
    - scale
    - region
    js_items:
    - desc: Customer Statistics Block
      file: ./js/popup_customers_name_tab0_details_customer_statistics_block.js
    - desc: item_profile - Customer Profile Header
      file: ./js/popup_customers_name_tab0_details_item_profile_customer_profile_header.js
    field_layout:
    - - '[JS:item_profile - Customer Profile Header]'
    - - level
      - scale
      - region
      - type
    - - '[JS:Customer Statistics Block]'
    actions:
    - edit
  - key: details_2
    type: details
    coll: nb_crm_customers
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: AI Smart Profile Block
      file: ./js/popup_customers_name_tab0_details_2_ai_smart_profile_block.js
  - key: contacts
    type: list
    title: Contacts
    coll: nb_crm_contacts
    resource_binding:
      associationName: nb_crm_customers.contacts
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
  - key: opportunities
    type: list
    title: Opportunities
    coll: nb_crm_opportunities
    resource_binding:
      associationName: nb_crm_customers.opportunities
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
  - key: comments
    type: comments
    coll: nb_crm_comments
    resource_binding:
      associationName: nb_crm_customers.comments
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
  layout:
  - - col:
      - details
      - opportunities
      size: 16
    - col:
      - contacts
      - details_2
      - comments
      size: 8
  popups:
  - field: edit
    field_uid: 6d508fea8c2
    popup_page_uid: db8d9d9c5aa
    block_key: details
  title: Tab0
- blocks:
  - key: recordHistory
    type: recordHistory
    coll: nb_crm_customers
    actions:
    - filter
    - refresh
  title: Tab1
