      - amount
      - currency
      - stage
      - lead_source
      - contact
      - customer
      - expected_close_date
      - win_probability
      actions:
      - filter
      - refresh
      - addNew
      - type: ai
        employee: viz
        tasks_file: ./ai/eb930c5a_tasks.yaml
      event_flows:
      - event:
          eventName: beforeRender
          defaultParams:
            condition:
              items: []
              logic: $and
        flow_key: 858jqylowfr
        step_key: vf3lwi5tk73
        desc: 858jqylowfr
        file: ./js/opportunities_table_tpl_table_event_858jqylowfr_vf3lwi5tk73.js
    layout:
    - - filterForm
    - - table
