module: Opportunities Copy
icon: fundoutlined
group: Main Copy
pages:
- page: Opportunities Copy
  coll: nb_crm_opportunities
  icon: fundoutlined
  tabs:
  - title: Pipeline
    blocks:
    - key: pipeline_header_block
      type: jsBlock
      desc: Pipeline Header Block
      file: ./js/opportunities_pipeline_pipeline_header_block.js
    - key: kanban_board_block_resource_based
      type: jsBlock
      desc: Kanban Board Block (Resource-based)
      file: ./js/opportunities_pipeline_kanban_board_block_resource_based.js
    layout:
    - - pipeline_header_block
    - - kanban_board_block_resource_based
  - title: Table
    blocks:
    - key: filterForm
      type: filterForm
      fields:
