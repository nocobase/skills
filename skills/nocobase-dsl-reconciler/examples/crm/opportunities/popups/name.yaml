target: $opportunities_copy.table.fields.name
field: name
field_uid: fc8f91d937e
mode: embed
tabs:
- blocks:
  - key: details
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - customer
    - contact
    - owner
    - createdAt
    js_items:
    - desc: Opportunity Key Stats Block
      file: ./js/popup_opportunities_name_tab0_details_opportunity_key_stats_block.js
    field_layout:
    - - '---'
    - - customer
      - contact
      - owner
      - createdAt
    actions:
    - edit
  - key: ai_smart_analysis
    type: details
    title: AI Smart Analysis
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: AI Risk Analysis
      file: ./js/popup_opportunities_name_tab0_ai_smart_analysis_ai_risk_analysis.js
    field_layout:
    - - '[JS:AI Risk Analysis]'
  - key: quotations
    type: table
    title: Quotations
    coll: nb_crm_quotations
    resource_binding:
      associationName: nb_crm_opportunities.quotations
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - quotation_no
    - currencyInfo
    - discount_rate
    - status
    - total_amount_usd
    - total_amount
    - version
    - createdAt
    actions:
    - filter
    - refresh
    - addNew
    event_flows:
    - event:
        eventName: beforeRender
        defaultParams:
          condition:
            items: []
            logic: $and
      flow_key: 4z3wblmtie1
      step_key: 9ibklmbe1vr
      desc: 4z3wblmtie1
      file: ./js/popup_opportunities_name_tab0_quotations_event_4z3wblmtie1_9ibklmbe1vr.js
  - key: comments
    type: comments
    coll: nb_crm_comments
    resource_binding:
      associationName: nb_crm_opportunities.comments
      sourceId: '{{ctx.view.inputArgs.filterByTk}}'
  - key: attachments
    type: details
    title: Attachments
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
    - attachments
    actions:
    - edit
  - key: details_2
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: Opportunity Stage Flow Block
      file: ./js/popup_opportunities_name_tab0_details_2_opportunity_stage_flow_block.js
  - key: details_3
    type: details
    coll: nb_crm_opportunities
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    js_items:
    - desc: Quote Status Flow Block
      file: ./js/popup_opportunities_name_tab0_details_3_quote_status_flow_block.js
  layout:
  - - col:
      - details
      - details_2
      - ai_smart_analysis
      - quotations
      - details_3
      size: 17
    - col:
      - attachments
      - comments
      size: 7
  popups:
  - field: quotation_no
    field_uid: d86a47d422c
    mode: drawer
    popup_page_uid: dfd9e2bcc4b
  - field: addnew
    field_uid: 694763bbe38
    popup_page_uid: 781ffa74340
    block_key: quotations
  - field: edit
    field_uid: 75c7fe03c8e
    popup_page_uid: f161da30485
    block_key: attachments
  title: Tab0
- blocks: []
  title: Tab1
- blocks:
  - key: recordHistory
    type: recordHistory
    coll: nb_crm_opportunities
    actions:
    - filter
    - refresh
    - historyExpand
    - historyCollapse
  title: Tab2
