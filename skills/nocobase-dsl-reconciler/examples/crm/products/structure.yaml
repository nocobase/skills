module: Products Copy
icon: fundoutlined
group: Main Copy
pages:
- page: Products Copy
  coll: nb_crm_products
  icon: fundoutlined
  tabs:
  - title: Products
    blocks:
    - key: table
      type: table
      coll: nb_crm_products
      fields:
      - name
      - product_code
      - list_price
      - cost_price
      - base_currency
      - unit
      - specification
      - category
      actions:
      - filter
      - refresh
      - addNew
    - key: category_tree_filter_product_category_sidebar
      type: jsBlock
      desc: Category Tree Filter - Product Category Sidebar
      file: ./js/products_products_category_tree_filter_product_category_sidebar.js
    layout:
    - - category_tree_filter_product_category_sidebar: 5
      - table: 19
  - title: Categories
    blocks:
    - key: table
      type: table
      coll: nb_crm_product_categories
      fields:
      - name
      - category_code
      - description
      actions:
      - filter
      - refresh
      - addNew
      recordActions:
      - AddChildAction
    layout: []
