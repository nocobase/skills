module: Overview Copy
icon: fundoutlined
group: Main Copy
pages:
- page: Overview Copy
  coll: nb_crm_activities
  icon: fundoutlined
  blocks:
  - key: jsBlock
    type: jsBlock
    file: ./js/overview_jsBlock.js
  - key: today_s_tasks
    type: table
    title: Today's Tasks
    coll: nb_crm_activities
    dataScope:
      logic: $and
      items:
      - path: type
        operator: $eq
        value: task
        noValue: false
      - path: activity_date
        operator: $dateOn
        value:
          type: today
        noValue: false
    pageSize: 5
    fields:
    - subject
    - activity_date
    actions:
    - filter
    - refresh
    - link
    - addNew
    - type: ai
      employee: viz
      tasks_file: ./ai/d120202a_tasks.yaml
    recordActions:
    - type: updateRecord
      stepParams:
        buttonSettings:
          general:
            type: link
            icon: borderoutlined
            title: ''
            tooltip: Done
          linkageRules:
            value:
            - key: b3sslz489mz
              title: Linkage rule
              enable: true
              condition:
                logic: $and
                items:
                - path: '{{ ctx.record.is_completed }}'
                  operator: $isTruly
                  value: true
                  noValue: true
              actions:
              - key: 7vkb9ycu38p
                name: linkageSetActionProps
                params:
                  value: hidden
        apply:
          apply:
            requestConfig:
              params: {}
        assignSettings:
          assignFieldValues:
            assignedValues:
              is_completed: true
    - type: updateRecord
      stepParams:
        buttonSettings:
          general:
            type: link
            icon: checksquareoutlined
            title: ''
            tooltip: Undone
          linkageRules:
            value:
            - key: 58gvmf25gyv
              title: Linkage rule
              enable: true
              condition:
                logic: $or
                items:
                - path: '{{ ctx.record.is_completed }}'
                  operator: $isFalsy
                  value: true
                  noValue: true
                - path: '{{ ctx.record.is_completed }}'
                  operator: $empty
                  value: true
                  noValue: true
              actions:
              - key: icy53b81fdq
                name: linkageSetActionProps
                params:
                  value: hidden
        apply:
          apply:
            requestConfig:
              params: {}
        assignSettings:
          assignFieldValues:
            assignedValues: {}
  - key: high_score_leads
    type: table
    title: High Score Leads
    coll: nb_crm_leads
    dataScope:
      logic: $and
      items:
      - path: status
        operator: $in
        value:
        - new
        - working
        noValue: false
      - path: ai_score
        operator: $gte
        value: '75'
        noValue: false
    pageSize: 5
    fields:
    - name
    - ai_next_best_action
    - updatedAt
    js_columns:
    - title: AI Score
      desc: AI Score Column
      file: ./js/overview_high_score_leads_col_ai_score.js
    actions:
    - filter
    - refresh
    - link
    - type: ai
      employee: viz
  - key: activity_calendar_block
    type: jsBlock
    desc: Activity Calendar Block
    file: ./js/overview_activity_calendar_block.js
  layout:
  - - jsBlock
  - - high_score_leads: 16
    - today_s_tasks: 8
  - - activity_calendar_block
