# CRM Opportunities — addNew popup with auto-derived edit + detail
popups:
- target: $opportunities.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_crm_opportunities
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - name
    - lead_source
    - amount
    - currency
    - stage
    - win_probability
    - expected_close_date
    - customer
    - contact
    field_layout:
    - '--- Basic Info ---'
    - - name
      - lead_source
    - '--- Financial ---'
    - - amount
      - currency
    - - stage
      - win_probability
    - - expected_close_date
    - '--- Relations ---'
    - - customer
      - contact
    actions:
    - submit
