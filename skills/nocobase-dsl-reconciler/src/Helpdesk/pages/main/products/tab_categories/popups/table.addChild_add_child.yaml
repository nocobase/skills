target: $SELF.table.recordActions.addChild_add_child
mode: dialog
blocks:
  - key: createForm
    type: createForm
    coll: nb_crm_product_categories
    resource_binding:
      associationName: nb_crm_product_categories.children
      sourceId: '{{ctx.view.inputArgs.sourceId}}'
    fields:
      - name
      - description
      - sort_order
    field_layout:
      - - name
      - - description
      - - sort_order
    actions:
      - submit
