target: $SELF.details.actions.popup_convert
mode: dialog
blocks:
  - key: editForm
    type: editForm
    coll: nb_crm_leads
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
      - converted_customer
      - converted_contact
      - converted_opportunity
      - status
    field_layout:
      - - converted_customer
      - - converted_contact
      - - converted_opportunity
      - - status
    actions:
      - submit
    fieldLinkageRules:
      - key: a0asbp75z5w
        title: Linkage rule
        enable: true
        condition:
          logic: $and
          items: []
        actions:
          - key: hvbhuxm0i49
            name: linkageAssignField
            params:
              value:
                field: status
                assignValue: qualified
          - key: sllj5o0a4rk
            name: linkageSetFieldProps
            params:
              value:
                fields:
                  - status
                state: hiddenReservedValue
