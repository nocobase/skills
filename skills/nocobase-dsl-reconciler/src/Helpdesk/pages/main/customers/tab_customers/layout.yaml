blocks:
  - key: filterForm
    type: filterForm
    coll: nb_crm_customers
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - account_number
          - phone
          - website
          - industry
    js_items:
      - key: customer_stats_filter_block
        file: ./js/customers_customers_filterForm_customer_stats_filter_block.js
        desc: Customer Stats Filter Block
    field_layout:
      - - '[JS:Customer Stats Filter Block]'
      - - name
  - key: table
    type: table
    coll: nb_crm_customers
    dataScope:
      logic: $or
      items:
        - logic: $and
          items:
            - path: createdAt
              operator: $dateBetween
              value: '{{ ctx.urlSearchParams.month }}'
    fields:
      - field: name
        clickToOpen: templates/popup/customer_view.yaml
      - type
      - region
      - field: level
        width: 100
      - field: status
        width: 100
      - owner
    js_columns:
      - key: health_score
        field: ''
        file: ./js/customers_customers_table_col_health_score.js
        title: Health Score
        desc: Health Score Column
      - key: last_activity
        field: ''
        file: ./js/customers_customers_table_col_last_activity.js
        title: Last Activity
        desc: Last Activity Column - Leads Module
    column_order:
      - name
      - type
      - region
      - level
      - status
      - '[JS:health_score]'
      - owner
      - '[JS:last_activity]'
    actions:
      - filter
      - refresh
      - addNew
      - type: workflowTrigger
        stepParams:
          customCollectionTriggerWorkflowsActionSettings:
            setContextType:
              type: 2
            triggerWorkflows:
              group:
                - __DO_NOT_USE_THIS_PROPERTY_index__: 0
                  workflowKey: ykqda4g2xie
          buttonSettings:
            general:
              title: Customer Merge
              icon: branchesoutlined
        key: workflowTrigger_customer_merge
      - type: ai
        employee: viz
        tasks_file: ./ai/customers_customers_table_tasks.yaml
layout:
  - - filterForm
  - - table
