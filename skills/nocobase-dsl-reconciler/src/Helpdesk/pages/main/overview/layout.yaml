blocks:
  - type: jsBlock
    key: jsBlock
    file: ./js/overview_jsBlock.js
  - key: high_score_leads
    type: table
    title: High Score Leads
    coll: nb_crm_leads
    filter:
      status.$in:
        - new
        - working
      ai_score.$gte: '75'
    pageSize: 5
    fields:
      - field: name
        clickToOpen: templates/popup/leads_view.yaml
      - field: ai_next_best_action
        width: 300
      - updatedAt
    js_columns:
      - key: ai_score
        field: ''
        file: ./js/overview_high_score_leads_col_ai_score.js
        title: AI Score
        desc: AI Score Column
    column_order:
      - name
      - '[JS:ai_score]'
      - ai_next_best_action
      - updatedAt
    actions:
      - filter
      - refresh
      - type: link
        title: View All
        icon: arrowrightoutlined
        url: /admin/e9478uhrdve
      - type: ai
        employee: viz
  - key: today_s_tasks
    type: table
    title: Today's Tasks
    coll: nb_crm_activities
    filter:
      type.$eq: task
      activity_date.$dateOn:
        type: today
    pageSize: 5
    fields:
      - field: subject
        clickToOpen: templates/popup/activity_view.yaml
      - activity_date
    recordActions:
      - type: updateRecord
        key: updateRecord_done
        icon: borderoutlined
        tooltip: Done
        style: link
        assign:
          is_completed: true
        linkageRules:
          value:
            - title: Linkage rule
              enable: true
              condition:
                logic: $and
                items:
                  - path: '{{ ctx.record.is_completed }}'
                    operator: $isTruly
                    value: true
              actions:
                - name: linkageSetActionProps
                  params:
                    value: hidden
      - type: updateRecord
        key: updateRecord_undone
        icon: checksquareoutlined
        tooltip: Undone
        style: link
        linkageRules:
          value:
            - title: Linkage rule
              enable: true
              condition:
                logic: $or
                items:
                  - path: '{{ ctx.record.is_completed }}'
                    operator: $isFalsy
                    value: true
                  - path: '{{ ctx.record.is_completed }}'
                    operator: $empty
                    value: true
              actions:
                - name: linkageSetActionProps
                  params:
                    value: hidden
    actions:
      - filter
      - refresh
      - type: link
        title: View All
        icon: arrowrightoutlined
        url: /admin/n6bh6s6isej
      - addNew
      - type: ai
        employee: viz
        tasks_file: ./ai/overview_today_s_tasks_tasks.yaml
  - type: jsBlock
    key: activity_calendar_block
    file: ./js/overview_activity_calendar_block.js
    desc: Activity Calendar Block
layout:
  - - jsBlock
  - - high_score_leads: 16
    - today_s_tasks: 8
  - - activity_calendar_block
