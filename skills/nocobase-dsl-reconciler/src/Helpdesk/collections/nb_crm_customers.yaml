name: nb_crm_customers
title: Customers
titleField: name
fields:
  - name: orders
    interface: o2m
    target: nb_crm_orders
    foreignKey: customer_id
  - name: quotations
    interface: o2m
    target: nb_crm_quotations
    foreignKey: customer_id
  - name: phone
    interface: input
  - name: ai_health_grade
    interface: input
  - name: ai_health_assessed_at
    interface: datetime
  - name: owner
    interface: m2o
    target: users
    foreignKey: owner_id
  - name: ai_tags
    interface: json
  - name: contacts
    interface: o2m
    target: nb_crm_contacts
    foreignKey: customer_id
  - name: is_deleted
    interface: checkbox
  - name: account_number
    interface: sequence
  - name: ai_churn_risk
    interface: percent
  - name: owner_id
    interface: integer
  - name: industry
    interface: select
    options:
      - value: technology
        label: Technology
        color: blue
      - value: finance
        label: Finance
        color: gold
      - value: healthcare
        label: Healthcare
        color: green
      - value: manufacturing
        label: Manufacturing
        color: orange
      - value: retail
        label: Retail
        color: purple
      - value: education
        label: Education
        color: cyan
      - value: real_estate
        label: Real Estate
        color: magenta
      - value: consulting
        label: Consulting
        color: geekblue
      - value: logistics
        label: Logistics
        color: volcano
      - value: energy
        label: Energy
        color: lime
      - value: other
        label: Other
        color: default
  - name: parent_id
    interface: integer
  - name: ai_recommendations
    interface: json
  - name: parent
    interface: m2o
    target: nb_crm_customers
    foreignKey: parent_id
  - name: annual_revenue
    interface: select
    options:
      - value: <1M
        label: < $1M
        color: default
      - value: 1M-10M
        label: $1M - $10M
        color: blue
      - value: 10M-50M
        label: $10M - $50M
        color: cyan
      - value: 50M-100M
        label: $50M - $100M
        color: green
      - value: 100M-500M
        label: $100M - $500M
        color: lime
      - value: 500M-1B
        label: $500M - $1B
        color: orange
      - value: 1B-10B
        label: $1B - $10B
        color: gold
      - value: 10B-100B
        label: $10B - $100B
        color: red
      - value: '>100B'
        label: '> $100B'
        color: magenta
  - name: contact_mail
    interface: o2m
    target: nb_crm_v_mail_contact
    foreignKey: customer_id
  - name: ai_next_best_action
    interface: textarea
  - name: opportunities
    interface: o2m
    target: nb_crm_opportunities
    foreignKey: customer_id
  - name: activities
    interface: o2m
    target: nb_crm_activities
    foreignKey: customer_id
  - name: region
    interface: m2o
    target: nb_cbo_regions
    foreignKey: region_id
  - name: ai_health_score
    interface: integer
  - name: ai_churn_risk_level
    interface: input
  - name: ai_best_contact_time
    interface: input
  - name: description
    interface: textarea
  - name: name
    interface: input
  - name: comments
    interface: o2m
    target: nb_crm_comments
    foreignKey: customer_id
  - name: number_of_employees
    interface: select
    options:
      - value: 1-10
        label: 1-10
        color: default
      - value: 11-50
        label: 11-50
        color: blue
      - value: 51-200
        label: 51-200
        color: cyan
      - value: 201-500
        label: 201-500
        color: green
      - value: 501-1000
        label: 501-1000
        color: orange
      - value: 1001-5000
        label: 1001-5000
        color: gold
      - value: 5000+
        label: 5000+
        color: red
  - name: region_id
    interface: integer
  - name: extra
    interface: json
  - name: type
    interface: select
    options:
      - value: prospect
        label: Prospect
        color: blue
      - value: customer
        label: Customer
        color: green
      - value: partner
        label: Partner
        color: purple
      - value: competitor
        label: Competitor
        color: red
  - name: preferred_currency
    interface: select
    options:
      - value: CNY
        label: CNY ¥
        color: red
      - value: USD
        label: USD $
        color: green
      - value: EUR
        label: EUR €
        color: blue
      - value: GBP
        label: GBP £
        color: purple
      - value: JPY
        label: JPY ¥
        color: orange
  - name: ai_health_dimensions
    interface: json
  - name: ai_nba_generated_at
    interface: datetime
  - name: level
    interface: select
    options:
      - value: normal
        label: Normal
        color: default
      - value: important
        label: Important
        color: orange
      - value: vip
        label: VIP
        color: gold
  - name: website
    interface: textarea
  - name: source_lead_id
    interface: integer
  - name: country
    interface: input
  - name: merge_operation_items
    interface: o2m
    target: nb_crm_merge_operation_items
    foreignKey: customer_id
  - name: address
    interface: textarea
  - name: status
    interface: select
    options:
      - value: potential
        label: Potential
        color: blue
      - value: active
        label: Active
        color: green
      - value: dormant
        label: Dormant
        color: orange
      - value: churned
        label: Churned
        color: red
      - value: disabled
        label: Disabled
        color: default
