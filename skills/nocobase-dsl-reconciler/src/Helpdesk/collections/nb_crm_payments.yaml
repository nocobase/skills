name: nb_crm_payments
title: Payments
titleField: bank_account
fields:
  - name: bank_account
    interface: input
  - name: order
    interface: m2o
    target: nb_crm_orders
    foreignKey: order_id
  - name: customer
    interface: m2o
    target: nb_crm_customers
    foreignKey: customer_id
  - name: currency
    interface: select
    options:
      - value: CNY
        label: CNY ¥
        color: red
      - value: USD
        label: USD $
        color: green
      - value: EUR
        label: EUR €
        color: blue
      - value: GBP
        label: GBP £
        color: purple
      - value: JPY
        label: JPY ¥
        color: orange
  - name: amount
    interface: number
  - name: customer_id
    interface: integer
  - name: payment_no
    interface: sequence
  - name: order_id
    interface: integer
  - name: payment_method
    interface: select
    options:
      - value: transfer
        label: Bank Transfer
        color: blue
      - value: check
        label: Check
        color: cyan
      - value: cash
        label: Cash
        color: green
      - value: credit_card
        label: Credit Card
        color: purple
      - value: lc
        label: Letter of Credit
        color: orange
  - name: payment_date
    interface: dateOnly
  - name: bank_name
    interface: input
  - name: notes
    interface: textarea
