module: Inventory Management
icon: fundoutlined

collections:
  nb_inv_products:
    title: Products
    fields:
    - name: sku
      interface: input
      title: SKU
      required: true
    - name: name
      interface: input
      title: Product Name
      required: true
    - name: category
      interface: select
      title: Category
      options: [Electronics, Clothing, Food, Furniture, Tools, Other]
    - name: unit
      interface: select
      title: Unit
      options: [Piece, Box, kg, Liter, Meter, Pack]
    - name: unitPrice
      interface: number
      title: Unit Price
    - name: stockQuantity
      interface: integer
      title: Stock Quantity
    - name: reorderLevel
      interface: integer
      title: Reorder Level
    - name: description
      interface: textarea
      title: Description
    - name: supplier
      interface: m2o
      title: Supplier
      target: nb_inv_suppliers

  nb_inv_suppliers:
    title: Suppliers
    fields:
    - name: code
      interface: input
      title: Supplier Code
      required: true
    - name: name
      interface: input
      title: Supplier Name
      required: true
    - name: contactPerson
      interface: input
      title: Contact Person
    - name: email
      interface: email
      title: Email
    - name: phone
      interface: phone
      title: Phone
    - name: address
      interface: textarea
      title: Address
    - name: status
      interface: select
      title: Status
      options: [Active, Inactive, Suspended]
    - name: rating
      interface: select
      title: Rating
      options: [A, B, C, D]

  nb_inv_warehouses:
    title: Warehouses
    fields:
    - name: code
      interface: input
      title: Warehouse Code
      required: true
    - name: name
      interface: input
      title: Warehouse Name
      required: true
    - name: location
      interface: input
      title: Location
    - name: manager
      interface: input
      title: Manager
    - name: capacity
      interface: integer
      title: Capacity
    - name: status
      interface: select
      title: Status
      options: [Active, Inactive, Maintenance]
    - name: contactPhone
      interface: phone
      title: Contact Phone
    - name: address
      interface: textarea
      title: Address

  nb_inv_stock_movements:
    title: Stock Movements
    fields:
    - name: movementType
      interface: select
      title: Movement Type
      options: [Inbound, Outbound, Transfer]
      required: true
    - name: product
      interface: m2o
      title: Product
      target: nb_inv_products
      required: true
    - name: warehouse
      interface: m2o
      title: Warehouse
      target: nb_inv_warehouses
      required: true
    - name: quantity
      interface: integer
      title: Quantity
      required: true
    - name: referenceNo
      interface: input
      title: Reference No
    - name: movementDate
      interface: datetime
      title: Movement Date
    - name: notes
      interface: textarea
      title: Notes
    - name: createdBy
      interface: input
      title: Created By

pages:
- page: Dashboard
  icon: dashboardoutlined
  blocks:
  - key: kpi_1
    type: jsBlock
    desc: KPI Card 1
    file: ./js/kpi_1.js
  - key: kpi_2
    type: jsBlock
    desc: KPI Card 2
    file: ./js/kpi_2.js
  - key: kpi_3
    type: jsBlock
    desc: KPI Card 3
    file: ./js/kpi_3.js
  - key: kpi_4
    type: jsBlock
    desc: KPI Card 4
    file: ./js/kpi_4.js
  - key: chart_1
    type: chart
    chart_config: ./charts/chart_1.yaml
  - key: chart_2
    type: chart
    chart_config: ./charts/chart_2.yaml
  - key: chart_3
    type: chart
    chart_config: ./charts/chart_3.yaml
  - key: chart_4
    type: chart
    chart_config: ./charts/chart_4.yaml
  - key: chart_5
    type: chart
    chart_config: ./charts/chart_5.yaml
  layout:
  - - kpi_1: 6
    - kpi_2: 6
    - kpi_3: 6
    - kpi_4: 6
  - - chart_1: 15
    - chart_2: 9
  - - chart_3
  - - chart_4: 14
    - chart_5: 10

- page: Products
  coll: nb_inv_products
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_products
    fields:
    - field: name
      label: Search
      filterPaths: [name, sku]
    - field: category
    - field: supplier
  - key: table
    type: table
    coll: nb_inv_products
    fields: [sku, name, category, unitPrice, stockQuantity, reorderLevel, supplier]
    actions: [filter, refresh, addNew, export]
    recordActions: [edit, delete]
  layout:
  - - filterForm
  - - table

- page: Suppliers
  coll: nb_inv_suppliers
  icon: teamoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_suppliers
    fields:
    - field: name
      label: Search
      filterPaths: [name, code]
    - field: status
    - field: rating
  - key: table
    type: table
    coll: nb_inv_suppliers
    fields: [code, name, contactPerson, email, phone, status, rating]
    actions: [filter, refresh, addNew, export]
    recordActions: [edit, delete]
  layout:
  - - filterForm
  - - table

- page: Warehouses
  coll: nb_inv_warehouses
  icon: databaseoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_warehouses
    fields:
    - field: name
      label: Search
      filterPaths: [name, code]
    - field: status
    - field: location
  - key: table
    type: table
    coll: nb_inv_warehouses
    fields: [code, name, location, manager, capacity, status]
    actions: [filter, refresh, addNew, export]
    recordActions: [edit, delete]
  layout:
  - - filterForm
  - - table

- page: Stock Movements
  coll: nb_inv_stock_movements
  icon: swapoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_stock_movements
    fields:
    - field: referenceNo
      label: Search
      filterPaths: [referenceNo, notes]
    - field: movementType
    - field: movementDate
  - key: table
    type: table
    coll: nb_inv_stock_movements
    fields: [movementType, product, warehouse, quantity, referenceNo, movementDate, createdBy]
    actions: [filter, refresh, addNew, export]
    recordActions: [edit, delete]
  layout:
  - - filterForm
  - - table
