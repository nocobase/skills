module: Inventory Management
icon: shopoutlined
pages:

# ============================================
# Dashboard - Overview with stats
# ============================================
- page: Dashboard
  coll: nb_inv_products
  icon: dashboardoutlined
  blocks:
  - key: kpi_products
    type: kpi
    title: Total Products
    coll: nb_inv_products
    color: blue
  - key: kpi_low_stock
    type: kpi
    title: Low Stock Alert
    coll: nb_inv_products
    filter: stock_qty <= min_stock
    color: red
  - key: kpi_pending_po
    type: kpi
    title: Pending POs
    coll: nb_inv_purchase_orders
    filter: status = draft
    color: orange
  - key: kpi_pending_so
    type: kpi
    title: Pending SOs
    coll: nb_inv_sales_orders
    filter: status = draft
    color: green
  - key: recent_products
    type: table
    title: Recent Products
    coll: nb_inv_products
    pageSize: 5
    fields:
    - name
    - sku
    - category_id
    - stock_qty
    - status
    actions:
    - filter
    - refresh
    - link
  - key: recent_pos
    type: table
    title: Recent Purchase Orders
    coll: nb_inv_purchase_orders
    pageSize: 5
    fields:
    - po_no
    - supplier
    - order_date
    - status
    - total_amount
    actions:
    - filter
    - refresh
    - link
  - key: recent_sos
    type: table
    title: Recent Sales Orders
    coll: nb_inv_sales_orders
    pageSize: 5
    fields:
    - so_no
    - customer
    - order_date
    - status
    - total_amount
    actions:
    - filter
    - refresh
    - link
  layout:
  - - kpi_products: 6
    - kpi_low_stock: 6
    - kpi_pending_po: 6
    - kpi_pending_so: 6
  - - recent_products: 8
    - recent_pos: 8
    - recent_sos: 8

# ============================================
# Products Page
# ============================================
- page: Products
  coll: nb_inv_products
  icon: tagoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_products
    fields:
    - field: name
      label: Search
      filterPaths: [name, sku, warehouse]
    - category_id
    - status
  - key: table
    type: table
    coll: nb_inv_products
    fields:
    - name
    - sku
    - category_id
    - unit_price
    - stock_qty
    - min_stock
    - warehouse
    - status
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

# ============================================
# Categories Page
# ============================================
- page: Categories
  coll: nb_inv_categories
  icon: folderoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_categories
    fields:
    - field: name
      label: Search
      filterPaths: [name, code]
    - parent_id
  - key: table
    type: table
    coll: nb_inv_categories
    fields:
    - name
    - code
    - parent_id
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

# ============================================
# Purchase Orders Page
# ============================================
- page: Purchase Orders
  coll: nb_inv_purchase_orders
  icon: shoppingcartoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_purchase_orders
    fields:
    - field: po_no
      label: Search
      filterPaths: [po_no, supplier]
    - status
  - key: table
    type: table
    coll: nb_inv_purchase_orders
    fields:
    - po_no
    - supplier
    - order_date
    - status
    - total_amount
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

# ============================================
# Sales Orders Page
# ============================================
- page: Sales Orders
  coll: nb_inv_sales_orders
  icon: exportoutlined
  blocks:
  - key: filterForm
    type: filterForm
    coll: nb_inv_sales_orders
    fields:
    - field: so_no
      label: Search
      filterPaths: [so_no, customer]
    - status
  - key: table
    type: table
    coll: nb_inv_sales_orders
    fields:
    - so_no
    - customer
    - order_date
    - status
    - total_amount
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

# ============================================
# Collections Schema
# ============================================
collections:

  nb_inv_categories:
    title: Categories
    tree: adjacency-list
    fields:
    - name: name
      interface: input
      required: true
    - name: code
      interface: input
      required: true
    - name: parent_id
      interface: m2o
      target: nb_inv_categories
      foreignKey: parent_id
      title: Parent Category
    titleField: name

  nb_inv_products:
    title: Products
    fields:
    - name: sku
      interface: input
      required: true
    - name: name
      interface: input
      required: true
    - name: category_id
      interface: m2o
      target: nb_inv_categories
      foreignKey: category_id
      title: Category
    - name: unit_price
      interface: number
      precision: 2
    - name: cost_price
      interface: number
      precision: 2
    - name: stock_qty
      interface: integer
      title: Stock Quantity
    - name: min_stock
      interface: integer
      title: Min Stock Level
    - name: warehouse
      interface: input
    - name: status
      interface: select
      enum:
      - value: active
        label: Active
        color: green
      - value: discontinued
        label: Discontinued
        color: red
      default: active
    titleField: name

  nb_inv_purchase_orders:
    title: Purchase Orders
    fields:
    - name: po_no
      interface: input
      required: true
      title: PO Number
    - name: supplier
      interface: input
      required: true
    - name: order_date
      interface: date
    - name: status
      interface: select
      enum:
      - value: draft
        label: Draft
        color: default
      - value: ordered
        label: Ordered
        color: blue
      - value: received
        label: Received
        color: green
      - value: cancelled
        label: Cancelled
        color: red
      default: draft
    - name: total_amount
      interface: number
      precision: 2
    titleField: po_no

  nb_inv_sales_orders:
    title: Sales Orders
    fields:
    - name: so_no
      interface: input
      required: true
      title: SO Number
    - name: customer
      interface: input
      required: true
    - name: order_date
      interface: date
    - name: status
      interface: select
      enum:
      - value: draft
        label: Draft
        color: default
      - value: confirmed
        label: Confirmed
        color: blue
      - value: shipped
        label: Shipped
        color: orange
      - value: delivered
        label: Delivered
        color: green
      default: draft
    - name: total_amount
      interface: number
      precision: 2
    titleField: so_no
