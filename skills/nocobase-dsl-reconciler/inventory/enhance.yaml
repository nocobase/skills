popups:
# Products
- target: $products.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_inv_products
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [sku, name, category, unit, unitPrice, stockQuantity, reorderLevel, description, supplier]
    field_layout:
    - '--- Basic Info ---'
    - - sku
      - name
    - - category
      - unit
    - '--- Pricing & Stock ---'
    - - unitPrice
      - stockQuantity
    - - reorderLevel
    - '--- Additional Info ---'
    - - supplier
    - - description
    actions: [submit]

# Suppliers
- target: $suppliers.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_inv_suppliers
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [code, name, contactPerson, email, phone, address, status, rating]
    field_layout:
    - '--- Company Info ---'
    - - code
      - name
    - '--- Contact ---'
    - - contactPerson
      - email
    - - phone
    - - address
    - '--- Status ---'
    - - status
      - rating
    actions: [submit]

# Warehouses
- target: $warehouses.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_inv_warehouses
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [code, name, location, manager, capacity, status, contactPhone, address]
    field_layout:
    - '--- Warehouse Info ---'
    - - code
      - name
    - - location
      - manager
    - '--- Capacity ---'
    - - capacity
      - status
    - '--- Contact ---'
    - - contactPhone
    - - address
    actions: [submit]

# Stock Movements
- target: $stock_movements.table.actions.addNew
  auto: [edit, detail]
  view_field: referenceNo
  coll: nb_inv_stock_movements
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [movementType, product, warehouse, quantity, referenceNo, movementDate, notes, createdBy]
    field_layout:
    - '--- Movement Info ---'
    - - movementType
      - referenceNo
    - - product
      - warehouse
    - '--- Details ---'
    - - quantity
      - movementDate
    - - createdBy
    - - notes
    actions: [submit]
