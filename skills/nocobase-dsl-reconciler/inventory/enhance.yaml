# ============================================
# Inventory Management - Enhancements
# AddNew popups with auto-derive edit + detail
# ============================================

popups:

# --------------------------------------------
# Products Page - AddNew Popup
# --------------------------------------------
- target: $products.table.actions.addNew
  auto: [edit, detail]
  view_field: name
  coll: nb_inv_products
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - sku
    - name
    - category_id
    - unit_price
    - cost_price
    - stock_qty
    - min_stock
    - warehouse
    - status
    field_layout:
    - '--- Basic Information ---'
    - - sku
      - name
    - - category_id
      - status
    - '--- Pricing ---'
    - - unit_price
      - cost_price
    - '--- Inventory ---'
    - - stock_qty
      - min_stock
    - - warehouse
    actions: [submit]

