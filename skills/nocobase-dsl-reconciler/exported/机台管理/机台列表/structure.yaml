module: 机台列表 Copy
icon: fundoutlined
group: 刀具管理 Copy/机台管理 Copy
pages:
- page: 机台列表 Copy
  coll: nb_tm_machines
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - name
    - status
    - model
    field_layout:
    - - name
      - status
      - model
    actions:
    - submit
    - reset
  - key: table
    type: table
    coll: nb_tm_machines
    fields:
    - code
    - name
    - model
    - status
    - location_desc
    - remark
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/机台列表_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - filter_stats_button_group_block_template_crm_style
  - - filterForm
  - - table
