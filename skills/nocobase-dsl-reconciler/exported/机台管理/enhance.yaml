popups:
- target: $机台列表.table.actions.addNew
  auto: [edit]
  coll: nb_tm_machines
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [code, name, model, status, location_desc, remark]
    field_layout:
    - '--- 基本信息 ---'
    - - code
      - name
    - - model
      - status
    - - location_desc
    - '--- 备注 ---'
    - - remark
    actions: [submit]

- target: $上下机记录.table.actions.addNew
  auto: [edit]
  coll: nb_tm_machine_bindings
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields: [tool, machine, mount_time, unmount_time, operator, usage_count, remark]
    field_layout:
    - '--- 上下机信息 ---'
    - - tool
      - machine
    - - mount_time
      - unmount_time
    - - operator
      - usage_count
    - '--- 备注 ---'
    - - remark
    actions: [submit]
