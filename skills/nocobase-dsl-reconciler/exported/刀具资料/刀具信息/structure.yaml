module: 刀具信息 Copy
icon: fundoutlined
group: 刀具管理 Copy/刀具资料 Copy
pages:
- page: 刀具信息 Copy
  coll: nb_tm_tools
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: name
      label: Name
    - category_rel
    - location
    field_layout:
    - - name
      - category_rel
      - location
    actions:
    - submit
    - reset
  - key: 刀具信息
    type: table
    title: 刀具信息
    coll: nb_tm_tools
    fields:
    - code
    - name
    - spec
    - cavities
    - life_total
    - life_used
    - status
    - location
    - current_user_name
    - borrow_code
    - supplier
    - barcode
    - qrcode
    - drawing
    - category_rel
    js_columns:
    - title: 剩余寿命
      file: ./js/刀具信息_刀具信息_col_剩余寿命.js
    - title: 寿命进度
      file: ./js/刀具信息_刀具信息_col_寿命进度.js
    - title: 刀具
      file: ./js/刀具信息_刀具信息_col_刀具.js
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/刀具信息_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - filter_stats_button_group_block_template_crm_style
  - - filterForm
  - - 刀具信息
