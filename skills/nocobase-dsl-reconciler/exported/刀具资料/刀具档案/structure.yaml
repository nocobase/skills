module: 刀具档案 Copy
icon: fundoutlined
group: 刀具管理 Copy/刀具资料 Copy
pages:
- page: 刀具档案 Copy
  coll: nb_tm_tools
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: name
      label: Name
    - category_rel
    - status
    field_layout:
    - - name
      - status
      - category_rel
    actions:
    - submit
    - reset
  - key: 刀具档案
    type: table
    title: 刀具档案
    coll: nb_tm_tools
    fields:
    - code
    - name
    - spec
    - cavities
    - life_total
    - life_used
    - category_rel
    - status
    - location
    - supplier
    - barcode
    - qrcode
    - drawing
    js_columns:
    - title: 刀具
      file: ./js/刀具档案_刀具档案_col_刀具.js
    - title: 剩余寿命
      file: ./js/刀具档案_刀具档案_col_剩余寿命.js
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/刀具档案_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - filter_stats_button_group_block_template_crm_style
  - - filterForm
  - - 刀具档案
