module: 刀具领用记录 Copy
icon: fundoutlined
group: 刀具管理 Copy/刀具领用 Copy
pages:
- page: 刀具领用记录 Copy
  coll: nb_tm_borrow
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - tool
    - applicant
    - apply_date
    field_layout:
    - - tool
      - applicant
      - apply_date
  - key: 领用记录
    type: table
    title: 领用记录
    coll: nb_tm_borrow
    fields:
    - code
    - apply_date
    - applicant
    - tool
    - expected_return_date
    - expected_usage
    - status
    - approval_date
    - confirm_date
    - remark
    js_columns:
    - title: 领用
      file: ./js/刀具领用记录_领用记录_col_领用.js
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/刀具领用记录_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - filter_stats_button_group_block_template_crm_style
  - - filterForm
  - - 领用记录
