module: 刀具入库表 Copy
icon: fundoutlined
group: 刀具管理 Copy/刀具入库 Copy
pages:
- page: 刀具入库表 Copy
  coll: nb_tm_production
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: mold_name
      label: Mold Name
    - mold_type
    - status
    field_layout:
    - - mold_name
      - mold_type
      - status
    actions:
    - reset
    - submit
  - key: 刀具入库
    type: table
    title: 刀具入库
    coll: nb_tm_production
    fields:
    - mold_type
    - mold_name
    - spec
    - cavities
    - quantity
    - plan_date
    - expected_date
    - producer
    - inspector
    - status
    - inspection_result
    - storage_date
    js_columns:
    - title: 入库
      file: ./js/刀具入库表_刀具入库_col_入库.js
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/刀具入库表_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - filter_stats_button_group_block_template_crm_style
  - - filterForm
  - - 刀具入库
