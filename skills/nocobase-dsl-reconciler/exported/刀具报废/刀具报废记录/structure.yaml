module: 刀具报废记录 Copy
icon: fundoutlined
group: 刀具管理 Copy/刀具报废 Copy
pages:
- page: 刀具报废记录 Copy
  coll: nb_tm_scrap
  icon: fundoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - tool
    - applicant
    - apply_date
    field_layout:
    - - tool
      - applicant
      - apply_date
    actions:
    - submit
    - reset
  - key: 报废记录
    type: table
    title: 报废记录
    coll: nb_tm_scrap
    fields:
    - apply_date
    - applicant
    - tool
    - reason
    - opinion
    - status
    - approval_date
    - confirm_date
    js_columns:
    - title: 报废
      file: ./js/刀具报废记录_报废记录_col_报废.js
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
  - key: filter_stats_button_group_block_template_crm_style
    type: jsBlock
    desc: Filter Stats Button Group Block Template (CRM-style)
    file: ./js/刀具报废记录_filter_stats_button_group_block_template_crm_style.js
  layout:
  - - col:
      - filter_stats_button_group_block_template_crm_style
      - filterForm
      size: 24
  - - 报废记录
