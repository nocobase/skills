module: 快捷录入
icon: formoutlined
group: 刀具管理

pages:
- page: 新刀入库
  icon: importoutlined
  coll: nb_tm_production
  blocks:
  - key: form
    type: createForm
    coll: nb_tm_production
    title: 新刀入库
    fields:
    - mold_type
    - mold_name
    - spec
    - cavities
    - quantity
    - quality_standard
    - plan_date
    - expected_date
    - producer
    - inspector
    - remark
    field_layout:
    - '--- 刀具信息 ---'
    - - mold_type
      - mold_name
    - - spec
      - cavities
    - - quantity
    - '--- 质量要求 ---'
    - - quality_standard
    - '--- 计划与人员 ---'
    - - plan_date
      - expected_date
    - - producer
      - inspector
    - '--- 备注 ---'
    - - remark
    actions:
    - submit
  layout:
  - - form

- page: 维修申请单
  icon: tooloutlined
  coll: nb_tm_repair
  blocks:
  - key: form
    type: createForm
    coll: nb_tm_repair
    title: 维修申请单
    fields:
    - report_date
    - reporter
    - tool
    - damage_reason
    - tech_lead
    - repair_person
    - deadline
    - repair_plan
    field_layout:
    - '--- 报修信息 ---'
    - - report_date
      - reporter
    - - tool
    - - damage_reason
    - '--- 维修安排 ---'
    - - tech_lead
      - repair_person
    - - deadline
    - - repair_plan
    actions:
    - submit
  layout:
  - - form

- page: 报废申请单
  icon: deleteoutlined
  coll: nb_tm_scrap
  blocks:
  - key: form
    type: createForm
    coll: nb_tm_scrap
    title: 报废申请单
    fields:
    - apply_date
    - applicant
    - tool
    - reason
    - opinion
    field_layout:
    - '--- 申请信息 ---'
    - - apply_date
      - applicant
    - - tool
    - '--- 报废原因 ---'
    - - reason
    - '--- 处理意见 ---'
    - - opinion
    actions:
    - submit
  layout:
  - - form
