popups:
  # Employees - addNew popup with auto edit + detail
  - target: $employees.employees_table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_hrm_employees
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - name
          - employee_no
          - department
          - position
          - email
          - phone
          - hire_date
          - status
          - salary
        field_layout:
          - '--- Basic Info ---'
          - - name
            - employee_no
          - - department
            - position
          - '--- Contact Info ---'
          - - email
            - phone
          - '--- Employment ---'
          - - hire_date
            - status
          - - salary
        actions: [submit]

