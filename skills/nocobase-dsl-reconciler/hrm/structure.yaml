module: HRM
icon: teamoutlined
group: Main

# Collections Definition (deployer auto-creates these)
collections:
  nb_hrm_employees:
    title: Employees
    titleField: name
    fields:
      - name: name
        interface: input
        required: true
      - name: employee_no
        interface: input
        required: true
      - name: department
        interface: m2o
        target: nb_hrm_departments
        foreignKey: department_id
      - name: position
        interface: input
      - name: email
        interface: email
      - name: phone
        interface: phone
      - name: hire_date
        interface: date
      - name: status
        interface: select
        enum:
          - value: Active
            label: Active
            color: green
          - value: Probation
            label: Probation
            color: orange
          - value: On_Leave
            label: On Leave
            color: blue
          - value: Resigned
            label: Resigned
            color: gray
      - name: salary
        interface: number
        precision: 2

  nb_hrm_departments:
    title: Departments
    titleField: name
    fields:
      - name: name
        interface: input
        required: true
      - name: code
        interface: input
        required: true
      - name: manager
        interface: m2o
        target: nb_hrm_employees
        foreignKey: manager_id
      - name: headcount
        interface: integer
      - name: description
        interface: textarea

  nb_hrm_attendance:
    title: Attendance
    titleField: employee
    fields:
      - name: employee
        interface: m2o
        target: nb_hrm_employees
        foreignKey: employee_id
        required: true
      - name: date
        interface: date
        required: true
      - name: check_in
        interface: time
      - name: check_out
        interface: time
      - name: status
        interface: select
        enum:
          - value: Normal
            label: Normal
            color: green
          - value: Late
            label: Late
            color: orange
          - value: Absent
            label: Absent
            color: red
          - value: Leave
            label: Leave
            color: blue
      - name: remark
        interface: textarea

  nb_hrm_leave_requests:
    title: Leave Requests
    titleField: employee
    fields:
      - name: employee
        interface: m2o
        target: nb_hrm_employees
        foreignKey: employee_id
        required: true
      - name: leave_type
        interface: select
        enum:
          - value: Annual
            label: Annual Leave
            color: blue
          - value: Sick
            label: Sick Leave
            color: red
          - value: Personal
            label: Personal Leave
            color: orange
          - value: Maternity
            label: Maternity Leave
            color: purple
      - name: start_date
        interface: date
        required: true
      - name: end_date
        interface: date
        required: true
      - name: days
        interface: number
        precision: 1
      - name: reason
        interface: textarea
      - name: status
        interface: select
        enum:
          - value: Pending
            label: Pending
            color: orange
          - value: Approved
            label: Approved
            color: green
          - value: Rejected
            label: Rejected
            color: red
      - name: approver
        interface: m2o
        target: nb_hrm_employees
        foreignKey: approver_id

  nb_hrm_payroll:
    title: Payroll
    titleField: employee
    fields:
      - name: employee
        interface: m2o
        target: nb_hrm_employees
        foreignKey: employee_id
        required: true
      - name: period
        interface: input
        required: true
      - name: base_salary
        interface: number
        precision: 2
      - name: bonus
        interface: number
        precision: 2
      - name: deduction
        interface: number
        precision: 2
      - name: net_salary
        interface: number
        precision: 2
      - name: status
        interface: select
        enum:
          - value: Draft
            label: Draft
            color: gray
          - value: Confirmed
            label: Confirmed
            color: blue
          - value: Paid
            label: Paid
            color: green

# Pages Definition
pages:
  # 1. Dashboard
  - page: Dashboard
    icon: dashboardoutlined
    blocks:
      - key: dashboard_block
        type: jsBlock
        desc: HRM Dashboard Overview
        file: null
    layout:
      - - dashboard_block

  # 2. Employees
  - page: Employees
    coll: nb_hrm_employees
    icon: useroutlined
    blocks:
      - key: employees_filter
        type: filterForm
        coll: nb_hrm_employees
        fields:
          - field: name
            label: Search
            filterPaths: [name, employee_no, position]
      - key: employees_table
        type: table
        coll: nb_hrm_employees
        fields:
          - name
          - employee_no
          - department
          - position
          - email
          - phone
          - hire_date
          - status
          - salary
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - employees_filter
      - - employees_table

  # 3. Departments
  - page: Departments
    coll: nb_hrm_departments
    icon: apartmentoutlined
    blocks:
      - key: departments_filter
        type: filterForm
        coll: nb_hrm_departments
        fields:
          - field: name
            label: Search
            filterPaths: [name, code]
      - key: departments_table
        type: table
        coll: nb_hrm_departments
        fields:
          - name
          - code
          - manager
          - headcount
          - description
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - departments_filter
      - - departments_table

  # 4. Attendance
  - page: Attendance
    coll: nb_hrm_attendance
    icon: clockcircleoutlined
    blocks:
      - key: attendance_filter
        type: filterForm
        coll: nb_hrm_attendance
        fields:
          - field: employee
            label: Search
            filterPaths: [employee]
      - key: attendance_table
        type: table
        coll: nb_hrm_attendance
        fields:
          - employee
          - date
          - check_in
          - check_out
          - status
          - remark
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - attendance_filter
      - - attendance_table

  # 5. Leave Requests
  - page: Leave Requests
    coll: nb_hrm_leave_requests
    icon: carryoutoutlined
    blocks:
      - key: leave_filter
        type: filterForm
        coll: nb_hrm_leave_requests
        fields:
          - field: employee
            label: Search
            filterPaths: [employee]
      - key: leave_table
        type: table
        coll: nb_hrm_leave_requests
        fields:
          - employee
          - leave_type
          - start_date
          - end_date
          - days
          - reason
          - status
          - approver
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - leave_filter
      - - leave_table

  # 6. Payroll
  - page: Payroll
    coll: nb_hrm_payroll
    icon: redenvelopeoutlined
    blocks:
      - key: payroll_filter
        type: filterForm
        coll: nb_hrm_payroll
        fields:
          - field: employee
            label: Search
            filterPaths: [employee, period]
      - key: payroll_table
        type: table
        coll: nb_hrm_payroll
        fields:
          - employee
          - period
          - base_salary
          - bonus
          - deduction
          - net_salary
          - status
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
    layout:
      - - payroll_filter
      - - payroll_table
