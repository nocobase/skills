module: Asset Management
icon: databaseoutlined
collections:
  nb_asset_items:
    titleField: name
    fields:
    - name: name
      interface: input
    - name: asset_no
      interface: sequence
    - name: category
      interface: m2o
      target: nb_asset_categories
      foreignKey: category_id
    - name: location
      interface: input
    - name: status
      interface: select
      options: [{value: in_use, label: In Use}, {value: idle, label: Idle}, {value: maintenance, label: Maintenance}, {value: retired, label: Retired}]
    - name: purchase_date
      interface: date
    - name: purchase_price
      interface: number
    - name: current_value
      interface: number
    - name: department
      interface: input
    - name: warranty_expiry
      interface: date

  nb_asset_categories:
    titleField: name
    fields:
    - name: name
      interface: input
    - name: code
      interface: input
    - name: parent_category
      interface: m2o
      target: nb_asset_categories
      foreignKey: parent_category_id
    - name: depreciation_rate
      interface: number

  nb_asset_maintenance:
    titleField: asset
    fields:
    - name: asset
      interface: m2o
      target: nb_asset_items
      foreignKey: asset_id
    - name: type
      interface: select
      options: [{value: preventive, label: Preventive}, {value: corrective, label: Corrective}, {value: inspection, label: Inspection}]
    - name: date
      interface: date
    - name: cost
      interface: number
    - name: technician
      interface: input
    - name: description
      interface: textarea
    - name: status
      interface: select
      options: [{value: scheduled, label: Scheduled}, {value: in_progress, label: In Progress}, {value: completed, label: Completed}]

  nb_asset_transfers:
    titleField: asset
    fields:
    - name: asset
      interface: m2o
      target: nb_asset_items
      foreignKey: asset_id
    - name: from_dept
      interface: input
    - name: to_dept
      interface: input
    - name: transfer_date
      interface: date
    - name: reason
      interface: textarea
    - name: status
      interface: select
      options: [{value: pending, label: Pending}, {value: approved, label: Approved}, {value: completed, label: Completed}]

  nb_asset_disposal:
    titleField: asset
    fields:
    - name: asset
      interface: m2o
      target: nb_asset_items
      foreignKey: asset_id
    - name: disposal_date
      interface: date
    - name: disposal_type
      interface: select
      options: [{value: sale, label: Sale}, {value: scrap, label: Scrap}, {value: donation, label: Donation}]
    - name: sale_price
      interface: number
    - name: reason
      interface: textarea
    - name: status
      interface: select
      options: [{value: pending, label: Pending}, {value: approved, label: Approved}, {value: completed, label: Completed}]

pages:
# 1. Assets Page
- page: Assets
  icon: databaseoutlined
  coll: nb_asset_items
  blocks:
  - key: filterForm_0
    type: filterForm
    coll: nb_asset_items
    fields:
    - field: name
      filterPaths: [name, asset_no, location, department]
    - status
    - purchase_date

  - key: table
    type: table
    coll: nb_asset_items
    fields:
    - name
    - asset_no
    - category
    - location
    - status
    - purchase_date
    - purchase_price
    - current_value
    - department
    - warranty_expiry
    actions: [filter, refresh, addNew]
    recordActions: [edit, delete]

  layout:
  - - filterForm_0
  - - table

# 2. Categories Page
- page: Categories
  icon: folderoutlined
  coll: nb_asset_categories
  blocks:
  - key: filterForm_0
    type: filterForm
    coll: nb_asset_categories
    fields:
    - field: name
      filterPaths: [name, code]
    - parent_category

  - key: table
    type: table
    coll: nb_asset_categories
    fields:
    - name
    - code
    - parent_category
    - depreciation_rate
    actions: [filter, refresh, addNew]
    recordActions: [edit, delete]

  layout:
  - - filterForm_0
  - - table

# 3. Maintenance Page
- page: Maintenance
  icon: tooloutlined
  coll: nb_asset_maintenance
  blocks:
  - key: filterForm_0
    type: filterForm
    coll: nb_asset_maintenance
    fields:
    - asset
    - type
    - date

  - key: table
    type: table
    coll: nb_asset_maintenance
    fields:
    - asset
    - type
    - date
    - cost
    - technician
    - status
    actions: [filter, refresh, addNew]
    recordActions: [edit, delete]

  layout:
  - - filterForm_0
  - - table

# 4. Transfers Page
- page: Transfers
  icon: swapoutlined
  coll: nb_asset_transfers
  blocks:
  - key: filterForm_0
    type: filterForm
    coll: nb_asset_transfers
    fields:
    - asset
    - status
    - transfer_date

  - key: table
    type: table
    coll: nb_asset_transfers
    fields:
    - asset
    - from_dept
    - to_dept
    - transfer_date
    - reason
    - status
    actions: [filter, refresh, addNew]
    recordActions: [edit, delete]

  layout:
  - - filterForm_0
  - - table

# 5. Disposal Page
- page: Disposal
  icon: deleteoutlined
  coll: nb_asset_disposal
  blocks:
  - key: filterForm_0
    type: filterForm
    coll: nb_asset_disposal
    fields:
    - asset
    - disposal_type
    - disposal_date

  - key: table
    type: table
    coll: nb_asset_disposal
    fields:
    - asset
    - disposal_date
    - disposal_type
    - sale_price
    - reason
    - status
    actions: [filter, refresh, addNew]
    recordActions: [edit, delete]

  layout:
  - - filterForm_0
  - - table
