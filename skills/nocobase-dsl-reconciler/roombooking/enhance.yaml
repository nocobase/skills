popups:
  # ========== Departments ==========
  - target: $departments.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_booking_departments
    blocks:
    - key: form
      type: createForm
      resource:
        binding: currentCollection
      fields: [name, code, manager, email, phone, description, status]
      field_layout:
      - '--- Basic Information ---'
      - - name
        - code
      - - manager
        - status
      - '--- Contact ---'
      - - email
        - phone
      - - description
      actions: [submit]

  # ========== Rooms ==========
  - target: $rooms.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_booking_rooms
    blocks:
    - key: form
      type: createForm
      resource:
        binding: currentCollection
      fields: [name, code, capacity, location, roomType, department, hasProjector, hasVideoConf, status]
      field_layout:
      - '--- Room Info ---'
      - - name
        - code
      - - roomType
        - status
      - - location
        - capacity
      - '--- Facilities ---'
      - - department
      - - hasProjector
        - hasVideoConf
      actions: [submit]

  # ========== Equipment ==========
  - target: $equipment.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_booking_equipment
    blocks:
    - key: form
      type: createForm
      resource:
        binding: currentCollection
      fields: [name, code, type, room, serialNumber, purchaseDate, status, notes]
      field_layout:
      - '--- Equipment Info ---'
      - - name
        - code
      - - type
        - status
      - - room
      - '--- Details ---'
      - - serialNumber
        - purchaseDate
      - - notes
      actions: [submit]

  # ========== Bookings ==========
  - target: $bookings.table.actions.addNew
    auto: [edit, detail]
    view_field: title
    coll: nb_booking_bookings
    blocks:
    - key: form
      type: createForm
      resource:
        binding: currentCollection
      fields: [title, room, requester, department, startTime, endTime, attendees, purpose, status]
      field_layout:
      - '--- Meeting Info ---'
      - - title
        - status
      - - room
      - - requester
        - department
      - '--- Schedule ---'
      - - startTime
        - endTime
      - - attendees
      - '--- Details ---'
      - - purpose
      actions: [submit]
