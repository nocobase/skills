title: '[Copy] Post-Merge Processing'
type: collection
enabled: false
options:
  stackLimit: 1
  deleteExecutionOnStatus: []
trigger:
  mode: 3
  appends:
    - merge_operation_items.customer
    - merge_operation_items
    - operator
  changed: []
  condition:
    $and:
      - status:
          $eq: merged
  collection: nb_crm_merge_operations
graph:
  - query_record_merge_items
  - query_record_merge_items --> iterate_over_merge_operation_items
  - iterate_over_merge_operation_items --> [body] this_is_not_the_master
  - this_is_not_the_master --> [yes] bulk_update_nb_crm_opportunities
  - bulk_update_nb_crm_opportunities --> bulk_update_nb_crm_contacts
  - bulk_update_nb_crm_contacts --> bulk_update_nb_crm_activities
  - bulk_update_nb_crm_activities --> bulk_update_nb_crm_comments
  - bulk_update_nb_crm_comments --> bulk_update_nb_crm_orders
  - bulk_update_nb_crm_orders --> bulk_update_nb_crm_quotations
  - bulk_update_nb_crm_quotations --> bulk_update_nb_crm_customer_shares
  - bulk_update_nb_crm_customer_shares --> disable_non_master_customer
nodes:
  query_record_merge_items:
    type: query
    title: 'Query record: Merge Items'
    config:
      multiple: true
      collection: nb_crm_merge_operation_items
      params:
        filter:
          $and:
            - merge_operation_id:
                $eq: '{{$context.data.id}}'
        sort: []
        page: 1
        pageSize: 100
        appends: []
  iterate_over_merge_operation_items:
    type: loop
    title: iterate over merge_operation_items
    config:
      target: '{{$jobsMapByNodeKey.query_record_merge_items}}'
      condition: false
      exit: 0
  this_is_not_the_master:
    type: condition
    title: This is not the master
    config:
      rejectOnFalse: false
      engine: basic
      calculation:
        group:
          type: and
          calculations:
            - operands:
                - '{{$scopes.iterate_over_merge_operation_items.item.customer_id}}'
                - '{{$context.data.customer_id}}'
              calculator: notEqual
  bulk_update_nb_crm_opportunities:
    type: update
    title: '[Bulk Update] nb_crm_opportunities'
    config:
      usingAssignFormSchema: true
      assignFormSchema:
        _isJSONSchemaObject: true
        version: '2.0'
        name: s_nb_crm_opportunities
        type: void
        x-component: Grid
        x-initializer: assignFieldValuesForm:configureFields
        properties:
          r_nb_crm_opportunities:
            _isJSONSchemaObject: true
            version: '2.0'
            type: void
            x-component: Grid.Row
            name: r_nb_crm_opportunities
            properties:
              c_nb_crm_opportunities:
                _isJSONSchemaObject: true
                version: '2.0'
                type: void
                x-component: Grid.Col
                name: c_nb_crm_opportunities
                properties:
                  customer_id:
                    _isJSONSchemaObject: true
                    version: '2.0'
                    type: string
                    name: customer_id
                    x-toolbar: FormItemSchemaToolbar
                    x-settings: fieldSettings:FormItem
                    x-component: AssignedField
                    x-decorator: FormItem
                    x-collection-field: nb_crm_opportunities.customer_id
      collection: nb_crm_opportunities
      params:
        individualHooks: false
        filter:
          $and:
            - customer_id:
                $eq: '{{$scopes.iterate_over_merge_operation_items.item.customer_id}}'
        values:
          customer_id: '{{$context.data.customer_id}}'
