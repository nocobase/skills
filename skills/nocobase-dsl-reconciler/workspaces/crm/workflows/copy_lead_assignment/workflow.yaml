title: '[Copy] Lead Assignment'
type: collection
enabled: false
options:
  stackLimit: 1
  deleteExecutionOnStatus: []
trigger:
  mode: 3
  appends: []
  changed:
    - owner_id
    - owner
  condition:
    $and:
      - owner_id:
          $empty: true
      - owner:
          id:
            $empty: true
  collection: nb_crm_leads
graph:
  - auto_assignment
  - auto_assignment --> query_record
  - query_record --> notification
nodes:
  auto_assignment:
    type: sql
    title: AUTO-ASSIGNMENT
    config:
      dataSource: main
      sql: |
        -- ============================================================================
        -- Step A1: Auto-Assign Lead to Least Busy Sales Rep (Single Query)
        -- ============================================================================
        -- Finds the sales rep with fewest active leads and assigns the lead in one step
        -- Parameters: {$lead_id}

        WITH least_busy_sales AS (
            -- Find sales rep with minimum active leads
            SELECT
                u.id AS user_id,
                u.nickname AS user_name,
                COALESCE(
                    (SELECT COUNT(*) FROM nb_crm_leads l
                     WHERE l.owner_id = u.id
                       AND l.status NOT IN ('converted', 'unqualified')),
                    0
                ) AS current_lead_count
            FROM users u
            JOIN "rolesUsers" ru ON ru."userId" = u.id
            WHERE ru."roleName" IN ('sales_rep', 'sales_manager')
            ORDER BY current_lead_count ASC, RANDOM()
            LIMIT 1
        ),
        do_assignment AS (
            -- Assign the lead to selected sales rep
            UPDATE nb_crm_leads
            SET
                owner_id = (SELECT user_id FROM least_busy_sales),
                "updatedAt" = NOW()
            WHERE id = {{$context.data.id}}
              AND (owner_id IS NULL OR owner_id != (SELECT user_id FROM least_busy_sales))
            RETURNING id, owner_id
        )
        -- Return assignment result
        SELECT
            {{$context.data.id}} AS lead_id,
            lbs.user_id AS assigned_to_id,
            lbs.user_name AS assigned_to_name,
            lbs.current_lead_count AS their_lead_count_before,
            lbs.current_lead_count + 1 AS their_lead_count_after,
            CASE WHEN da.id IS NOT NULL THEN true ELSE false END AS assignment_success
        FROM least_busy_sales lbs
        LEFT JOIN do_assignment da ON true;
  query_record:
    type: query
    title: Query record
    config:
      multiple: false
      collection: nb_crm_leads
      params:
        filter:
          $and:
            - id:
                $eq: '{{$context.data.id}}'
        sort: []
        page: 1
        pageSize: 20
        appends: []
  notification:
    type: notification
    title: Notification
    config:
      channelName: s_jzqdcmesud5
      receivers:
        - filter:
            $and:
              - id:
                  $eq: '{{$jobsMapByNodeKey.query_record.id}}'
      options:
        duration: 5
        url: /admin/e9478uhrdve/view/8d0b8114c2f/filterbytk/{{$context.data.id}}
      title: 'New Lead Assigned: {{$context.data.name}}'
      content: ' You have been assigned a new lead: {{{$context.data.name}}} from {{{$context.data.company}}}. Source: {{{$context.data.source}}}. Please follow up. '
