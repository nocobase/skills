blocks:
  - key: filterForm
    type: filterForm
    coll: nb_crm_leads
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - company
          - title
          - email
          - phone
          - mobile_phone
          - website
          - source
          - industry
    js_items:
      - key: leads_stats_filter_block
        file: ./js/leads_filterForm_leads_stats_filter_block.js
        desc: Leads Stats Filter Block
    field_layout:
      - - '[JS:Leads Stats Filter Block]'
      - - name
  - key: table
    type: table
    coll: nb_crm_leads
    filter:
      status.$eq: '{{ ctx.urlSearchParams.status }}'
    fields:
      - field: name
        clickToOpen: true
      - field: source
        width: 100
      - field: status
        width: 100
      - industry
      - owner
    js_columns:
      - key: lead_name_company
        field: ''
        file: ./js/leads_table_col_lead_name_company.js
        title: Lead Name/Company
        desc: Lead Info Column (Multi-field)
      - key: contact
        field: ''
        file: ./js/leads_table_col_contact.js
        title: Contact
        desc: Lead Contact Column (Multi-field)
      - key: ai_score
        field: ''
        file: ./js/leads_table_col_ai_score.js
        title: AI Score
      - key: created
        field: ''
        file: ./js/leads_table_col_created.js
        title: Created
        desc: Created Ago Column - Leads Module
    column_order:
      - name
      - '[JS:lead_name_company]'
      - '[JS:contact]'
      - source
      - '[JS:ai_score]'
      - status
      - industry
      - owner
      - '[JS:created]'
    actions:
      - filter
      - refresh
      - addNew
      - type: ai
        employee: viz
        tasks_file: ./ai/leads_table_tasks.yaml
      - export
      - import
layout:
  - - filterForm
  - - table
