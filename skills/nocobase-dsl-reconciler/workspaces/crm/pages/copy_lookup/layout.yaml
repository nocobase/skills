blocks:
  - key: filterForm
    type: filterForm
    coll: v_nb_crm_lead_lookup
    fields:
      - field: name
        label: Search
        filterPaths:
          - account_number
          - name
          - phone
          - website
      - field: industry
        filterPaths:
          - industry
      - field: createdAt
        filterPaths:
          - createdAt
    field_layout:
      - - name
        - industry
        - createdAt
    actions:
      - submit
      - reset
  - key: all_leads
    type: table
    title: All Leads
    coll: v_nb_crm_lead_lookup
    pageSize: 10
    fields:
      - name
      - company
      - industry
      - source
      - owner
    recordActions:
      - type: link
        title: Detail
        icon: arrowrightoutlined
        url: admin/e9478uhrdve/view/8d0b8114c2f/filterbytk/{{ ctx.record.id }}
  - key: all_customers
    type: table
    title: All Customers
    coll: v_nb_crm_customer_lookup
    pageSize: 10
    fields:
      - name
      - industry
      - status
      - owner
    recordActions:
      - type: link
        title: Detail
        icon: arrowrightoutlined
        url: admin/c137kk6hghm/view/95effc54287/filterbytk/{{ ctx.record.id }}
  - key: all_contacts
    type: table
    title: All Contacts
    coll: v_nb_crm_contact_lookup
    pageSize: 10
    fields:
      - name
      - title
      - department
      - customer
    recordActions:
      - type: link
        title: Detail
        icon: arrowrightoutlined
        url: admin/dgvyidc7p8f/view/a02b2fc948f/filterbytk/{{ ctx.record.id }}
layout:
  - - filterForm
  - - all_leads
  - - all_customers
  - - all_contacts
