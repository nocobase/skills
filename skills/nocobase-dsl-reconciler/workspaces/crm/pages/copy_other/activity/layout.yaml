blocks:
  - key: filterForm
    type: filterForm
    coll: nb_crm_activities_copy
    fields:
      - field: subject
        label: Search
        filterPaths:
          - subject
          - content
          - type
          - customer.name
          - customer.account_number
          - customer.phone
          - customer.website
          - customer.address
          - opportunity.opportunity_no
          - opportunity.name
          - contact.email
          - contact.phone
          - contact.mobile
    field_layout:
      - - subject
  - key: table
    type: table
    coll: nb_crm_activities_copy
    fields:
      - field: subject
        clickToOpen: true
      - type
      - activity_date
      - lead
      - customer
      - opportunity
      - contact
      - owner
    actions:
      - filter
      - refresh
      - addNew
      - type: ai
        employee: viz
        tasks_file: ./ai/activity_table_tasks.yaml
layout:
  - - filterForm
  - - table
