blocks:
  - key: currencies
    type: table
    title: Currencies
    coll: nb_cbo_currencies_copy
    fields:
      - field: name
        clickToOpen: true
      - field: code
        width: 100
      - field: symbol
        width: 100
      - current_rate
    actions:
      - filter
      - refresh
      - addNew
  - key: exchange_rates
    type: table
    title: Exchange Rates
    coll: nb_crm_exchange_rates_copy
    fields:
      - field: currency_code
        clickToOpen: true
      - field: currency
        clickToOpen: true
      - field: rate_to_usd
        width: 100
      - source
    actions:
      - filter
      - refresh
      - addNew
      - bulkDelete
layout:
  - - currencies: 11
    - exchange_rates: 13
