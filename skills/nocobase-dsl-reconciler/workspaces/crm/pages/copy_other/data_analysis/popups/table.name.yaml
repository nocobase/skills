target: $SELF.table.fields.name
mode: drawer
blocks:
  - key: editForm
    type: editForm
    coll: nb_crm_data_analysis_copy
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
    fields:
      - name
      - collection
      - description
      - sql
    field_layout:
      - - name
      - - collection
      - - description
      - - sql
    actions:
      - submit
