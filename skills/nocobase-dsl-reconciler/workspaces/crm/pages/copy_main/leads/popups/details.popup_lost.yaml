target: $SELF.details.actions.popup_lost
mode: dialog
blocks:
  - key: editForm
    type: editForm
    coll: nb_crm_leads_copy
    resource_binding:
      filterByTk: '{{ ctx.record.id }}'
    fields:
      - lost_reason
      - status
    field_layout:
      - - lost_reason
      - - status
    actions:
      - submit
    fieldLinkageRules:
      - key: wok5wju10qp
        title: Linkage rule
        enable: true
        condition:
          logic: $and
          items: []
        actions:
          - key: 9ebvmlamd2x
            name: linkageSetFieldProps
            params:
              value:
                fields:
                  - status
                state: hiddenReservedValue
