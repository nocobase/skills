target: $SELF.table.fields.name
mode: drawer
tabs:
  - title: Tab0
    blocks:
      - key: details
        type: details
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - company
          - title
          - owner
          - type: markdown
            key: _md_3
            content: |+
              {{ ctx.popup.record.lead_no }}

              ##  {{ ctx.popup.record.name }}

        js_items:
          - key: lead_key_stats_block
            file: ./js/leads_name_tab0_details_lead_key_stats_block.js
            desc: Lead Key Stats Block
          - key: lead_badges_row_component
            file: ./js/leads_name_tab0_details_lead_badges_row_component.js
            desc: Lead Badges Row Component
        field_layout:
          - - '[MD:_md_3]'
          - - company
            - title
            - owner
          - - '[JS:Lead Badges Row Component]'
          - - '[JS:Lead Key Stats Block]'
        actions:
          - edit
          - type: popup
            stepParams:
              popupSettings:
                openView:
                  collectionName: ''
                  dataSourceKey: main
                  mode: dialog
                  size: large
                  pageModelClass: ChildPageModel
                  uid: alaxztjc4f9
                  filterByTk: '{{ ctx.record.id }}'
              buttonSettings:
                general:
                  type: default
                  title: convert
                  icon: ExportOutlined
              displayFieldSettings:
                clickToOpen:
                  clickToOpen: true
            key: popup_convert
          - type: popup
            stepParams:
              popupSettings:
                openView:
                  collectionName: ''
                  dataSourceKey: main
                  mode: dialog
                  size: large
                  pageModelClass: ChildPageModel
                  uid: suxhi7szc3g
                  filterByTk: '{{ ctx.record.id }}'
              buttonSettings:
                general:
                  type: default
                  title: Lost
                  icon: ExportOutlined
              displayFieldSettings:
                clickToOpen:
                  clickToOpen: true
            key: popup_lost
      - key: details_2
        type: details
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        js_items:
          - key: lead_stage_flow_block
            file: ./js/leads_name_tab0_details_2_lead_stage_flow_block.js
            desc: Lead Stage Flow Block
        field_layout:
          - - '[JS:Lead Stage Flow Block]'
      - key: contact_information
        type: details
        title: Contact Information
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - email
          - phone
          - mobile_phone
          - website
          - address
        field_layout:
          - - email
            - phone
            - mobile_phone
          - - website: 8
            - address: 16
      - key: company_information
        type: details
        title: Company Information
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - industry
          - annual_revenue
          - number_of_employees
          - company
        field_layout:
          - - company
            - industry
            - annual_revenue
          - - number_of_employees
      - key: lead_owner
        type: details
        title: Lead Owner
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        js_items:
          - key: lead_profile_header_block
            file: ./js/leads_name_tab0_lead_owner_lead_profile_header_block.js
            desc: Lead Profile Header Block
        field_layout:
          - - '[JS:Lead Profile Header Block]'
        actions:
          - type: popup
            stepParams:
              popupSettings:
                openView:
                  collectionName: ''
                  dataSourceKey: main
                  mode: drawer
                  size: large
                  pageModelClass: ChildPageModel
                  uid: jwsscb3jsst
              buttonSettings:
                general:
                  type: default
                  title: Log Call
                  icon: phoneoutlined
              displayFieldSettings:
                clickToOpen:
                  clickToOpen: true
            key: popup_log_call
          - type: popup
            stepParams:
              popupSettings:
                openView:
                  collectionName: ''
                  dataSourceKey: main
                  mode: drawer
                  size: large
                  pageModelClass: ChildPageModel
                  uid: fz21iibwktw
              buttonSettings:
                general:
                  type: default
                  title: Send Email
                  icon: mailoutlined
              displayFieldSettings:
                clickToOpen:
                  clickToOpen: true
            key: popup_send_email
          - type: popup
            stepParams:
              popupSettings:
                openView:
                  collectionName: nb_crm_leads_copy
                  dataSourceKey: main
              buttonSettings:
                general:
                  type: default
                  title: Schedule
                  icon: calendaroutlined
            key: popup_schedule
      - key: lead_insights
        type: details
        title: Lead Insights
        coll: nb_crm_leads_copy
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        js_items:
          - key: lead_ai_insights_block
            file: ./js/leads_name_tab0_lead_insights_lead_ai_insights_block.js
            desc: Lead AI Insights Block
        field_layout:
          - - '[JS:Lead AI Insights Block]'
      - key: comments
        type: comments
        coll: nb_crm_comments_copy
        resource_binding:
          associationName: nb_crm_leads.comments
          sourceId: '{{ctx.view.inputArgs.filterByTk}}'
    layout:
      - - details: 16
        - details_2: 16
        - contact_information: 16
        - company_information: 16
        - lead_owner: 8
        - lead_insights: 8
        - comments: 8
  - title: Tab1
    blocks:
      - key: recordHistory
        type: recordHistory
        coll: nb_crm_leads_copy
        actions:
          - filter
          - refresh
          - historyExpand
          - historyCollapse
  - title: Tab2
    blocks:
      - key: mailMessages
        type: mailMessages
        coll: mailMessages
        dataScope:
          logic: $or
          items:
            - path: from
              operator: contains
              value: '{{ ctx.popup.record.email }}'
            - path: to
              operator: contains
              value: '{{ ctx.popup.record.email }}'
        actions:
          - filter
          - refresh
          - addNew
          - type: ai
            employee: ellis
            tasks_file: ./ai/leads_name_tab2_mailMessages_tasks.yaml
    layout:
      - - mailMessages
