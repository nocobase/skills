name: nb_crm_price_tiers_copy
title: Price Tiers
titleField: tier_description
fields:
  - name: product_id
    interface: integer
  - name: currencyInfo
    interface: m2o
    target: nb_cbo_currencies_copy
    foreignKey: currency_id
  - name: effective_from
    interface: dateOnly
  - name: unit_price
    interface: number
  - name: product
    interface: m2o
    target: nb_crm_products_copy
    foreignKey: product_id
  - name: discount_rate
    interface: percent
  - name: currency_id
    interface: integer
  - name: min_quantity
    interface: integer
  - name: quotationItems
    interface: o2m
    target: nb_crm_quotation_items_copy
    foreignKey: tier_applied
  - name: effective_to
    interface: dateOnly
  - name: tier_description
    interface: input
  - name: max_quantity
    interface: integer
  - name: requires_approval
    interface: checkbox
