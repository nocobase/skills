name: nb_pm_risks
title: Risks
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: severity
    interface: select
    title: Severity
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
      - value: critical
        label: Critical
  - name: status
    interface: select
    title: Status
    options:
      - value: open
        label: Open
      - value: monitoring
        label: Monitoring
      - value: mitigated
        label: Mitigated
      - value: closed
        label: Closed
  - name: owner
    interface: m2o
    title: Owner
    target: nb_pm_members
  - name: mitigation_plan
    interface: textarea
    title: Mitigation Plan
