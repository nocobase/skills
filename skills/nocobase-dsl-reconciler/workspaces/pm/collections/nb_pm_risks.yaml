name: nb_pm_risks
title: Risks
fields:
  - name: name
    interface: input
    title: Name
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
    foreignKey: projectId
  - name: projectId
    interface: integer
    title: Project ID
  - name: probability
    interface: select
    title: Probability
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
  - name: impact
    interface: select
    title: Impact
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
  - name: status
    interface: select
    title: Status
    options:
      - value: open
        label: Open
      - value: mitigated
        label: Mitigated
      - value: closed
        label: Closed
  - name: mitigation
    interface: textarea
    title: Mitigation Plan
  - name: owner
    interface: m2o
    title: Owner
    target: nb_pm_members
    foreignKey: ownerId
  - name: ownerId
    interface: integer
    title: Owner ID
