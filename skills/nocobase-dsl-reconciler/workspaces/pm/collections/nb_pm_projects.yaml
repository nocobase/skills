name: nb_pm_projects
title: Projects
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: code
    interface: input
    title: Code
  - name: status
    interface: select
    title: Status
    options:
      - value: planned
        label: Planned
      - value: active
        label: Active
      - value: on_hold
        label: On Hold
      - value: completed
        label: Completed
  - name: priority
    interface: select
    title: Priority
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
  - name: start_date
    interface: dateOnly
    title: Start Date
  - name: end_date
    interface: dateOnly
    title: End Date
  - name: budget
    interface: number
    title: Budget
  - name: owner
    interface: m2o
    title: Owner
    target: nb_pm_members
  - name: description
    interface: textarea
    title: Description
