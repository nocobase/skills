name: nb_pm_projects
title: Projects
fields:
  - name: name
    interface: input
    title: Name
  - name: description
    interface: textarea
    title: Description
  - name: status
    interface: select
    title: Status
    options:
      - { value: planning, label: Planning }
      - { value: active, label: Active }
      - { value: completed, label: Completed }
      - { value: on_hold, label: On Hold }
  - name: priority
    interface: select
    title: Priority
    options:
      - { value: low, label: Low }
      - { value: medium, label: Medium }
      - { value: high, label: High }
  - name: start_date
    interface: dateOnly
    title: Start Date
  - name: end_date
    interface: dateOnly
    title: End Date
  - name: budget
    interface: number
    title: Budget
  - name: manager
    interface: m2o
    title: Manager
    target: nb_pm_members
  - name: tasks
    interface: o2m
    title: Tasks
  - name: createdAt
    interface: createdAt
    title: Created At
  - name: updatedAt
    interface: updatedAt
    title: Updated At
