name: nb_pm_projects
title: Projects
fields:
  - name: name
    interface: input
    title: Name
  - name: status
    interface: select
    title: Status
    options:
      - value: planning
        label: Planning
      - value: in_progress
        label: In Progress
      - value: completed
        label: Completed
      - value: on_hold
        label: On Hold
  - name: description
    interface: textarea
    title: Description
  - name: manager
    interface: m2o
    title: Manager
    target: nb_pm_members
    foreignKey: managerId
  - name: managerId
    interface: integer
    title: Manager ID
