name: nb_pm_members
title: Members
fields:
  - name: name
    interface: input
    title: Name
  - name: email
    interface: email
    title: Email
  - name: phone
    interface: phone
    title: Phone
  - name: role
    interface: select
    title: Role
    options:
      - value: manager
        label: Manager
      - value: developer
        label: Developer
      - value: designer
        label: Designer
      - value: tester
        label: Tester
      - value: analyst
        label: Analyst
  - name: department
    interface: select
    title: Department
    options:
      - value: engineering
        label: Engineering
      - value: design
        label: Design
      - value: product
        label: Product
      - value: qa
        label: QA
      - value: operations
        label: Operations
  - name: status
    interface: select
    title: Status
    options:
      - value: active
        label: Active
      - value: inactive
        label: Inactive
