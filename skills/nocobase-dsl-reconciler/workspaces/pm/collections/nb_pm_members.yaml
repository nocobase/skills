name: nb_pm_members
title: Members
fields:
  - name: name
    interface: input
    title: Name
  - name: email
    interface: email
    title: Email
  - name: role
    interface: select
    title: Role
    options:
      - value: manager
        label: Manager
      - value: developer
        label: Developer
      - value: designer
        label: Designer
      - value: tester
        label: Tester
  - name: status
    interface: select
    title: Status
    options:
      - value: active
        label: Active
      - value: inactive
        label: Inactive
