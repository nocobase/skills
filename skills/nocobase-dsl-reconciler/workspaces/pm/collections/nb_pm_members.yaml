name: nb_pm_members
title: Members
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: email
    interface: email
    title: Email
  - name: role
    interface: select
    title: Role
    options:
      - value: pm
        label: Project Manager
      - value: developer
        label: Developer
      - value: designer
        label: Designer
      - value: qa
        label: QA
      - value: product_owner
        label: Product Owner
      - value: stakeholder
        label: Stakeholder
  - name: department
    interface: input
    title: Department
  - name: phone
    interface: phone
    title: Phone
  - name: status
    interface: select
    title: Status
    options:
      - value: active
        label: Active
      - value: inactive
        label: Inactive
    default: active
