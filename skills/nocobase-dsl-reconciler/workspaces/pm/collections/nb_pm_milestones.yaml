name: nb_pm_milestones
title: Milestones
fields:
  - name: name
    interface: input
    title: Name
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
    foreignKey: projectId
  - name: projectId
    interface: integer
    title: Project ID
  - name: dueDate
    interface: dateOnly
    title: Due Date
  - name: status
    interface: select
    title: Status
    options:
      - value: not_started
        label: Not Started
      - value: in_progress
        label: In Progress
      - value: completed
        label: Completed
  - name: description
    interface: textarea
    title: Description
