name: nb_pm_milestones
title: Milestones
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: project_id
    interface: integer
    title: Project ID
  - name: status
    interface: select
    title: Status
    options:
      - value: not_started
        label: Not started
      - value: in_progress
        label: In progress
      - value: completed
        label: Completed
      - value: cancelled
        label: Cancelled
    default: not_started
  - name: due_date
    interface: dateOnly
    title: Due Date
  - name: description
    interface: textarea
    title: Description
  - name: tasks
    interface: o2m
    title: Tasks
    target: nb_pm_tasks
