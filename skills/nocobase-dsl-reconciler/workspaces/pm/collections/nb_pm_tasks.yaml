name: nb_pm_tasks
title: Tasks
fields:
  - name: id
    interface: integer
    title: ID
  - name: name
    interface: input
    title: Name
  - name: description
    interface: textarea
    title: Description
  - name: status
    interface: select
    title: Status
    options:
      - { value: todo, label: Todo }
      - { value: in_progress, label: In Progress }
      - { value: review, label: Review }
      - { value: done, label: Done }
  - name: priority
    interface: select
    title: Priority
    options:
      - { value: low, label: Low }
      - { value: medium, label: Medium }
      - { value: high, label: High }
  - name: due_date
    interface: dateOnly
    title: Due Date
  - name: project_id
    interface: integer
    title: Project ID
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: assignee_id
    interface: integer
    title: Assignee ID
  - name: assignee
    interface: m2o
    title: Assignee
    target: nb_pm_members
  - name: createdAt
    interface: createdAt
    title: Created At
  - name: updatedAt
    interface: updatedAt
    title: Updated At
