name: nb_pm_tasks
title: Tasks
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: project_id
    interface: integer
    title: Project ID
  - name: milestone
    interface: m2o
    title: Milestone
    target: nb_pm_milestones
  - name: milestone_id
    interface: integer
    title: Milestone ID
  - name: assignee
    interface: m2o
    title: Assignee
    target: nb_pm_members
  - name: assignee_id
    interface: integer
    title: Assignee ID
  - name: status
    interface: select
    title: Status
    options:
      - value: todo
        label: To do
      - value: in_progress
        label: In progress
      - value: in_review
        label: In review
      - value: done
        label: Done
      - value: cancelled
        label: Cancelled
    default: todo
  - name: priority
    interface: select
    title: Priority
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
      - value: urgent
        label: Urgent
    default: medium
  - name: due_date
    interface: dateOnly
    title: Due Date
  - name: estimated_hours
    interface: number
    title: Estimated Hours
  - name: description
    interface: textarea
    title: Description
