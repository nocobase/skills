name: nb_pm_tasks
title: Tasks
titleField: name
fields:
  - name: name
    interface: input
    title: Name
    required: true
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: assignee
    interface: m2o
    title: Assignee
    target: nb_pm_members
  - name: status
    interface: select
    title: Status
    options:
      - value: todo
        label: To Do
      - value: in_progress
        label: In Progress
      - value: blocked
        label: Blocked
      - value: done
        label: Done
  - name: priority
    interface: select
    title: Priority
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
  - name: due_date
    interface: dateOnly
    title: Due Date
  - name: estimated_hours
    interface: number
    title: Estimated Hours
  - name: description
    interface: textarea
    title: Description
