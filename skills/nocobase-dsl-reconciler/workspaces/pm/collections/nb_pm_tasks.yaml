name: nb_pm_tasks
title: Tasks
fields:
  - name: name
    interface: input
    title: Name
  - name: status
    interface: select
    title: Status
    options:
      - value: todo
        label: To Do
      - value: in_progress
        label: In Progress
      - value: done
        label: Done
      - value: blocked
        label: Blocked
  - name: priority
    interface: select
    title: Priority
    options:
      - value: low
        label: Low
      - value: medium
        label: Medium
      - value: high
        label: High
  - name: description
    interface: textarea
    title: Description
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
    foreignKey: projectId
  - name: projectId
    interface: integer
    title: Project ID
  - name: assignee
    interface: m2o
    title: Assignee
    target: nb_pm_members
    foreignKey: assigneeId
  - name: assigneeId
    interface: integer
    title: Assignee ID
  - name: dueDate
    interface: dateOnly
    title: Due Date
