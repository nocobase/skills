name: nb_pm_team_members
title: Team Members
titleField: role_on_project
fields:
  - name: project
    interface: m2o
    title: Project
    target: nb_pm_projects
  - name: member
    interface: m2o
    title: Member
    target: nb_pm_members
  - name: role_on_project
    interface: input
    title: Role On Project
    required: true
  - name: status
    interface: select
    title: Status
    options:
      - value: planned
        label: Planned
      - value: active
        label: Active
      - value: ended
        label: Ended
  - name: allocation_percent
    interface: percent
    title: Allocation Percent
  - name: start_date
    interface: dateOnly
    title: Start Date
  - name: end_date
    interface: dateOnly
    title: End Date
