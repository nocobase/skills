name: 'Form (Edit): Milestones'
type: block
collectionName: nb_pm_milestones
content:
  key: editForm
  type: editForm
  coll: nb_pm_milestones
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - name
    - project
    - owner
    - status
    - due_date
    - description
  field_layout:
    - '--- Milestone Info ---'
    - - name
      - project
    - - owner
      - status
    - - due_date
    - '--- Description ---'
    - - description
  actions:
    - submit
