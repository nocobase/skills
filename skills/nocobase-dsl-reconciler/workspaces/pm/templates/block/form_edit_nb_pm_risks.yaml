name: 'Form (Edit): Risks'
type: block
collectionName: nb_pm_risks
content:
  key: editForm
  type: editForm
  coll: nb_pm_risks
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - name
    - project
    - owner
    - severity
    - status
    - mitigation_plan
  field_layout:
    - '--- Risk Info ---'
    - - name
      - project
    - - owner
      - severity
    - - status
    - '--- Mitigation ---'
    - - mitigation_plan
  actions:
    - submit
