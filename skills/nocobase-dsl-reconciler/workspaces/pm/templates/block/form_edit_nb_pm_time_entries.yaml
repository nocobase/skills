name: 'Form (Edit): Time Entries'
type: block
collectionName: nb_pm_time_entries
content:
  key: editForm
  type: editForm
  coll: nb_pm_time_entries
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - name
    - task
    - member
    - entry_date
    - hours
    - billable
    - notes
  field_layout:
    - '--- Time Entry ---'
    - - name
    - - task
      - member
    - - entry_date
      - hours
    - - billable
    - '--- Notes ---'
    - - notes
  actions:
    - submit
