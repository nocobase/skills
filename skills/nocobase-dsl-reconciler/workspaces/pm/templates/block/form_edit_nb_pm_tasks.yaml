name: 'Form (Edit): Tasks'
type: block
collectionName: nb_pm_tasks
content:
  key: editForm
  type: editForm
  coll: nb_pm_tasks
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - name
    - status
    - priority
    - description
    - project
    - assignee
    - dueDate
  field_layout:
    - '--- Task Info ---'
    - - name
      - status
    - - priority
      - dueDate
    - '--- Assignment ---'
    - - project
      - assignee
    - '--- Details ---'
    - - description
  actions:
    - submit
