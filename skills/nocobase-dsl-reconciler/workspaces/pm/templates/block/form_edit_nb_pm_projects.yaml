name: 'Form (Edit): Projects'
type: block
collectionName: nb_pm_projects
content:
  key: editForm
  type: updateForm
  coll: nb_pm_projects
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - name
    - status
    - priority
    - start_date
    - end_date
    - description
  field_layout:
    - '--- Basic Info ---'
    - - name
      - status
    - - priority
    - '--- Schedule ---'
    - - start_date
      - end_date
    - '--- Details ---'
    - - description
  actions:
    - submit
