name: 'Form (Edit): Team Members'
type: block
collectionName: nb_pm_team_members
content:
  key: editForm
  type: editForm
  coll: nb_pm_team_members
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - project
    - member
    - role_on_project
    - status
    - allocation_percent
    - start_date
    - end_date
  field_layout:
    - '--- Assignment ---'
    - - project
      - member
    - - role_on_project
      - status
    - '--- Allocation ---'
    - - allocation_percent
    - - start_date
      - end_date
  actions:
    - submit
