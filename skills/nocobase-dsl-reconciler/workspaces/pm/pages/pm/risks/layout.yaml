blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_risks
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - mitigation_plan
      - project
      - severity
    js_items:
      - key: risk_status_filters
        file: ./js/risk_status_filters.js
        desc: Risk Status Filters
    field_layout:
      - - '[JS:Risk Status Filters]'
      - - name
        - project
        - severity
  - key: table
    type: table
    coll: nb_pm_risks
    filter:
      status.$eq: '{{ ctx.urlSearchParams.status }}'
    fields:
      - field: name
        clickToOpen: true
      - project
      - severity
      - status
      - owner
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
