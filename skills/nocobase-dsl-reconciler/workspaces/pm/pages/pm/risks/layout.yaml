blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_risks
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - mitigation
      - status
      - project
    js_items:
      - key: filter_buttons
        file: ./js/filter_buttons.js
        desc: Risk Filter Buttons
    field_layout:
      - - '[JS:Risk Filter Buttons]'
      - - name
        - status
        - project
  - key: table
    type: table
    coll: nb_pm_risks
    fields:
      - field: name
        popup: true
      - project
      - probability
      - impact
      - status
      - owner
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
