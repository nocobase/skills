blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_tasks
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - status
      - project
    js_items:
      - desc: Task Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Task Stats Filter Block]'
      - - name
        - status
      - - project
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_pm_tasks
    fields:
      - field: name
        popup: true
      - project
      - assignee
      - status
      - priority
      - due_date
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
