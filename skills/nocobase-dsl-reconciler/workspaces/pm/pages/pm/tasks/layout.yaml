blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_tasks
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - status
      - assignee
    js_items:
      - key: filter_buttons
        file: ./js/filter_buttons.js
        desc: Task Filter Buttons
    field_layout:
      - - '[JS:Task Filter Buttons]'
      - - name
        - status
        - assignee
  - key: table
    type: table
    coll: nb_pm_tasks
    fields:
      - field: name
        popup: true
      - status
      - priority
      - dueDate
      - estimatedHours
      - actualHours
      - project
      - assignee
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
