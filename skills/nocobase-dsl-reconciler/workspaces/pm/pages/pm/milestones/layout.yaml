blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_milestones
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - status
      - project
    js_items:
      - key: filter_buttons
        file: ./js/filter_buttons.js
        desc: Milestone Filter Buttons
    field_layout:
      - - '[JS:Milestone Filter Buttons]'
      - - name
        - status
        - project
  - key: table
    type: table
    coll: nb_pm_milestones
    fields:
      - field: name
        popup: true
      - project
      - dueDate
      - status
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
