blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_milestones
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - project
      - owner
    js_items:
      - key: milestone_status_filters
        file: ./js/milestone_status_filters.js
        desc: Milestone Status Filters
    field_layout:
      - - '[JS:Milestone Status Filters]'
      - - name
        - project
        - owner
  - key: table
    type: table
    coll: nb_pm_milestones
    filter:
      status.$eq: '{{ ctx.urlSearchParams.status }}'
    fields:
      - field: name
        clickToOpen: true
      - project
      - owner
      - status
      - due_date
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
