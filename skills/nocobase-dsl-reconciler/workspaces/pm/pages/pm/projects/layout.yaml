blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_projects
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - status
      - priority
    js_items:
      - desc: Project Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Project Stats Filter Block]'
      - - name
        - status
      - - priority
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_pm_projects
    fields:
      - field: name
        popup: true
      - status
      - priority
      - start_date
      - end_date
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
