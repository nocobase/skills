blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_projects
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - code
          - description
      - owner
      - priority
    js_items:
      - key: project_status_filters
        file: ./js/project_status_filters.js
        desc: Project Status Filters
    field_layout:
      - - '[JS:Project Status Filters]'
      - - name
        - owner
        - priority
  - key: table
    type: table
    coll: nb_pm_projects
    filter:
      status.$eq: '{{ ctx.urlSearchParams.status }}'
    fields:
      - field: name
        clickToOpen: true
      - code
      - status
      - priority
      - owner
      - end_date
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
