blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_projects
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - code
          - description
      - status
      - priority
      - owner
    field_layout:
      - - name
        - status
      - - priority
        - owner
  - key: table
    type: table
    coll: nb_pm_projects
    fields:
      - field: name
        popup: true
      - code
      - status
      - priority
      - owner
      - end_date
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
