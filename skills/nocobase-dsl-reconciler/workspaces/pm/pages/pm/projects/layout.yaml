blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_projects
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - description
      - status
      - manager
    js_items:
      - key: filter_buttons
        file: ./js/filter_buttons.js
        desc: Project Filter Buttons
    field_layout:
      - - '[JS:Project Filter Buttons]'
      - - name
        - status
        - manager
  - key: table
    type: table
    coll: nb_pm_projects
    fields:
      - field: name
        popup: true
      - status
      - manager
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
