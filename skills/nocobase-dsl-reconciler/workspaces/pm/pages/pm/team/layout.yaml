blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_members
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - email
      - role
      - department
      - status
    js_items:
      - key: filter_buttons
        file: ./js/filter_buttons.js
        desc: Team Filter Buttons
    field_layout:
      - - '[JS:Team Filter Buttons]'
      - - name
        - role
        - department
      - - status
  - key: table
    type: table
    coll: nb_pm_members
    fields:
      - field: name
        popup: true
      - email
      - phone
      - role
      - department
      - status
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
