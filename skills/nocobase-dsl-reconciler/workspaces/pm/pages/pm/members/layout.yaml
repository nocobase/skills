blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_members
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - email
      - role
    js_items:
      - key: members_status_buttons
        file: ./js/members_filterForm_status_buttons.js
        desc: Member Role Filter Buttons
    field_layout:
      - - '[JS:Member Role Filter Buttons]'
      - - name
        - role
  - key: table
    type: table
    coll: nb_pm_members
    fields:
      - field: name
        popup: true
      - email
      - role
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
