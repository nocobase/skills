blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_members
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - email
          - role
          - department
      - role
      - department
    js_items:
      - key: member_status_filters
        file: ./js/member_status_filters.js
        desc: Member Status Filters
    field_layout:
      - - '[JS:Member Status Filters]'
      - - name
        - role
        - department
  - key: table
    type: table
    coll: nb_pm_members
    filter:
      status.$eq: '{{ ctx.urlSearchParams.status }}'
    fields:
      - field: name
        clickToOpen: true
      - email
      - role
      - department
      - status
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
