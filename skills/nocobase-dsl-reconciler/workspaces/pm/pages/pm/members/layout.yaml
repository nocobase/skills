blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_members
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - email
          - department
      - role
      - status
    js_items:
      - desc: Member Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Member Stats Filter Block]'
      - - name
        - status
      - - role
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_pm_members
    fields:
      - field: name
        popup: true
      - email
      - role
      - department
      - status
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
