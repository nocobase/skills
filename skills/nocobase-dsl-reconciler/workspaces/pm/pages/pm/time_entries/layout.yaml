blocks:
  - key: filterForm
    type: filterForm
    coll: nb_pm_time_entries
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - notes
      - task
      - member
    js_items:
      - key: time_entry_billable_filters
        file: ./js/time_entry_billable_filters.js
        desc: Time Entry Billable Filters
    field_layout:
      - - '[JS:Time Entry Billable Filters]'
      - - name
        - task
        - member
  - key: table
    type: table
    coll: nb_pm_time_entries
    filter:
      billable.$eq: '{{ ctx.urlSearchParams.billable }}'
    fields:
      - field: name
        popup: true
      - task
      - member
      - entry_date
      - hours
      - billable
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
