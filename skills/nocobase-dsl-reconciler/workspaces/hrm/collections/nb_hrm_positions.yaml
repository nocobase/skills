name: nb_hrm_positions
title: Positions
titleField: title
fields:
  - name: title
    interface: input
    title: Title
  - name: code
    interface: input
    title: Code
  - name: department_id
    interface: integer
    title: Department ID
  - name: department
    interface: m2o
    title: Department
    target: nb_hrm_departments
    foreignKey: department_id
    targetField: id
  - name: grade
    interface: select
    title: Grade
    options:
      - value: j1
        label: J1
      - value: j2
        label: J2
      - value: s1
        label: S1
      - value: m1
        label: M1
      - value: d1
        label: D1
  - name: employment_type
    interface: select
    title: Employment Type
    options:
      - value: full_time
        label: Full Time
      - value: part_time
        label: Part Time
      - value: contract
        label: Contract
      - value: internship
        label: Internship
  - name: headcount
    interface: integer
    title: Headcount
  - name: status
    interface: select
    title: Status
    options:
      - value: open
        label: Open
      - value: filled
        label: Filled
      - value: frozen
        label: Frozen
  - name: description
    interface: textarea
    title: Description
