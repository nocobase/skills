name: nb_hrm_attendance
title: Attendance
titleField: entry_code
fields:
  - name: entry_code
    interface: input
    title: Entry Code
  - name: employee_id
    interface: integer
    title: Employee ID
  - name: employee
    interface: m2o
    title: Employee
    target: nb_hrm_employees
    foreignKey: employee_id
    targetField: id
  - name: attendance_date
    interface: dateOnly
    title: Attendance Date
  - name: check_in
    interface: time
    title: Check In
  - name: check_out
    interface: time
    title: Check Out
  - name: attendance_status
    interface: select
    title: Attendance Status
    options:
      - value: present
        label: Present
      - value: late
        label: Late
      - value: remote
        label: Remote
      - value: absent
        label: Absent
      - value: on_leave
        label: On Leave
  - name: work_hours
    interface: number
    title: Work Hours
  - name: overtime_hours
    interface: number
    title: Overtime Hours
  - name: notes
    interface: textarea
    title: Notes
