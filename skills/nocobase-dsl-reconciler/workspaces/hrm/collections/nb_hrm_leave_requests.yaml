name: nb_hrm_leave_requests
title: Leave Requests
fields:
  - name: title
    interface: input
    title: Title
  - name: employee
    interface: m2o
    title: Employee
    target: nb_hrm_employees
  - name: leave_type
    interface: select
    title: Leave Type
    options:
      - value: annual
        label: Annual Leave
      - value: sick
        label: Sick Leave
      - value: personal
        label: Personal Leave
      - value: maternity
        label: Maternity Leave
      - value: unpaid
        label: Unpaid Leave
  - name: start_date
    interface: dateOnly
    title: Start Date
  - name: end_date
    interface: dateOnly
    title: End Date
  - name: status
    interface: select
    title: Status
    options:
      - value: pending
        label: Pending
      - value: approved
        label: Approved
      - value: rejected
        label: Rejected
  - name: reason
    interface: textarea
    title: Reason
  - name: approver
    interface: m2o
    title: Approver
    target: nb_hrm_employees
