name: nb_hrm_payroll
title: Payroll
titleField: payroll_code
fields:
  - name: payroll_code
    interface: input
    title: Payroll Code
  - name: employee_id
    interface: integer
    title: Employee ID
  - name: employee
    interface: m2o
    title: Employee
    target: nb_hrm_employees
    foreignKey: employee_id
    targetField: id
  - name: pay_period
    interface: input
    title: Pay Period
  - name: base_salary
    interface: number
    title: Base Salary
  - name: allowance
    interface: number
    title: Allowance
  - name: bonus
    interface: number
    title: Bonus
  - name: deduction
    interface: number
    title: Deduction
  - name: net_pay
    interface: number
    title: Net Pay
  - name: payment_status
    interface: select
    title: Payment Status
    options:
      - value: pending
        label: Pending
      - value: processed
        label: Processed
      - value: paid
        label: Paid
      - value: on_hold
        label: On Hold
  - name: payment_date
    interface: dateOnly
    title: Payment Date
