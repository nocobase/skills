name: nb_hrm_employees
title: Employees
titleField: full_name
fields:
  - name: employee_id
    interface: input
    title: Employee ID
  - name: full_name
    interface: input
    title: Full Name
  - name: email
    interface: email
    title: Email
  - name: phone
    interface: phone
    title: Phone
  - name: department_id
    interface: integer
    title: Department ID
  - name: department
    interface: m2o
    title: Department
    target: nb_hrm_departments
    foreignKey: department_id
    targetField: id
  - name: position_id
    interface: integer
    title: Position ID
  - name: position
    interface: m2o
    title: Position
    target: nb_hrm_positions
    foreignKey: position_id
    targetField: id
  - name: manager_id
    interface: integer
    title: Manager ID
  - name: manager
    interface: m2o
    title: Manager
    target: nb_hrm_employees
    foreignKey: manager_id
    targetField: id
  - name: hire_date
    interface: dateOnly
    title: Hire Date
  - name: employment_type
    interface: select
    title: Employment Type
    options:
      - value: full_time
        label: Full Time
      - value: part_time
        label: Part Time
      - value: contract
        label: Contract
      - value: internship
        label: Internship
  - name: status
    interface: select
    title: Status
    options:
      - value: active
        label: Active
      - value: on_leave
        label: On Leave
      - value: probation
        label: Probation
      - value: terminated
        label: Terminated
  - name: base_salary
    interface: number
    title: Base Salary
  - name: address
    interface: textarea
    title: Address
