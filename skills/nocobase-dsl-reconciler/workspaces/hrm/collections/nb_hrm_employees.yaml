name: nb_hrm_employees
title: Employees
fields:
  - name: name
    interface: input
    title: Name
  - name: employee_no
    interface: input
    title: Employee No
  - name: email
    interface: email
    title: Email
  - name: phone
    interface: phone
    title: Phone
  - name: department
    interface: m2o
    title: Department
    target: nb_hrm_departments
  - name: position
    interface: input
    title: Position
  - name: status
    interface: select
    title: Status
    options:
      - value: active
        label: Active
      - value: on_leave
        label: On Leave
      - value: resigned
        label: Resigned
  - name: hire_date
    interface: dateOnly
    title: Hire Date
