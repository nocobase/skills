blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_employees
    fields:
      - field: full_name
        label: Search
        filterPaths:
          - full_name
          - employee_id
          - email
      - status
      - department
    js_items:
      - key: stats_filter_block
        file: ./js/filter_stats.js
        desc: Stats Filter Block
    field_layout:
      - - '[JS:Stats Filter Block]'
      - - full_name
        - status
        - department
  - key: table
    type: table
    coll: nb_hrm_employees
    fields:
      - field: full_name
        clickToOpen: true
      - employee_id
      - department
      - position
      - status
      - hire_date
      - base_salary
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
