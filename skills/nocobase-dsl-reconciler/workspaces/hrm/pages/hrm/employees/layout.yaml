blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_employees
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - employee_no
          - email
          - position
      - status
    js_items:
      - desc: Employee Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Employee Stats Filter Block]'
      - - name
        - status
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_hrm_employees
    fields:
      - field: name
        popup: true
      - employee_no
      - department
      - position
      - status
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
