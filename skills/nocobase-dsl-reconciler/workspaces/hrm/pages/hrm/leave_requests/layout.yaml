blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_leave_requests
    fields:
      - field: employee
        label: Search
        filterPaths:
          - employee.name
          - reason
      - leave_type
      - status
    js_items:
      - desc: Leave Request Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Leave Request Stats Filter Block]'
      - - employee
        - leave_type
      - - status
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_hrm_leave_requests
    fields:
      - field: employee
        popup: true
      - leave_type
      - start_date
      - end_date
      - status
      - approver
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
