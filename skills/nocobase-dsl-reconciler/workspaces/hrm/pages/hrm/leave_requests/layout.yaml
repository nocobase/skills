blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_leave_requests
    fields:
      - field: request_code
        label: Search
        filterPaths:
          - request_code
          - approver_name
      - status
      - leave_type
    js_items:
      - key: stats_filter_block
        file: ./js/filter_stats.js
        desc: Stats Filter Block
    field_layout:
      - - '[JS:Stats Filter Block]'
      - - request_code
        - status
        - leave_type
  - key: table
    type: table
    coll: nb_hrm_leave_requests
    fields:
      - field: request_code
        clickToOpen: true
      - employee
      - leave_type
      - start_date
      - end_date
      - days_requested
      - status
      - approver_name
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
