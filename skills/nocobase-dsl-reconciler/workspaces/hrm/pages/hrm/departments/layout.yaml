blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_departments
    fields:
      - field: name
        label: Search
        filterPaths:
          - name
          - code
          - description
    js_items:
      - desc: Department Stats Filter Block
        file: ./js/filter_stats.js
    field_layout:
      - - '[JS:Department Stats Filter Block]'
      - - name
    actions:
      - submit
      - reset
  - key: table
    type: table
    coll: nb_hrm_departments
    fields:
      - field: name
        popup: true
      - code
      - createdAt
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
