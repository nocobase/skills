blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_performance_reviews
    fields:
      - field: review_code
        label: Search
        filterPaths:
          - review_code
          - review_period
      - status
      - rating
    js_items:
      - key: stats_filter_block
        file: ./js/filter_stats.js
        desc: Stats Filter Block
    field_layout:
      - - '[JS:Stats Filter Block]'
      - - review_code
        - status
        - rating
  - key: table
    type: table
    coll: nb_hrm_performance_reviews
    fields:
      - field: review_code
        popup: true
      - employee
      - reviewer
      - review_period
      - score
      - rating
      - status
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
