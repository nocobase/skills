blocks:
  - key: filterForm
    type: filterForm
    coll: nb_hrm_payroll
    fields:
      - field: payroll_code
        label: Search
        filterPaths:
          - payroll_code
          - pay_period
      - payment_status
      - employee
    js_items:
      - key: stats_filter_block
        file: ./js/filter_stats.js
        desc: Stats Filter Block
    field_layout:
      - - '[JS:Stats Filter Block]'
      - - payroll_code
        - payment_status
        - employee
  - key: table
    type: table
    coll: nb_hrm_payroll
    fields:
      - field: payroll_code
        popup: true
      - employee
      - pay_period
      - base_salary
      - bonus
      - deduction
      - net_pay
      - payment_status
    actions:
      - filter
      - refresh
      - addNew
    recordActions:
      - edit
      - delete
layout:
  - - filterForm
  - - table
