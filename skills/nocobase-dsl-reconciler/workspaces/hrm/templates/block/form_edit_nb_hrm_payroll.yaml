name: 'Form (Edit): Payroll'
type: block
collectionName: nb_hrm_payroll
content:
  key: editForm
  type: editForm
  coll: nb_hrm_payroll
  resource_binding:
    filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
  fields:
    - payroll_code
    - employee
    - pay_period
    - base_salary
    - allowance
    - bonus
    - deduction
    - net_pay
    - payment_status
    - payment_date
  field_layout:
    - '--- Payroll Run ---'
    - - payroll_code
      - employee
    - - pay_period
      - payment_status
    - - base_salary
      - allowance
    - - bonus
      - deduction
    - - net_pay
      - payment_date
  actions:
    - submit
