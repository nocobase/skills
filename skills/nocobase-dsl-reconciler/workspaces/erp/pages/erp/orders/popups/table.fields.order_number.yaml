target: $SELF.table.fields.order_number
mode: drawer
tabs:
  - title: Summary
    blocks:
      - key: details
        type: details
        coll: nb_erp_customer_orders
        resource_binding:
          filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - order_number
          - customer
          - status
          - payment_status
          - order_date
          - required_date
          - total_amount
          - shipping_address
          - notes
          - createdAt
        field_layout:
          - '--- Order Summary ---'
          - - order_number
            - customer
          - - status
            - payment_status
          - '--- Dates & Amount ---'
          - - order_date
            - required_date
          - - total_amount
          - '--- Fulfillment ---'
          - - shipping_address
          - - notes
        actions:
          - edit
      - key: line_items
        type: table
        title: Order Line Items
        coll: nb_erp_order_lines
        resource_binding:
          associationName: nb_erp_customer_orders.order_lines
          sourceId: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - line_label
          - product
          - quantity
          - unit_price
          - discount_amount
          - line_total
          - fulfill_status
        actions:
          - filter
          - refresh
          - addNew
        recordActions:
          - edit
          - delete
      - key: movements
        type: list
        title: Related Inventory Movements
        coll: nb_erp_inventory_movements
        resource_binding:
          associationName: nb_erp_customer_orders.inventory_movements
          sourceId: '{{ctx.view.inputArgs.filterByTk}}'
        fields:
          - reference_number
          - movement_type
          - quantity
          - movement_date
        field_layout:
          - - reference_number
            - movement_type
          - - quantity
            - movement_date
        actions:
          - filter
          - refresh
    layout:
      - - details: 10
        - line_items: 14
      - - movements
  - title: History
    blocks:
      - key: recordHistory
        type: recordHistory
        coll: nb_erp_customer_orders
