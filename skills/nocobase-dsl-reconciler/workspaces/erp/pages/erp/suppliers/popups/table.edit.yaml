target: $SELF.table.recordActions.edit
coll: nb_erp_suppliers
blocks:
  - key: editForm
    type: editForm
    coll: nb_erp_suppliers
    fields:
      - supplier_code
      - name
      - contact_name
      - email
      - phone
      - status
      - payment_terms
      - lead_time_days
      - address
      - notes
    field_layout:
      - '--- Supplier Profile ---'
      - - supplier_code
        - name
      - - contact_name
        - email
      - - phone
        - status
      - '--- Purchasing ---'
      - - payment_terms
        - lead_time_days
      - '--- Address & Notes ---'
      - - address
      - - notes
    actions:
      - submit
    _fromRef: templates/block/form_add_new_nb_erp_suppliers.yaml
    resource_binding:
      filterByTk: '{{ctx.view.inputArgs.filterByTk}}'
