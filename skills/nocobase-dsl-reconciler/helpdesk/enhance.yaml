popups:
  # Dashboard page - Tickets table
  - target: $dashboard.table.actions.addNew
    auto: [edit, detail]
    view_field: title
    coll: nb_helpdesk_tickets
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - title
          - description
          - priority
          - status
          - category
          - reporter
          - assignee
          - due_date
          - resolution
        field_layout:
          - '--- Basic Info ---'
          - - title
            - category
          - - priority
            - status
          - - reporter
            - assignee
          - '--- Details ---'
          - - due_date
          - - description
          - '--- Resolution ---'
          - - resolution
        actions: [submit]

  # Tickets page - Tickets table
  - target: $tickets.table.actions.addNew
    auto: [edit, detail]
    view_field: title
    coll: nb_helpdesk_tickets
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - title
          - description
          - priority
          - status
          - category
          - reporter
          - assignee
          - due_date
          - resolution
        field_layout:
          - '--- Basic Info ---'
          - - title
            - category
          - - priority
            - status
          - - reporter
            - assignee
          - '--- Details ---'
          - - due_date
          - - description
          - '--- Resolution ---'
          - - resolution
        actions: [submit]

  # Users page - Users table
  - target: $users.table.actions.addNew
    auto: [edit, detail]
    view_field: name
    coll: nb_helpdesk_users
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - name
          - email
          - role
          - department
        field_layout:
          - '--- User Info ---'
          - - name
            - email
          - - role
            - department
        actions: [submit]

  # SLA Configs page - SLA Configs table
  - target: $sla_configs.table.actions.addNew
    auto: [edit, detail]
    view_field: priority
    coll: nb_helpdesk_sla_configs
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - priority
          - response_time_minutes
          - resolve_time_minutes
          - is_active
        field_layout:
          - '--- SLA Settings ---'
          - - priority
            - is_active
          - - response_time_minutes
            - resolve_time_minutes
        actions: [submit]

  # Knowledge Base page - Knowledge Base table
  - target: $knowledge_base.table.actions.addNew
    auto: [edit, detail]
    view_field: title
    coll: nb_helpdesk_knowledge_base
    blocks:
      - key: form
        type: createForm
        resource:
          binding: currentCollection
        fields:
          - title
          - content
          - category
          - author
          - views
        field_layout:
          - '--- Article Info ---'
          - - title
            - category
          - - author
            - views
          - '--- Content ---'
          - - content
        actions: [submit]
