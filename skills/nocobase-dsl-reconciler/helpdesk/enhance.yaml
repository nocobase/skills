popups:
# Tickets popups
- target: $tickets.table.actions.addNew
  auto: [edit, detail]
  view_field: ticketNo
  coll: nb_helpdesk_tickets
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - ticketNo
    - title
    - description
    - status
    - priority
    - category
    - assignee
    - requesterEmail
    field_layout:
    - '--- Ticket Info ---'
    - - ticketNo
      - title
    - - status
      - priority
    - - category
      - assignee
    - - requesterEmail
    - '--- Description ---'
    - - description
    actions: [submit]

- target: $tickets.table.fields.ticketNo
  coll: nb_helpdesk_tickets
  blocks:
  - key: details
    type: details
    coll: nb_helpdesk_tickets
    resource:
      binding: currentRecord
    fields:
    - ticketNo
    - title
    - status
    - priority
    - category
    - assignee
    - requesterEmail
    - description
    - createdAt
    field_layout:
    - - ticketNo
      - title
    - - status
      - priority
    - - category
      - assignee
    - - requesterEmail
      - createdAt
    - - description

