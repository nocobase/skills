# enhance.yaml - AddNew popups with auto-derived edit + detail popups
popups:

# ========== Bookings Page ==========
- target: $bookings.table.actions.addNew
  auto: [edit, detail]
  view_field: booking_no
  coll: nb_booking_bookings
  blocks:
  - key: form
    type: createForm
    resource:
      binding: currentCollection
    fields:
    - booking_no
    - customer
    - service
    - booking_date
    - time_slot
    - status
    - amount
    - notes
    field_layout:
    - '--- Booking Info ---'
    - - booking_no
      - status
    - - booking_date
      - time_slot
    - '--- Service Details ---'
    - - customer
      - service
    - - amount
    - '--- Notes ---'
    - - notes
    actions: [submit]

