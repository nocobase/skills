module: Booking
icon: calendarnextoutlined

# ========== Collections ==========
collections:

  nb_booking_customers:
    title: Customers
    title_field: name
    fields:
    - name: name
      type: string
      interface: input
      required: true
    - name: email
      type: string
      interface: email
    - name: phone
      type: string
      interface: phone
    - name: membership
      type: string
      interface: select
      enum:
      - value: standard
        label: Standard
        color: default
      - value: vip
        label: VIP
        color: gold
      - value: premium
        label: Premium
        color: purple

  nb_booking_services:
    title: Services
    title_field: name
    fields:
    - name: name
      type: string
      interface: input
      required: true
    - name: duration_minutes
      type: integer
      interface: integer
    - name: price
      type: double
      interface: number
      precision: 2
    - name: category
      type: string
      interface: input
    - name: status
      type: string
      interface: select
      enum:
      - value: active
        label: Active
        color: green
      - value: inactive
        label: Inactive
        color: gray

  nb_booking_rooms:
    title: Rooms
    title_field: name
    fields:
    - name: name
      type: string
      interface: input
      required: true
    - name: capacity
      type: integer
      interface: integer
    - name: location
      type: string
      interface: input
    - name: status
      type: string
      interface: select
      enum:
      - value: available
        label: Available
        color: green
      - value: occupied
        label: Occupied
        color: red
      - value: maintenance
        label: Maintenance
        color: orange

  nb_booking_bookings:
    title: Bookings
    title_field: booking_no
    fields:
    - name: booking_no
      type: string
      interface: input
      required: true
    - name: customer
      type: belongsTo
      interface: m2o
      target: nb_booking_customers
      foreignKey: customer_id
    - name: service
      type: belongsTo
      interface: m2o
      target: nb_booking_services
      foreignKey: service_id
    - name: booking_date
      type: date
      interface: date
    - name: time_slot
      type: string
      interface: input
    - name: status
      type: string
      interface: select
      enum:
      - value: pending
        label: Pending
        color: orange
      - value: confirmed
        label: Confirmed
        color: blue
      - value: completed
        label: Completed
        color: green
      - value: cancelled
        label: Cancelled
        color: red
    - name: amount
      type: double
      interface: number
      precision: 2
    - name: notes
      type: text
      interface: textarea

# ========== Pages ==========
pages:

- page: Dashboard
  icon: dashboardoutlined
  blocks:
  - key: dashboard_kpi
    type: jsBlock
    desc: Dashboard KPI Cards - Today's bookings, revenue, occupancy
    file: ./js/dashboard_kpi.js
  - key: dashboard_chart
    type: jsBlock
    desc: Weekly bookings chart
    file: ./js/dashboard_chart.js
  layout:
  - - dashboard_kpi
  - - dashboard_chart

- page: Bookings
  coll: nb_booking_bookings
  icon: carryoutoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: booking_no
      label: Search
      filterPaths: [booking_no, customer.name, service.name]
  - key: table
    type: table
    coll: nb_booking_bookings
    fields:
    - booking_no
    - customer
    - service
    - booking_date
    - time_slot
    - status
    - amount
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

- page: Customers
  coll: nb_booking_customers
  icon: useroutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: name
      label: Search
      filterPaths: [name, email, phone]
  - key: table
    type: table
    coll: nb_booking_customers
    fields:
    - name
    - email
    - phone
    - membership
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

- page: Services
  coll: nb_booking_services
  icon: giftoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: name
      label: Search
      filterPaths: [name, category]
  - key: table
    type: table
    coll: nb_booking_services
    fields:
    - name
    - duration_minutes
    - price
    - category
    - status
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table

- page: Rooms
  coll: nb_booking_rooms
  icon: homeoutlined
  blocks:
  - key: filterForm
    type: filterForm
    fields:
    - field: name
      label: Search
      filterPaths: [name, location]
  - key: table
    type: table
    coll: nb_booking_rooms
    fields:
    - name
    - capacity
    - location
    - status
    actions:
    - filter
    - refresh
    - addNew
    recordActions:
    - edit
    - delete
  layout:
  - - filterForm
  - - table
