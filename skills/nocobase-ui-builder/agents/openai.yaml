interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with simplified executeDsl or low-level flow-surfaces APIs"
  default_prompt: "Use $nocobase-ui-builder for NocoBase Modern page (v2) UI. Route whole-page creation or replacement to executeDsl with the simplified page-structure JSON DSL. In replace mode, treat tabs as ordered page-structure input that rewrites existing route-backed tab slots by index; only use key when local layout or in-document targeting needs it. Route localized edits on existing pages/tabs/popups/nodes to low-level flow-surfaces APIs (read with get/describeSurface as needed, then write with compose/configure/add*/move*/remove*/updateMenu). Treat the live MCP schema as the source of truth and confirm real collections/fields/bindings before UI writes."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for Modern-page UI operations plus read-only schema discovery"

policy:
  allow_implicit_invocation: true
