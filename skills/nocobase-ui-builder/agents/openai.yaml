interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: whole-page -> `apply-blueprint`; localized edits -> low-level `flow-surfaces`; reactions -> `get-reaction-meta`. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only; ties keep backend order. Fresh one-off pages with local popup content and no template refs may stay inline. Existing template refs -> template source; page-scoped wording is not local-only intent; unresolved scope -> ask, not `copy`; explicit local customization -> `copy`. Without `popup.template`, use `popup.tryTemplate=true`; local popup content may use `popup.saveAsTemplate`; `openView.tryTemplate` stays valid. Use `routeId` for navigation; normalize to `pageSchemaUid`; never pass desktop route ids as `target.uid`. Prefer field popup, `associatedRecords+associationField`, and exactly one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
