interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: page `apply-blueprint`; localized edits -> `flow-surfaces`; reactions -> `get-reaction-meta`. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search stays discovery-only; ties keep backend order. Explicit local customization -> `copy`. Existing template refs -> template source; page wording not local-only intent; unresolved scope -> ask, not `copy`. No `popup.template`: `popup.tryTemplate=true`. Local `popup.blocks` -> `popup.saveAsTemplate={ name, description }`; never with `popup.template`/`popup.tryTemplate`. `openView.tryTemplate`. Use `routeId`, field popup, `associatedRecords+associationField`, one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
