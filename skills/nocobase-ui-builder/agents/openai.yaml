interface:
  display_name: "NocoBase UI Builder"
  short_description: "通过 NocoBase MCP / FlowSurfaces 检查、创建、修改、重排或删除 Modern page (v2) 的菜单、页面、页签、弹窗、布局与 block/field/action 配置"
  default_prompt: >
    Use $nocobase-ui-builder to inspect, build, update, reorder, or delete NocoBase Modern page (v2) menus, pages, tabs, popups, and block/field/action surfaces through live MCP capabilities.
    Treat inspect as read-only by default.
    Default to FlowSurfaces for every UI mutation and use desktop_routes_list_accessible(tree=true) for menu discovery.
    Treat desktop_routes_list_accessible(tree=true) as the current role's visible menu tree, not the global source of truth.
    Never use resource_* or generic CRUD to mutate page structure.
    Hand off ACL/route-permission work to nocobase-acl-manage, schema authoring to nocobase-data-modeling, and workflow authoring to nocobase-workflow-manage.
    Prefer menu-first flows: discover or create the target menu group, create a bindable menu item, then initialize the page with createPage(menuRouteId=...).
    If the user gives only a menu title, proceed only when the target group is uniquely identified, and treat createMenu(type="item") return values as pre-init ids until createPage(menuRouteId=...) completes.
    Choose the main path by user intent first, then enter popup/chart/js gates only when the task requires those contracts.
    Default writes to get -> catalog -> write -> readback.
    Classify writes by risk: compose/add* are safe append, configure/updateSettings are merge-like, setLayout/setEventFlows are high-impact full replace, and destroy/remove/apply(replace)/replace-style mutate are destructive.
    High-impact and destructive paths require explicit user intent plus an impact explanation first.
    If live get/catalog/context does not expose the needed capability, contract, or guard, stop instead of guessing.
    For server contract or validation errors, do at most one refresh/re-read/recompute/retry cycle before stopping.
    Any RunJS write must follow references/js.md, use the local Node validator in skill mode, and stop entirely if the validator cannot run or returns an indeterminate result.

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for flowSurfaces-based UI surface operations"

policy:
  allow_implicit_invocation: true
