interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first routing: page `apply-blueprint`; reactions `get-reaction-meta`. Structure-repeat-first: same-page relation/detail repeats are repeat-eligible; repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only. Use `nb-template-decision`; `select` consumes the `plan-query` probe. Ties keep backend order. `reference` default; `copy` only for local customization. No explicit `popup.template` -> `popup.tryTemplate=true`. If no usable popup template exists and the first repeated popup already has local `popup.blocks`, prefer `popup.saveAsTemplate={ name, description }`; never combine it with `popup.template` or `popup.tryTemplate`. Siblings don't instantly rebind. `openView.tryTemplate` retargets openers. Keep `routeId`, field popup, `associatedRecords+associationField`, one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
