interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `env --help`; repair CLI first. Intent-first routing: whole-page -> `apply-blueprint`, local edit -> `flow-surfaces`, reactions -> `get-reaction-meta`. Template planning is structure-repeat-first: repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only. Use `nb-template-decision` when present and feed `select` the `plan-query` probe. Rank templates by relation-field/opener then scene fit; smaller uid breaks ties. Default `reference`; use `copy` only for local customization. If no explicit `popup.template` and no local popup content, write `popup.tryTemplate=true` for popup-capable field/action/recordAction/compose/`apply-blueprint` popups. Keep `routeId`, field popup, `associatedRecords+associationField`, exactly one `editForm` in custom edit popups."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
