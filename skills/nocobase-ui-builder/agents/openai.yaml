interface:
  display_name: "NocoBase UI Builder"
  short_description: "搭建或修改 Modern page(v2) 的 page/tab/popup UI surface"
  default_prompt: "Use $nocobase-ui-builder to build, modify, or audit NocoBase Modern page (v2) UI surfaces. Treat runtime get/catalog/readback as the truth; for existing targets do get -> catalog before write, prefer createPage/compose/configure before precise edits, run minimal readback after writes, and distinguish route-backed tabs from popup child tabs when choosing lifecycle APIs."

policy:
  allow_implicit_invocation: true
