interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build NocoBase Modern pages with template reuse"
  default_prompt: "Use $nocobase-ui-builder to inspect, plan, or edit NocoBase Modern page (v2) UI, and when template reuse is needed, search templates first, then apply them in reference/copy mode."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for UI surface operations plus read-only schema discovery during blueprint planning"

policy:
  allow_implicit_invocation: true
