interface:
  display_name: "NocoBase UI Builder"
  short_description: "通过 NocoBase MCP 搭建、修改、重排或只读检查 Modern page(v2) UI surface"
  default_prompt: "Use $nocobase-ui-builder to build, update, reorder, or inspect NocoBase Modern page (v2) UI surfaces through live NocoBase MCP flowSurfaces capabilities."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for flowSurfaces-based UI surface operations"

policy:
  allow_implicit_invocation: true
