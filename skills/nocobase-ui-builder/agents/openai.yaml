interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `nocobase-ctl env --help`; repair CLI before MCP. Intent first: whole-page + localized flows probe templates via `list-templates`; explicit uid/name = identity, not availability. No live target.uid is not a blocker when planned context is clear. Rank `available=true` candidates; auto-pick stable best winner; ask only on a final tie. Default selected templates to `reference`; `copy` only for explicit local customization. Whole-page -> `apply-blueprint` after gate+ASCII; localized edit -> matching `flow-surfaces` command; reaction -> `get-reaction-meta` then `set-*`. 1 tab, no placeholders, `fields[]` strings-first, layout only on tabs/inline popup, `routeId`, field popup click-open, `associatedRecords+associationField`, one `editForm` per custom edit popup. API/MCP docs = payload mapping + fallback."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
