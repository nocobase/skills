interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with simplified executeDsl or low-level flow-surfaces APIs"
  default_prompt: "Use $nocobase-ui-builder for Modern pages. Choose one write path: whole-page create/replace -> executeDsl page JSON DSL; localized edits -> low-level flow-surfaces APIs. executeDsl: requestBody must be an object; never stringify or wrap values. Single-page tasks use 1 tab; never add empty tabs. layout is allowed only on tabs or inline popup; it must be an object, and if unsure omit it. Before first executeDsl, self-check: tab count matches intent, every tab.blocks is non-empty, no block has layout, block keys are unique, and every edit popup has exactly 1 editForm. If the user says clicking a record / relation record opens details, prefer a field popup / clickable field; use buttons only when explicitly requested. Field truth: collections:get(appends=[\"fields\"]), never collections.fields:list; skip empty/null interfaces. Use associatedRecords + associationField, string field.target, no generic form, no destructive cleanup unless asked."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for Modern-page UI operations plus read-only schema discovery"

policy:
  allow_implicit_invocation: true
