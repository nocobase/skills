interface:
  display_name: "NocoBase UI Builder"
  short_description: "通过 NocoBase MCP 搭建、修改、重排或只读检查 Modern page(v2) UI surface"
  default_prompt: "Use $nocobase-ui-builder for NocoBase Modern page (v2) UI surface work. First classify the request by task taxonomy and target family: build, update, reorder, or inspect; page, outer-tab, route-content, popup-page, popup-tab, popup-content, or node. Treat live get/catalog/readback as the truth. In the current flowSurfaces implementation, outer-tab writes use tabSchemaUid directly because it is the canonical tab uid. Use SKILL.md Global Rules as the only cross-cutting rule source, runtime-playbook for routing and uid/locator glossary, tool-shapes for payload shape, and readback for verification."

policy:
  allow_implicit_invocation: true
