# Long-form guardrails kept here for docs-consistency checks and human review:
# rebuild defaults.collections from scratch via live metadata
# defaults.collections fieldGroups >10 effective fields
# defaults fieldGroups self-review approve/regenerate once lowest reasoning no-think no chain-of-thought
# fixed view/addNew/edit
# table addNew threshold
# associations popups{name,description} first-segment
# described generated add/edit fields => structured formBehavior or formBehaviorDescriptionReview.fields.<field>{decision,reasonCode}; no legacy review/empty-object fallback
# Create JS page and a new complete JS Block: Host -> sourceMode:inline -> runJSSources:open -> Settings Pass -> full Workspace edit -> compilePreview -> full snapshot save
# Save uses baseCommitId + baseOwnerFingerprint; 409 recovery is openLatest -> merge -> compilePreview -> save, never token replacement alone
# Settings schema is src/client/entry.json; normally 2-5 meaningful settings and at least two, with the four documented exceptions; code consumes ctx.settings; Host values do not create source commits
# Existing owners keep the compatibility gate; externalize only for explicit light-plugin, cross-Host reuse, independent Git, or distribution intent; unnamed destination uses the application default Repository
# Host Preview is a non-goal

dependencies:
  tools:
    - type: "cli"
      value: "nb"
      description: "Use nb api flow-surfaces for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
