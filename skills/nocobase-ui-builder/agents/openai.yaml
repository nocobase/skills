interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `nocobase-ctl env --help`; repair CLI first. Intent-first routing: whole-page/localized edit/reaction; uid/name = identity, not availability. Template planning is structure-repeat-first: repeat-eligible popup/block/fields scenes must probe contextual `list-templates`; keyword-only search is discovery-only. Use `nb-template-decision` if present, and feed `select` the `plan-query` probe. No target.uid is not a blocker. Rank usable templates by relation-field/opener then scene fit; smallest uid breaks a final tie. `reference` default; `copy` only for local customization. Keep `routeId`, field popup, `associatedRecords+associationField`, one `editForm`. `apply-blueprint`; localized edit -> `flow-surfaces`; reaction -> `get-reaction-meta`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
