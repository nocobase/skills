interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with simplified executeDsl or low-level flow-surfaces APIs"
  default_prompt: "Write path: create/replace -> executeDsl; local edits -> low-level APIs. Whole-page executeDsl must show one ASCII wireframe before write (popup depth 1, JSON on request) and, unless review is needed, continue in the same run. requestBody must be an object. Single-page=1 real tab; no placeholder tabs or markdown/note/banner blocks. If a menu-group title already exists, never create another same-title group: prefer routeId, else reuse one existing group and mention routeId in preview. fields[] default to strings; field objects only when popup/target/renderer/type is needed and collections:get(appends=[\"fields\"]) shows non-empty interface. layout only on tabs/inline popup. Before first executeDsl, self-check: tab.blocks non-empty, no block layout, one editForm per custom edit popup. Prefer field popup for click-to-open. Use associatedRecords + associationField, string field.target, no generic form, no destructive cleanup unless asked."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for Modern-page UI operations plus read-only schema discovery"

policy:
  allow_implicit_invocation: true
