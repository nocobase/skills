  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`.Intent-first:apply-blueprint;localized edits `flow-surfaces`;get-reaction-meta.wholePage=1 route tab|complex multi-block|nested popup|multi-reaction.first write=applyBlueprint;reads/preview/prepare-write ok;no createMenu/createPage/compose/configure/updateSettings/add*/move*/remove*/set*Rules pre-success;fail->stop+report;after success only explicit local/live gap repair.Repeat-eligible must contextual list-templates;keyword-only search discovery-only;first result.template source;page wording≠local-only intent;local customization->copy;ask, not copy.same-title->routeId;routeId->pageSchemaUid;navigation.group+navigation.item AntDesign icon.multi-non-filter explicit keyed layout.hostBound搜索/filter;searchPage≠filter;filter/search block->filterForm;filter row 1;filterForm 4+ fields->collapse.table/list/gridCard filterableFieldNames+defaultFilter 3-4.rebuild defaults.collections live metadata;fieldGroups>10;fixed view/addNew/edit;table addNew threshold;popups{name,description};associations first-segment.field-popup;associatedRecords+associationField;1 editForm.popup.tryTemplate,popup.saveAsTemplate,openView.tryTemplate"

dependencies:
