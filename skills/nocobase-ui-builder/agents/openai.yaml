interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: apply-blueprint; localized edits `flow-surfaces`; reactions get-reaction-meta. Repeat-eligible scenes must use contextual list-templates; keyword-only search discovery-only; backend order. Existing refs -> template source; page-scoped wording not local-only intent; local customization -> copy; unresolved scope -> ask, not copy. navigation.group/navigation.item need Ant Design icon. Multi-non-filter tab/popup -> explicit keyed layout; filter alone in row 1; filterForm 4+ fields -> collapse. createForm/editForm/details with more than 10 fields -> fieldGroups; no manual divider; no fieldGroups + fieldsLayout. routeId -> pageSchemaUid; never pass route ids as target.uid. Prefer field popup + associatedRecords+associationField; exactly one editForm. popup.tryTemplate, popup.saveAsTemplate, openView.tryTemplate."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
