interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: apply-blueprint; localized edits `flow-surfaces`; reactions get-reaction-meta. Repeat-eligible scenes must use contextual list-templates; keyword-only search discovery-only; backend order. Existing refs -> template source; page wording not local-only intent; local customization -> copy; ask, not copy. same-title groups: routeId. Semantic Ant Design icon. multi-non-filter tab/popup -> explicit keyed layout; filter alone in row 1; filterForm 4+ fields -> collapse. createForm/editForm/details with more than 10 fields -> fieldGroups; no fieldGroups + fieldsLayout. routeId -> pageSchemaUid; route ids never as target.uid. Prefer field popup + associatedRecords+associationField; one editForm. popup.tryTemplate + popup.saveAsTemplate coexist; hit reuses template, miss needs local popup.blocks. openView.tryTemplate."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
