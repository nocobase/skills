interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `nocobase-ctl env --help`; repair CLI before MCP. Intent first: explicit uid/name = identity, not availability. Natural-language prompts may only name blocks/relations/actions; infer structure, not a pseudo-spec. Multi-page asks split into sequential single-page runs; never treat a whole page as a template. No live target.uid is not a blocker. Pick a stable best winner; ask on a final tie. Default selected templates to `reference`; `copy` only for local customization. Whole-page -> `apply-blueprint`; localized edit -> matching `flow-surfaces` command; reaction -> `get-reaction-meta` then `set-*`. Keep `routeId`, field popup, `associatedRecords+associationField`, and one `editForm` per custom edit popup. API/MCP docs = payload mapping + fallback."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
