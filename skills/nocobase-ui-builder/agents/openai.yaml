interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first routing: page -> `apply-blueprint`, local -> `flow-surfaces`, reactions -> `get-reaction-meta`. Structure-repeat-first: repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only. Use `nb-template-decision`; feed `select` the `plan-query` probe. Rank by relation-field/opener then scene fit; ties keep backend order. `reference` by default; `copy` only for local customization. Without explicit `popup.template`, send `popup.tryTemplate=true`. For a new reusable local popup, send `popup.saveAsTemplate={ name, description }`; requires explicit local `popup.blocks`; never combine with `popup.template` or `popup.tryTemplate`. Retarget with `openView.tryTemplate`. Keep `routeId`, field popup, `associatedRecords+associationField`, exactly one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
