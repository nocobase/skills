interface:
  display_name: "NocoBase UI Builder"
  short_description: "通过 NocoBase MCP 以菜单优先方式搭建、修改、重排或只读检查 Modern page(v2) UI surface"
  default_prompt: >
    Use $nocobase-ui-builder to inspect, build, update, or reorder NocoBase Modern page (v2) UI surfaces through live MCP capabilities.
    Prefer menu-first flows: discover or create the target menu group, create a bindable menu item, then initialize the page with createPage(menuRouteId=...).
    If the user gives only a menu title, first read the menu tree and proceed only when the target group is uniquely identified.
    Do not use page or tab lifecycle APIs before createPage(menuRouteId=...) initializes the page.
    Default writes to get -> catalog -> write -> readback.
    Any RunJS write must follow references/js.md and pass the local validator gate before any MCP write happens.

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for flowSurfaces-based UI surface operations"

policy:
  allow_implicit_invocation: true
