interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with simplified applyBlueprint or low-level flow-surfaces APIs"
  default_prompt: "Write path: create/replace -> applyBlueprint; local -> low-level APIs. Whole-page applyBlueprint must show one ASCII wireframe before write (popup depth 1, JSON on request); unless review is needed, continue in the same run. Before first applyBlueprint, run local prepare-write gate/self-check first. requestBody must be an object. Single-page=1 real tab; no placeholder tabs or markdown/note/banner blocks. Never create another same-title group; prefer routeId, mention routeId in preview. fields[] default to string; use popup/target/renderer/type objects only when collections:get(appends=[\"fields\"]) shows non-empty interface. layout only on tabs/inline popup. Before first applyBlueprint, self-check: tab.blocks non-empty, no block layout, one editForm per custom edit popup. Prefer field popup for click-to-open. associatedRecords + associationField, string field.target, no generic form, no destructive cleanup unless asked."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for Modern-page UI operations plus read-only schema discovery"

policy:
  allow_implicit_invocation: true
