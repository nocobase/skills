interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: apply-blueprint;localized edits `flow-surfaces`;get-reaction-meta. Repeat-eligible scenes must contextual `list-templates`;keyword-only search discovery-only;backend order. Existing refs->template source;page wording not local-only intent;local customization->copy;ask, not copy. same-title routeId. navigation.group+navigation.item->Ant Design icon. multi-non-filter->explicit keyed layout;filter row 1;filterForm 4+ fields->collapse;more than 10->fieldGroups. Defaults: rebuild defaults.collections from live metadata;fixed view/addNew/edit;table->addNew threshold;fieldGroups if fixed scene >10 effective fields;popups {name,description};associations. routeId->pageSchemaUid. field popup;associatedRecords+associationField;one editForm. popup.tryTemplate;popup.saveAsTemplate;miss->popup.blocks;openView.tryTemplate."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
