interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with simplified executeDsl or low-level flow-surfaces APIs"
  default_prompt: "Use $nocobase-ui-builder for NocoBase Modern page (v2) UI. Read the global contract first, then choose exactly one write path per task: whole-page creation/replacement -> public executeDsl with the simplified page-structure JSON DSL; localized edits on existing pages/tabs/popups/nodes -> low-level flow-surfaces APIs. In executeDsl replace mode, treat tabs as ordered page-structure input that rewrites existing route-backed tab slots by index; only use key when local layout or in-document targeting needs it. For create mode, prefer navigation.group.routeId when an existing menu group is already known; if using navigation.group.title for unique same-title reuse, keep it title-only and do not send extra group metadata. navigation.group.routeId is exact targeting only: do not mix it with group metadata, and use low-level updateMenu if an existing group's metadata must change. For field discovery in page authoring, never use collections.fields:list; use collections:get(appends=[\"fields\"]) as the default field truth, allow collections.fields:get only for known single-field follow-up, and do not author fields whose interface is empty/null into DSL fields[]. In executeDsl, use block-level collection but nested resource.collectionName, prefer popup relation tables as associatedRecords + associationField, keep field.target as a string block key only, author view/edit/updateRecord/delete under recordActions on record-capable blocks, and do not author ref/$ref or uid-style selectors. Treat the live MCP schema as the source of truth, confirm real collections/fields/bindings before UI writes, and never do destructive cleanup unless the user explicitly asked for deletion."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for Modern-page UI operations plus read-only schema discovery"

policy:
  allow_implicit_invocation: true
