interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nb api flow-surfaces`. Intent-first: wholePage=1 tab|complex multi-block|nested popup|multi-reaction=>apply-blueprint; localized edits `flow-surfaces`; get-reaction-meta. first mutating write=applyBlueprint; reads/metadata/preview/prepare-write ok; no createMenu/createPage/compose/configure/updateSettings/add*/move*/remove*/set*Rules; fail->repair+prepare/preview+retry<=5; report; after success only explicit local/live gap repair. Repeat-eligible must contextual list-templates; keyword-only search=discovery-only; first result=template source; local customization ask, not copy; page wording≠local-only intent. same-title routeId->pageSchemaUid; navigation.group+navigation.item semantic AntDesign icon; multi-non-filter explicit keyed layout; setLayout string[][] number[] [[a],[b]]=2col [[a,b]]=stack uid not key. hostBound搜索/filter sameHost filterAction optional; searchPage≠filter; explicit filter/search block=>filterForm; filter row 1; filterForm 4+ fields collapse. table/list/gridCard/calendar/kanban defaultFilter required; local preflight; explicit nb write remains direct; 分析看板=chart/grid-card; kanban/pipeline/status columns=Kanban; associatedRecords+associationField; 1 editForm; popup.tryTemplate; popup.saveAsTemplate; openView.tryTemplate."

# Long-form guardrails kept here for docs-consistency checks and human review:
# rebuild defaults.collections from scratch via live metadata
# defaults.collections fieldGroups >10 effective fields
# fixed view/addNew/edit
# table addNew threshold
# associations popups{name,description} first-segment

dependencies:
  tools:
    - type: "cli"
      value: "nb"
      description: "Use nb api flow-surfaces for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
