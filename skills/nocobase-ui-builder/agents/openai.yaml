interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: whole-page work -> `apply-blueprint`; localized edits -> low-level `flow-surfaces`; reactions -> `get-reaction-meta`. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search stays discovery-only; semantic ties keep backend order and the first compatible row. Existing template refs -> template source; page-scoped wording is not local-only intent; unresolved scope -> ask, not `copy`; explicit local customization -> `copy`. Without `popup.template`, use `popup.tryTemplate=true`; explicit local `popup.blocks` may use `popup.saveAsTemplate={ name, description }`; `openView.tryTemplate` stays valid. Use `routeId`, field popup, `associatedRecords+associationField`, and exactly one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
