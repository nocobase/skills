interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`; repair CLI first. Intent-first routing: whole-page -> `apply-blueprint`, local edit -> `flow-surfaces`, reactions -> `get-reaction-meta`. Template planning is structure-repeat-first. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only. Use `nb-template-decision` and feed `select` the `plan-query` probe. Rank templates by relation-field/opener then scene fit; if tied, keep backend order. Default `reference`; `copy` only for local customization. If no explicit `popup.template`, send `popup.tryTemplate=true`; local popup content may be miss fallback. Existing opener retargeting may use `apply` popup or `openView.tryTemplate`. Keep `routeId`, field popup, `associatedRecords+associationField`, exactly one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
