interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: page `apply-blueprint`; localized edits -> `flow-surfaces`; reactions -> `get-reaction-meta`. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search is discovery-only; ties keep backend order. `reference` default, `copy` only for local customization. Existing template-reference content edits -> template source; opener-local popup/openView stays local; explicit local-only intent -> `copy`. No explicit `popup.template` -> `popup.tryTemplate=true`. First repeated popup + local `popup.blocks` + no usable template -> `popup.saveAsTemplate={ name, description }`; never with `popup.template` or `popup.tryTemplate`; siblings do not auto-rebind. `openView.tryTemplate` retargets openers. Keep `routeId`, field popup, `associatedRecords+associationField`, one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
