interface:
  display_name: "NocoBase UI Builder"
  short_description: "Route Modern page work by intent: whole-page blueprint, localized flow-surfaces edit, or reaction authoring"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Intent-first: whole-page `apply-blueprint`; localized edits `flow-surfaces`; reactions `get-reaction-meta`. New `navigation.group` / `navigation.item` need Ant Design `icon`. Repeat-eligible scenes must use contextual `list-templates`; keyword-only search discovery-only; backend order wins ties. Existing refs -> template source; page-scoped wording not local-only intent; unresolved scope -> ask, not `copy`; local customization -> `copy`. No explicit template: `popup.tryTemplate=true`; `popup.saveAsTemplate` and `openView.tryTemplate` stay valid. Multi-non-filter tab/popup scopes need explicit keyed `layout`; keep filter alone in row 1; `filterForm` 4+ fields -> `collapse`. Use `routeId`; `pageSchemaUid`; never pass desktop route ids as `target.uid`. Prefer field popup, `associatedRecords+associationField`, one `editForm`."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
