interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `nocobase-ctl env --help`; repair CLI first. Intent-first routing: whole-page/localized edit/reaction; uid/name = identity, not availability. Template planning is structure-repeat-first: repeated popup/block/fields scenes default to templates. No live target.uid is not a blocker. Rank templates by relation-field then description/scene fit; ask only on a final tie. When supported, earliest repeated source prefers `saveMode=\\\"convert\\\"`. `reference` default; `copy` only for local customization. Template names use the conversation language; description carries searchable detail. Keep `routeId`, field popup, `associatedRecords+associationField`, one `editForm`. `apply-blueprint`; localized edit -> `flow-surfaces`; reaction -> `get-reaction-meta`. API/MCP docs = payload mapping + fallback."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
