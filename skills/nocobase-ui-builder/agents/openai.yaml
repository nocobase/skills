interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with CLI-first flow-surfaces while keeping API payload docs as reference and fallback"
  default_prompt: "Canonical front door: `nocobase-ctl flow-surfaces`. Run `nocobase-ctl --help` + `nocobase-ctl env --help`; repair CLI before MCP. Intent first: uid/name = identity, not availability. Natural-language prompts may only name blocks/relations/actions. Same/similar popup/block = template intent; if none exists, save-template after readback. Multi-page asks split into single-page runs; never treat page as a template. target.uid can be planned, not live. Multiple templates are not a blocker: auto-pick the best winner by relation-field then description/scene fit; ask only on a final tie. `reference` default; `copy` only for local customization. Whole-page -> `apply-blueprint`; localized edit -> `flow-surfaces`; reaction -> `get-reaction-meta` then `set-*`. Keep `routeId`, field popup, `associatedRecords+associationField`, one `editForm`. API/MCP docs = payload mapping + fallback."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server remains the backend contract source and fallback path for Modern-page UI operations"

policy:
  allow_implicit_invocation: true
