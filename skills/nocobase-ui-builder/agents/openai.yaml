interface:
  display_name: "NocoBase UI Builder"
  short_description: "Build Modern pages with DSL-first flow-surfaces APIs"
  default_prompt: "Use $nocobase-ui-builder to inspect, draft, or edit NocoBase Modern page (v2) UI. For every structural page write, first attempt blueprint / patch DSL with validateDsl -> executeDsl -> readback. Do not treat complexity, nested popups, relation bindings, same-row layouts, or missing local examples as reasons to skip DSL; let validateDsl decide current coverage. Execute directly only when the request is clear and unresolvedQuestions can be empty. Use live MCP schema as the source of truth, and fall back to low-level flow-surfaces APIs only for lifecycle-only exceptions or after validateDsl returns concrete evidence that the current change is outside DSL coverage. When template reuse is needed, search templates first, then apply them in reference/copy mode."

dependencies:
  tools:
    - type: "mcp"
      value: "nocobase"
      description: "NocoBase MCP server for UI surface operations plus read-only schema discovery for DSL authoring and field pre-write verification"

policy:
  allow_implicit_invocation: true
