interface:
  display_name: "NocoBase Plugin Manage"
  short_description: "Safe plugin management for NocoBase apps"
  default_prompt: "Use $nocobase-plugin-manage <action> [plugin] to manage plugins with direct `nb pm` commands only. Use `nb pm list` for inspect/readback, and use `nb pm enable` / `nb pm disable` for writes. Do not use docker, API, or legacy ctl fallback paths."
