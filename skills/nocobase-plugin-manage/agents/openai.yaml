interface:
  display_name: "NocoBase Plugin Manage"
  short_description: "Safe plugin management for NocoBase apps"
  default_prompt: "Use $nocobase-plugin-manage <action> [plugin] to inspect plugin status and run safe enable or disable operations with auto local/remote and backend resolution. For local inspect/readback, prefer `yarn nocobase pm list` (or docker compose equivalent) and parse JSON between `--- BEGIN_PLUGIN_LIST_JSON ---` and `--- END_PLUGIN_LIST_JSON ---`. For local write actions, use deterministic fallback order: `docker_cli` first, then `remote_api` when docker path fails and token/base_url are ready, and finally return manual fallback guidance when both paths fail."
